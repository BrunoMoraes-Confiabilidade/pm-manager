name: Fix Terminal Select Field

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply terminal select patch
        run: python3 .github/fix_terminal_select.py

      - name: Commit and push if changed
        run: |
          git config user.email "noreply@anthropic.com"
          git config user.name "Claude"
          git add index.html
          git diff --staged --quiet && echo 'Nothing to commit' || (
            git commit -m "fix(fumaca): Terminal como select suspenso populado de a3Terminals" &&
            git push origin main
          )

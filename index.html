<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>PM Manager — Gestão de Manutenção</title>
<meta name="description" content="Sistema de Gestão de Manutenção Industrial — Planejamento, Controle e Execução"/>
<meta name="theme-color" content="#0B1929"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙</text></svg>"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;width:100%}
body{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#0B1929;color:#F8FAFC;overflow-x:hidden}
input,textarea,button{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease}
.slide-down{animation:slideDown .3s ease}

/* ── Layout ── */
.app{min-height:100vh;position:relative;overflow:hidden}
.bg-texture{position:absolute;inset:0;background-image:radial-gradient(circle at 20% 50%,rgba(59,130,246,.08) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(245,158,11,.06) 0%,transparent 50%),radial-gradient(circle at 60% 80%,rgba(34,197,94,.05) 0%,transparent 50%)}
.bg-grad{position:absolute;inset:0;background:linear-gradient(135deg,rgba(11,25,41,.95),rgba(15,35,60,.9))}
.container{position:relative;z-index:1;display:flex;min-height:100vh;flex-wrap:wrap}
.left{flex:1 1 420px;display:flex;align-items:center;justify-content:center;padding:40px 32px;min-height:360px}
.left-inner{max-width:500px;text-align:center}
.right{flex:1 1 400px;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.form-area{width:100%;max-width:420px}

/* ── Brand ── */
.brand-title{font-size:clamp(28px,4vw,44px);font-weight:800;line-height:1.15;margin-bottom:12px;letter-spacing:-.02em;color:#F8FAFC}
.brand-sub{font-size:clamp(13px,1.6vw,17px);color:#F59E0B;font-weight:600;letter-spacing:.15em;text-transform:uppercase;margin-bottom:32px}
.brand-footer{font-size:14px;color:#64748B;margin-top:24px;line-height:1.6;max-width:380px;margin-left:auto;margin-right:auto}

/* ── Logo ── */
.logo-area{width:100px;height:100px;border-radius:16px;border:2px dashed #334155;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;cursor:pointer;overflow:hidden;background:rgba(15,23,42,.6);transition:border-color .3s}
.logo-area:hover{border-color:#60A5FA}
.logo-area img{width:100%;height:100%;object-fit:contain;padding:6px}
.logo-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;color:#64748B;font-size:11px;font-weight:500}

/* ── Form Block ── */
.form-block{background:rgba(15,23,42,.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(51,65,85,.5);border-radius:16px;padding:32px 28px}
.form-title{font-size:22px;font-weight:700;margin-bottom:6px}
.form-desc{font-size:14px;color:#94A3B8;margin-bottom:24px}

/* ── Inputs ── */
.label{display:block;font-size:13px;font-weight:600;color:#CBD5E1;margin:14px 0 6px}
.input-wrap{position:relative;display:flex;align-items:center;background:rgba(15,23,42,.7);border:1px solid #1E3A5F;border-radius:10px;transition:border-color .2s}
.input-wrap:focus-within{border-color:#3B82F6}
.input-icon{position:absolute;left:12px;font-size:16px;pointer-events:none;display:flex;align-items:center;color:#475569}
.input-field{flex:1;background:transparent;border:none;outline:none;color:#F1F5F9;font-size:15px;padding:12px 12px 12px 40px;width:100%}
.input-field::placeholder{color:#475569}
.input-plain{padding-left:14px}
textarea.input-field{padding:12px 14px;resize:vertical;font-size:14px;border-radius:10px;background:rgba(15,23,42,.7);border:1px solid #1E3A5F;width:100%;margin-top:4px;color:#F1F5F9;outline:none}
textarea.input-field:focus{border-color:#3B82F6}

/* ── Buttons ── */
.btn-primary{width:100%;padding:13px 20px;border:none;border-radius:10px;background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#FFF;font-size:15px;font-weight:700;cursor:pointer;margin-top:22px;box-shadow:0 4px 14px rgba(37,99,235,.3);display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s,box-shadow .2s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.4)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.eye-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:8px 12px}
.link-btn{background:none;border:none;color:#60A5FA;font-size:13px;cursor:pointer;font-weight:500;padding:0;transition:color .2s}
.link-btn:hover{color:#93C5FD}
.links-row{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:18px}
.links-row .divider{color:#334155;font-size:13px}
.admin-link{display:block;width:100%;text-align:center;background:none;border:none;color:#475569;font-size:12px;cursor:pointer;margin-top:20px;padding:4px;transition:color .2s}
.admin-link:hover{color:#94A3B8}
.footer-text{text-align:center;color:#334155;font-size:12px;margin-top:24px}

/* ── Channels ── */
.channel-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;border:1px solid;color:#FFF;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .15s}
.channel-btn:hover{opacity:.9;transform:translateY(-1px)}
.channel-btn.whatsapp{background:#25D366;border-color:#25D366}
.channel-btn.teams{background:#5B5FC7;border-color:#5B5FC7}

/* ── Admin Action Buttons ── */
.action-btn{flex:1;padding:10px;border-radius:8px;border:1px solid;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:opacity .2s}
.action-btn:hover{opacity:.8}
.action-btn.approve{background:rgba(34,197,94,.15);color:#22C55E;border-color:rgba(34,197,94,.2)}
.action-btn.reject{background:rgba(220,38,38,.15);color:#EF4444;border-color:rgba(220,38,38,.2)}

/* ── Tabs ── */
.tabs{display:flex;margin-bottom:20px;border-radius:8px;overflow:hidden;border:1px solid #1E3A5F}
.tab-btn{flex:1;padding:10px 4px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:rgba(15,23,42,.6);color:#94A3B8;transition:all .2s}
.tab-btn.active{background:#1D4ED8;color:#FFF}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:#0F172A;border:1px solid #1E3A5F;border-radius:16px;padding:28px;width:100%;max-height:85vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:18px;font-weight:700}
.close-btn{background:none;border:none;color:#64748B;font-size:18px;cursor:pointer;padding:4px 8px}
.close-btn:hover{color:#CBD5E1}

/* ── Toast ── */
.toast{position:fixed;top:20px;right:20px;left:20px;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:2000;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:slideDown .3s ease}
.toast.success{background:#059669}
.toast.error{background:#DC2626}
.toast.info{background:#2563EB}

/* ── Request Card ── */
.req-card{border-radius:12px;padding:14px;margin-bottom:10px;animation:fadeIn .3s ease}
.req-card.pending{border:1px solid rgba(245,158,11,.2);background:rgba(245,158,11,.04)}
.req-card.resolved{border:1px solid #1E3A5F;background:rgba(15,23,42,.3)}
.req-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.req-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.req-body{color:#CBD5E1;font-size:13px;line-height:1.8}
.req-body strong{color:#F8FAFC}
.req-date{color:#64748B;font-size:12px}
.req-actions{display:flex;gap:8px;margin-top:12px}

/* ── User Card ── */
.user-card{display:flex;justify-content:space-between;align-items:center;background:rgba(15,23,42,.4);border-radius:10px;padding:12px 14px;border:1px solid #1E3A5F;margin-bottom:8px}
.user-info{color:#CBD5E1;font-size:13px}
.user-info .name{font-weight:700;color:#F8FAFC}
.user-info .meta{color:#64748B;font-size:11px}
.del-btn{background:none;border:none;color:#EF4444;cursor:pointer;font-size:18px;padding:4px}

/* ── Admin Config ── */
.admin-card{background:rgba(15,23,42,.4);border-radius:10px;padding:14px;border:1px solid #1E3A5F;margin-bottom:10px;position:relative}
.admin-card .remove{position:absolute;top:8px;right:10px;background:none;border:none;color:#64748B;cursor:pointer;font-size:14px}
.admin-card .remove:hover{color:#EF4444}
.admin-label{font-size:12px;color:#60A5FA;font-weight:700;margin-bottom:8px}
.cfg-input{width:100%;background:rgba(15,23,42,.7);border:1px solid #1E3A5F;border-radius:8px;color:#F1F5F9;font-size:13px;padding:10px 12px;outline:none;transition:border-color .2s}
.cfg-input:focus{border-color:#3B82F6}
.cfg-input::placeholder{color:#475569}
.cfg-row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.cfg-row .cfg-input{flex:1;min-width:140px}
.add-admin-btn{background:none;border:1px solid #1E3A5F;color:#60A5FA;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer}
.add-admin-btn:hover{border-color:#3B82F6}

/* ── Empty State ── */
.empty{text-align:center;padding:40px 20px;color:#475569}
.empty .icon{font-size:40px;margin-bottom:8px}

/* ── Badge ── */
.pending-badge{background:#DC2626;color:#FFF;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;animation:pulse 2s infinite;position:absolute;top:-2px;margin-left:4px}

/* ── Notify Admin Card ── */
.notify-card{background:rgba(15,23,42,.5);border-radius:10px;padding:14px;border:1px solid #1E3A5F;margin-bottom:10px}
.notify-card .admin-name{color:#F8FAFC;font-size:14px;font-weight:600;margin-bottom:10px}
.notify-btns{display:flex;gap:8px;flex-wrap:wrap}

/* ── Warning Box ── */
.warn-box{text-align:center;padding:20px;color:#F59E0B;font-size:13px;background:rgba(245,158,11,.08);border-radius:10px;border:1px solid rgba(245,158,11,.2);line-height:1.7}

/* ── Responsive ── */
@media(max-width:480px){
  .left{padding:30px 20px;min-height:280px}
  .right{padding:20px 16px}
  .form-block{padding:24px 20px}
  .modal{padding:20px}
  .brand-footer{display:none}
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── Storage ───
const LS = {
  get(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null } catch { return null } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)) } catch {} },
};
const K = { CFG:"pm-cfg", REQ:"pm-req", USR:"pm-usr", LOGO:"pm-logo" };

function sendWhatsApp(phone, text) {
  window.open(`https://wa.me/${phone.replace(/\D/g,"")}?text=${encodeURIComponent(text)}`, "_blank");
}
function sendTeams(email, text) {
  window.open(`https://teams.microsoft.com/l/chat/0/0?users=${encodeURIComponent(email)}&message=${encodeURIComponent(text)}`, "_blank");
}

// ─── Illustration ───
function Illustration() {
  return (
    <svg viewBox="0 0 520 400" fill="none" xmlns="http://www.w3.org/2000/svg" style={{width:"100%",maxWidth:480,height:"auto"}}>
      <g opacity="0.08"><circle cx="260" cy="200" r="160" stroke="#F59E0B" strokeWidth="30"/>
        {[0,45,90,135,180,225,270,315].map((a,i)=>{const r=a*Math.PI/180;return<line key={i} x1={260+140*Math.cos(r)} y1={200+140*Math.sin(r)} x2={260+185*Math.cos(r)} y2={200+185*Math.sin(r)} stroke="#F59E0B" strokeWidth="28" strokeLinecap="round"/>})}</g>
      <g opacity="0.12" transform="translate(400,80)"><circle r="35" stroke="#3B82F6" strokeWidth="10"/>
        {[0,60,120,180,240,300].map((a,i)=>{const r=a*Math.PI/180;return<line key={i} x1={30*Math.cos(r)} y1={30*Math.sin(r)} x2={48*Math.cos(r)} y2={48*Math.sin(r)} stroke="#3B82F6" strokeWidth="12" strokeLinecap="round"/>})}</g>
      <g transform="translate(100,100) rotate(-30)"><rect y="22" width="140" height="12" rx="6" fill="#64748B" opacity="0.6"/><circle cx="155" cy="28" r="28" stroke="#64748B" strokeWidth="8" fill="none" opacity="0.6"/></g>
      <g transform="translate(180,120)"><rect width="100" height="130" rx="8" fill="#1E3A5F" opacity="0.85"/><rect x="-8" y="-6" width="116" height="20" rx="4" fill="#2D5F8A" opacity="0.9"/>
        {[30,56,82,108].map((y,i)=>(<g key={i}><rect x="14" y={y} width="14" height="14" rx="2" stroke="#F59E0B" strokeWidth="2" fill="none"/>{i<2&&<path d={`M17 ${y+7} L22 ${y+12} L30 ${y+3}`} stroke="#22C55E" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>}<rect x="38" y={y+4} width={40+i%2*8} height="6" rx="3" fill="#94A3B8" opacity="0.5"/></g>))}</g>
      <g transform="translate(340,140)" opacity="0.7"><ellipse cx="28" cy="10" rx="22" ry="10" fill="#F59E0B"/><rect x="6" y="8" width="44" height="6" rx="3" fill="#D97706"/><circle cx="28" cy="26" r="14" fill="#475569"/><rect x="14" y="40" width="28" height="50" rx="6" fill="#334155"/><rect x="-6" y="44" width="22" height="10" rx="5" fill="#334155" transform="rotate(-15 -6 44)"/><rect x="40" y="42" width="30" height="10" rx="5" fill="#334155" transform="rotate(25 40 42)"/><rect x="62" y="34" width="22" height="30" rx="3" fill="#1E3A5F" stroke="#3B82F6" strokeWidth="1.5" transform="rotate(15 73 49)"/><rect x="14" y="88" width="12" height="40" rx="5" fill="#1E293B"/><rect x="30" y="88" width="12" height="40" rx="5" fill="#1E293B"/></g>
      <g transform="translate(60,250)" opacity="0.5"><rect width="70" height="65" rx="6" fill="#1E3A5F"/><rect width="70" height="18" rx="6" fill="#DC2626"/><rect y="10" width="70" height="8" fill="#DC2626"/>
        {[0,1,2].map(r=>[0,1,2,3].map(c=><rect key={`${r}${c}`} x={8+c*16} y={24+r*14} width="10" height="10" rx="2" fill={r===0&&c<2?"#22C55E":r===1&&c===2?"#F59E0B":"#334155"}/>))}</g>
      <g transform="translate(60,340)" opacity="0.35"><polyline points="0,20 40,20 55,5 70,35 85,15 100,20 160,20 180,8 200,25 220,12 260,20 360,20" stroke="#3B82F6" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></g>
      {[{cx:50,cy:60,r:3,c:"#F59E0B"},{cx:480,cy:320,r:4,c:"#3B82F6"},{cx:440,cy:50,r:2.5,c:"#22C55E"},{cx:30,cy:350,r:3.5,c:"#F59E0B"}].map((p,i)=>(<circle key={i} cx={p.cx} cy={p.cy} r={p.r} fill={p.c} opacity="0.5"><animate attributeName="opacity" values="0.2;0.7;0.2" dur={`${2+i*.5}s`} repeatCount="indefinite"/></circle>))}
    </svg>
  );
}

function Toast({message,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,4500);return()=>clearTimeout(t)},[]);
  return<div className={`toast ${type} slide-down`}><span>{type==="success"?"✓":type==="error"?"✕":"ℹ"}</span>{message}</div>;
}

// ═══════════════ APP ═══════════════
function App() {
  const [screen, setScreen] = useState("login");
  const [mat, setMat] = useState("");
  const [pw, setPw] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [logo, setLogo] = useState(null);
  const [toast, setToast] = useState(null);

  const [recMat, setRecMat] = useState("");
  const [recEmail, setRecEmail] = useState("");
  const [regName, setRegName] = useState("");
  const [regMat, setRegMat] = useState("");
  const [regEmail, setRegEmail] = useState("");
  const [regArea, setRegArea] = useState("");
  const [regJust, setRegJust] = useState("");

  const [showNotify, setShowNotify] = useState(false);
  const [lastReq, setLastReq] = useState(null);
  const [showAdmin, setShowAdmin] = useState(false);
  const [adminPin, setAdminPin] = useState("");
  const [adminOk, setAdminOk] = useState(false);
  const [adminTab, setAdminTab] = useState("requests");

  const [reqs, setReqs] = useState([]);
  const [users, setUsers] = useState([]);
  const [cfg, setCfg] = useState({ pin:"1234", admins:[{name:"",whatsapp:"",teams:""}] });

  const logoRef = useRef(null);
  const notify = (m,t="info")=>setToast({message:m,type:t});

  useEffect(()=>{
    const c=LS.get(K.CFG); if(c) setCfg(p=>({...p,...c}));
    const r=LS.get(K.REQ); if(r) setReqs(r);
    const u=LS.get(K.USR); if(u) setUsers(u);
    const l=LS.get(K.LOGO); if(l) setLogo(l);
  },[]);

  const saveReqs=(v)=>{setReqs(v);LS.set(K.REQ,v)};
  const saveUsers=(v)=>{setUsers(v);LS.set(K.USR,v)};
  const saveCfg=(v)=>{setCfg(v);LS.set(K.CFG,v)};

  const handleLogo=(e)=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=(ev)=>{setLogo(ev.target.result);LS.set(K.LOGO,ev.target.result)};rd.readAsDataURL(f)};

  const handleLogin=()=>{
    if(!mat||!pw){notify("Preencha matrícula e senha.","error");return}
    const u=users.find(x=>x.matricula===mat&&x.status==="approved");
    if(!u){notify("Matrícula não encontrada ou acesso pendente.","error");return}
    if(u.password!==pw){notify("Senha incorreta.","error");return}
    notify(`Bem-vindo(a), ${u.name}!`,"success");
  };

  const submitReq=(req)=>{const upd=[req,...reqs];saveReqs(upd);setLastReq(req);setShowNotify(true)};

  const handleRecovery=()=>{
    if(!recMat||!recEmail){notify("Preencha matrícula e e-mail.","error");return}
    submitReq({id:Date.now().toString(),type:"recovery",matricula:recMat,email:recEmail,date:new Date().toLocaleString("pt-BR"),status:"pending"});
    setRecMat("");setRecEmail("");setScreen("login");
  };

  const handleRegister=()=>{
    if(!regName||!regMat||!regEmail){notify("Preencha nome, matrícula e e-mail.","error");return}
    if(reqs.find(r=>r.matricula===regMat&&r.type==="register"&&r.status==="pending")){notify("Já existe solicitação pendente.","error");return}
    submitReq({id:Date.now().toString(),type:"register",name:regName,matricula:regMat,email:regEmail,area:regArea||"—",justification:regJust||"—",date:new Date().toLocaleString("pt-BR"),status:"pending"});
    setRegName("");setRegMat("");setRegEmail("");setRegArea("");setRegJust("");setScreen("login");
  };

  const buildMsg=(req)=>{
    if(req.type==="register")return`📋 *[PM Manager] NOVO CADASTRO*\n\n👤 Nome: ${req.name}\n🔖 Matrícula: ${req.matricula}\n📧 E-mail: ${req.email}\n🏭 Área: ${req.area}\n📝 Justificativa: ${req.justification}\n📅 Data: ${req.date}\n\n⚠ Acesse o Painel Admin do PM Manager para APROVAR ou REJEITAR.`;
    return`🔑 *[PM Manager] RECUPERAÇÃO DE SENHA*\n\n🔖 Matrícula: ${req.matricula}\n📧 E-mail: ${req.email}\n📅 Data: ${req.date}\n\n⚠ Acesse o Painel Admin do PM Manager para resetar a senha.`;
  };

  const notifyAdmin=(admin,channel)=>{
    if(!lastReq)return;
    if(channel==="whatsapp")sendWhatsApp(admin.whatsapp,buildMsg(lastReq));
    else sendTeams(admin.teams,buildMsg(lastReq));
    notify(`${channel==="whatsapp"?"WhatsApp":"Teams"} aberto para ${admin.name||"admin"}!`,"success");
  };

  const handleApprove=(req)=>{
    const upd=reqs.map(r=>r.id===req.id?{...r,status:"approved",resolvedAt:new Date().toLocaleString("pt-BR")}:r);
    saveReqs(upd);
    if(req.type==="register"){
      saveUsers([...users,{matricula:req.matricula,name:req.name,email:req.email,area:req.area,password:"123456",status:"approved",createdAt:new Date().toLocaleString("pt-BR")}]);
      notify(`✅ ${req.name} aprovado! Senha: 123456`,"success");
    }else{
      saveUsers(users.map(u=>u.matricula===req.matricula?{...u,password:"123456"}:u));
      notify(`✅ Senha resetada — ${req.matricula}. Nova: 123456`,"success");
    }
  };
  const handleReject=(req)=>{saveReqs(reqs.map(r=>r.id===req.id?{...r,status:"rejected",resolvedAt:new Date().toLocaleString("pt-BR")}:r));notify("Solicitação rejeitada.","info")};
  const handleDeleteUser=(m)=>{saveUsers(users.filter(u=>u.matricula!==m));notify("Usuário removido.","info")};

  const addAdmin=()=>{if(cfg.admins.length>=5)return;setCfg(p=>({...p,admins:[...p.admins,{name:"",whatsapp:"",teams:""}]}))};
  const removeAdmin=(i)=>{setCfg(p=>({...p,admins:p.admins.filter((_,idx)=>idx!==i)}))};
  const updateAdmin=(i,f,v)=>{setCfg(p=>{const a=[...p.admins];a[i]={...a[i],[f]:v};return{...p,admins:a}})};

  const pending=reqs.filter(r=>r.status==="pending").length;
  const configuredAdmins=cfg.admins.filter(a=>a.whatsapp||a.teams);

  return (
    <div className="app">
      <div className="bg-texture"/><div className="bg-grad"/>
      {toast&&<Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)}/>}

      <div className="container">
        <div className="left"><div className="left-inner">
          <h1 className="brand-title">Gestão de<br/>Manutenção</h1>
          <p className="brand-sub">Planejamento · Controle · Execução</p>
          <Illustration/>
          <p className="brand-footer">Sistema integrado para gestão completa do ciclo de manutenção industrial</p>
        </div></div>

        <div className="right"><div className="form-area">
          <div className="logo-area" onClick={()=>logoRef.current?.click()}>
            {logo?<img src={logo} alt=""/>:(
              <div className="logo-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>Adicionar Logo</div>
            )}
            <input ref={logoRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleLogo}/>
          </div>

          {/* LOGIN */}
          {screen==="login"&&<div className="form-block fade-in">
            <h2 className="form-title">Entrar no Sistema</h2>
            <p className="form-desc">Acesse o módulo de manutenção</p>
            <label className="label">CS (Matrícula)</label>
            <div className="input-wrap"><span className="input-icon">🔖</span><input className="input-field" placeholder="Digite sua matrícula" value={mat} onChange={e=>setMat(e.target.value)}/></div>
            <label className="label">Senha</label>
            <div className="input-wrap"><span className="input-icon">🔒</span><input className="input-field" type={showPw?"text":"password"} placeholder="••••••••" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/><button className="eye-btn" onClick={()=>setShowPw(!showPw)}>{showPw?"🙈":"👁"}</button></div>
            <button className="btn-primary" onClick={handleLogin}>Entrar</button>
            <div className="links-row">
              <button className="link-btn" onClick={()=>setScreen("recovery")}>Esqueceu a senha?</button>
              <span className="divider">|</span>
              <button className="link-btn" onClick={()=>setScreen("register")}>Solicitar Cadastro</button>
            </div>
            <div style={{position:"relative",display:"inline-block",width:"100%",textAlign:"center"}}>
              <button className="admin-link" onClick={()=>{setShowAdmin(true);setAdminOk(false);setAdminPin("")}}>⚙ Painel do Administrador</button>
              {pending>0&&<span className="pending-badge">{pending}</span>}
            </div>
          </div>}

          {/* RECOVERY */}
          {screen==="recovery"&&<div className="form-block fade-in">
            <h2 className="form-title">Recuperar Senha</h2>
            <p className="form-desc">Envie uma solicitação ao administrador</p>
            <label className="label">CS (Matrícula)</label>
            <div className="input-wrap"><span className="input-icon">🔖</span><input className="input-field" placeholder="Sua matrícula" value={recMat} onChange={e=>setRecMat(e.target.value)}/></div>
            <label className="label">E-mail cadastrado</label>
            <div className="input-wrap"><span className="input-icon">📧</span><input className="input-field" type="email" placeholder="seu@email.com" value={recEmail} onChange={e=>setRecEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleRecovery()}/></div>
            <button className="btn-primary" onClick={handleRecovery}>Enviar Solicitação</button>
            <button className="link-btn" style={{marginTop:16,display:"block",textAlign:"center",width:"100%"}} onClick={()=>setScreen("login")}>← Voltar ao Login</button>
          </div>}

          {/* REGISTER */}
          {screen==="register"&&<div className="form-block fade-in">
            <h2 className="form-title">Solicitar Cadastro</h2>
            <p className="form-desc">Preencha seus dados e notifique o administrador</p>
            <label className="label">Nome Completo *</label>
            <div className="input-wrap"><span className="input-icon">👤</span><input className="input-field" placeholder="Seu nome" value={regName} onChange={e=>setRegName(e.target.value)}/></div>
            <label className="label">CS (Matrícula) *</label>
            <div className="input-wrap"><span className="input-icon">🔖</span><input className="input-field" placeholder="Sua matrícula" value={regMat} onChange={e=>setRegMat(e.target.value)}/></div>
            <label className="label">E-mail Corporativo *</label>
            <div className="input-wrap"><span className="input-icon">📧</span><input className="input-field" type="email" placeholder="seu@empresa.com" value={regEmail} onChange={e=>setRegEmail(e.target.value)}/></div>
            <label className="label">Área / Setor</label>
            <div className="input-wrap"><span className="input-icon">🏭</span><input className="input-field" placeholder="Ex: Manutenção Mecânica" value={regArea} onChange={e=>setRegArea(e.target.value)}/></div>
            <label className="label">Justificativa</label>
            <textarea className="input-field" placeholder="Por que precisa de acesso..." value={regJust} onChange={e=>setRegJust(e.target.value)} rows={3}/>
            <button className="btn-primary" onClick={handleRegister}>Enviar Solicitação</button>
            <button className="link-btn" style={{marginTop:16,display:"block",textAlign:"center",width:"100%"}} onClick={()=>setScreen("login")}>← Voltar ao Login</button>
          </div>}

          <p className="footer-text">PM Manager v1.0 — 100% Independente</p>
        </div></div>
      </div>

      {/* NOTIFY MODAL */}
      {showNotify&&<div className="overlay" onClick={()=>setShowNotify(false)}><div className="modal slide-down" style={{maxWidth:480}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><h2 className="modal-title">✅ Solicitação Registrada!</h2><button className="close-btn" onClick={()=>setShowNotify(false)}>✕</button></div>
        <p style={{color:"#94A3B8",fontSize:14,marginBottom:16}}>Agora notifique o administrador:</p>
        {configuredAdmins.length===0?<div className="warn-box">⚠ Nenhum admin com WhatsApp/Teams configurado.<br/>Peça ao administrador para configurar.</div>:(
          <div>{configuredAdmins.map((a,i)=>(
            <div key={i} className="notify-card">
              <div className="admin-name">{a.name||`Admin ${i+1}`}</div>
              <div className="notify-btns">
                {a.whatsapp&&<button className="channel-btn whatsapp" onClick={()=>notifyAdmin(a,"whatsapp")}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                  WhatsApp</button>}
                {a.teams&&<button className="channel-btn teams" onClick={()=>notifyAdmin(a,"teams")}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M19.2 6.4h-2.4V4.8c0-.88-.72-1.6-1.6-1.6H8.8c-.88 0-1.6.72-1.6 1.6v1.6H4.8c-.88 0-1.6.72-1.6 1.6v9.6c0 .88.72 1.6 1.6 1.6h14.4c.88 0 1.6-.72 1.6-1.6V8c0-.88-.72-1.6-1.6-1.6z"/></svg>
                  Teams</button>}
              </div>
            </div>
          ))}</div>
        )}
        <button className="link-btn" style={{marginTop:20,display:"block",textAlign:"center",width:"100%",fontSize:14}} onClick={()=>setShowNotify(false)}>Fechar</button>
      </div></div>}

      {/* ADMIN PANEL */}
      {showAdmin&&<div className="overlay" onClick={()=>setShowAdmin(false)}><div className="modal slide-down" style={{maxWidth:640}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><h2 className="modal-title">Painel do Administrador</h2><button className="close-btn" onClick={()=>setShowAdmin(false)}>✕</button></div>
        
        {!adminOk?<div>
          <p style={{color:"#94A3B8",fontSize:14,marginBottom:16}}>Digite o PIN de acesso.</p>
          <div className="input-wrap"><input className="input-field input-plain" type="password" placeholder="PIN (padrão: 1234)" value={adminPin} onChange={e=>setAdminPin(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){if(adminPin===(cfg.pin||"1234")){setAdminOk(true);setAdminPin("")}else notify("PIN incorreto.","error")}}}/></div>
          <button className="btn-primary" onClick={()=>{if(adminPin===(cfg.pin||"1234")){setAdminOk(true);setAdminPin("")}else notify("PIN incorreto.","error")}}>Acessar</button>
        </div>:<div>
          <div className="tabs">
            {[["requests",`📋 Solicitações${pending?` (${pending})`:""}`],["users","👥 Usuários"],["config","⚙ Configurações"]].map(([k,l])=>(
              <button key={k} className={`tab-btn ${adminTab===k?"active":""}`} onClick={()=>setAdminTab(k)}>{l}</button>
            ))}
          </div>

          {adminTab==="requests"&&<div>
            {reqs.length===0?<div className="empty"><div className="icon">📭</div>Nenhuma solicitação.</div>:
            reqs.map(r=><div key={r.id} className={`req-card ${r.status==="pending"?"pending":"resolved"}`}>
              <div className="req-header">
                <span className="req-badge" style={{background:r.type==="register"?"rgba(59,130,246,.15)":"rgba(245,158,11,.15)",color:r.type==="register"?"#60A5FA":"#F59E0B"}}>{r.type==="register"?"📋 Cadastro":"🔑 Recuperação"}</span>
                <span className="req-badge" style={{background:r.status==="pending"?"rgba(245,158,11,.2)":r.status==="approved"?"rgba(34,197,94,.2)":"rgba(220,38,38,.2)",color:r.status==="pending"?"#F59E0B":r.status==="approved"?"#22C55E":"#EF4444"}}>{r.status==="pending"?"⏳ Pendente":r.status==="approved"?"✅ Aprovado":"❌ Rejeitado"}</span>
              </div>
              <div className="req-body">
                {r.name&&<div><strong>Nome:</strong> {r.name}</div>}
                <div><strong>Matrícula:</strong> {r.matricula}</div>
                <div><strong>E-mail:</strong> {r.email}</div>
                {r.area&&r.area!=="—"&&<div><strong>Área:</strong> {r.area}</div>}
                {r.justification&&r.justification!=="—"&&<div><strong>Justificativa:</strong> {r.justification}</div>}
                <div className="req-date">📅 {r.date}{r.resolvedAt?` → ${r.resolvedAt}`:""}</div>
              </div>
              {r.status==="pending"&&<div className="req-actions">
                <button className="action-btn approve" onClick={()=>handleApprove(r)}>✅ Aprovar</button>
                <button className="action-btn reject" onClick={()=>handleReject(r)}>❌ Rejeitar</button>
              </div>}
            </div>)}
          </div>}

          {adminTab==="users"&&<div>
            {users.length===0?<div className="empty"><div className="icon">👥</div>Nenhum usuário.</div>:
            users.map(u=><div key={u.matricula} className="user-card">
              <div className="user-info">
                <div className="name">{u.name}</div>
                <div>🔖 {u.matricula} · 📧 {u.email}</div>
                <div className="meta">{u.area!=="—"?`🏭 ${u.area} · `:""}{u.createdAt}</div>
              </div>
              <button className="del-btn" onClick={()=>handleDeleteUser(u.matricula)} title="Remover">🗑</button>
            </div>)}
          </div>}

          {adminTab==="config"&&<div>
            <label className="label" style={{marginTop:0}}>PIN de Acesso Admin</label>
            <div className="input-wrap"><input className="input-field input-plain" value={cfg.pin} onChange={e=>setCfg(p=>({...p,pin:e.target.value}))}/></div>

            <div style={{marginTop:20,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <label className="label" style={{margin:0}}>Administradores (WhatsApp / Teams)</label>
              {cfg.admins.length<5&&<button className="add-admin-btn" onClick={addAdmin}>+ Adicionar</button>}
            </div>

            {cfg.admins.map((a,i)=><div key={i} className="admin-card">
              {cfg.admins.length>1&&<button className="remove" onClick={()=>removeAdmin(i)}>✕</button>}
              <div className="admin-label">Admin {i+1}</div>
              <input className="cfg-input" placeholder="Nome do admin" value={a.name} onChange={e=>updateAdmin(i,"name",e.target.value)}/>
              <div className="cfg-row">
                <input className="cfg-input" placeholder="📱 WhatsApp (ex: 5565999999999)" value={a.whatsapp} onChange={e=>updateAdmin(i,"whatsapp",e.target.value)}/>
                <input className="cfg-input" placeholder="💬 Teams (e-mail)" value={a.teams} onChange={e=>updateAdmin(i,"teams",e.target.value)}/>
              </div>
            </div>)}

            <button className="btn-primary" onClick={()=>{saveCfg(cfg);notify("Configurações salvas!","success")}}>Salvar Configurações</button>
          </div>}
        </div>}
      </div></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

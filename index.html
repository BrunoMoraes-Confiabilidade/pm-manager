<style>
*{margin:0;padding:0;box-sizing:border-box}html,body,#root{height:100%;width:100%}
body{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#0B1929;color:#F8FAFC;overflow-x:hidden}
input,textarea,button,select{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.fade-in{animation:fadeIn .4s ease}.slide-down{animation:slideDown .3s ease}
.app{min-height:100vh;position:relative;overflow:hidden}
/* ── Tema claro sob medida ──
   Inversão de luminância + leve dessaturação para um claro suave (não branco puro),
   preservando matiz das cores de destaque. Mídia é re-invertida. */
.app.light-theme{filter:invert(0.93) hue-rotate(180deg) saturate(1.05) contrast(0.95)}
.app.light-theme img,.app.light-theme .bg-photo,.app.light-theme .keep-color{filter:invert(1) hue-rotate(180deg) saturate(0.96) contrast(1.05)}
/* ── Tema Simples ──
   Usa o mesmo princípio do tema claro (inversão de luminância, 100% legível),
   porém mais branco/limpo e SEM foto de fundo, texturas, brilhos ou animações.
   O destaque das cores de status é preservado (re-invertido junto da mídia).
   IMPORTANTE: não definir background claro aqui — a inversão o tornaria escuro.
   Deixamos o fundo escuro do body ser invertido para claro, como no tema claro. */
.app.simple-theme{filter:invert(0.95) hue-rotate(180deg) saturate(1.1) contrast(0.98)}
.app.simple-theme img,.app.simple-theme .bg-photo,.app.simple-theme .keep-color{filter:invert(1) hue-rotate(180deg) saturate(0.91) contrast(1.02)}
/* menos poluição: sem animações de flutuar/pulsar e sem brilhos */
.app.simple-theme .dash-card .icon{animation:none!important}
.app.simple-theme .dash-card:hover{transform:none!important}
/* no tema simples: foto de fundo discreta (overlay mais forte) para os cards se destacarem */
.app.simple-theme .bg-photo-overlay{background:rgba(8,14,28,.88)!important}
/* cards/painéis SÓLIDOS no tema simples (sob inversão, dark sólido vira claro sólido),
   para destacarem do plano de fundo e melhorar a leitura */
.app.simple-theme [style*="rgba(15,23,42,.3"],
.app.simple-theme [style*="rgba(15,23,42,.4"],
.app.simple-theme [style*="rgba(15,23,42,.5"],
.app.simple-theme [style*="rgba(15,23,42,.6"],
.app.simple-theme [style*="rgba(15,23,42,.7"],
.app.simple-theme [style*="rgba(15,23,42,.8"],
.app.simple-theme [style*="rgba(11,25,41"],
.app.simple-theme [style*="rgba(8,14,28"]:not(.bg-photo-overlay),
.app.simple-theme .dash-card{
  background-color:#0e1d33!important;
  background-image:none!important;
  border:1px solid #24405f!important;
  box-shadow:0 4px 16px rgba(0,0,0,.45)!important;
  backdrop-filter:none!important;
}
/* o medidor/gauge e gradientes de painel também sólidos */
.app.simple-theme [style*="linear-gradient(135deg,rgba(15,23,42"]{
  background:#0e1d33!important;background-image:none!important;
}
/* ── Tamanho de fonte (P/M/G) ── escala proporcional de toda a interface.
   P = padrão (100%). M e G aumentam tudo de forma proporcional. */
.app.fs-p{zoom:1}
.app.fs-m{zoom:1.12}
.app.fs-g{zoom:1.25}
.app.fs-gg{zoom:1.4}
.app.fs-xg{zoom:1.6}
/* ── Estilo SAP PM (IW21) para a tela de Abrir Nota ── */
.sap{background:#e8eef3;color:#000;font-family:Arial,Helvetica,sans-serif;border:1px solid #b0c4d4;border-radius:4px;overflow:hidden}
.sap *{box-sizing:border-box}
.sap-title{background:linear-gradient(#f4f8fb,#dfe9f1);color:#0a3d62;font-weight:700;font-size:15px;padding:8px 12px;border-bottom:1px solid #b0c4d4}
.sap-toolbar{display:flex;gap:4px;align-items:center;padding:5px 8px;background:#dbe5ec;border-bottom:1px solid #b0c4d4;flex-wrap:wrap}
.sap-tbtn{background:#eef4f8;border:1px solid #a7bccd;border-radius:3px;padding:3px 7px;font-size:12px;cursor:pointer;color:#0a3d62}
.sap-tbtn:hover{background:#dceaf5}
.sap-hdr{display:flex;gap:8px;align-items:center;padding:6px 10px;background:#f0f5f9}
.sap-hdr label{font-size:12px;color:#333;min-width:90px}
.sap-tabs{display:flex;gap:2px;padding:6px 8px 0;background:#dbe5ec;border-bottom:1px solid #b0c4d4}
.sap-tab{background:#cddce7;border:1px solid #a7bccd;border-bottom:none;border-radius:5px 5px 0 0;padding:5px 16px;font-size:12px;cursor:pointer;color:#0a3d62}
.sap-tab.active{background:#f0f5f9;font-weight:700}
.sap-body{background:#f0f5f9;padding:12px}
.sap-group{border:1px solid #b9cad8;border-radius:3px;background:#fbfdff;margin-bottom:12px}
.sap-group-title{font-size:12px;font-weight:700;color:#0a3d62;padding:3px 10px;background:linear-gradient(#eef4f8,#e2ecf3);border-bottom:1px solid #cddce7;font-style:italic}
.sap-group-body{padding:10px}
.sap-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.sap-row label{font-size:12px;color:#222;min-width:120px;text-align:left}
.sap-inp{border:1px solid #8aa9c0;border-radius:2px;background:#fff;color:#000;font-size:12px;padding:3px 6px;outline:none;font-family:Arial}
.sap-inp:focus{border-color:#2563eb;box-shadow:0 0 0 1px #93c5fd}
.sap-inp:disabled,.sap-inp[readonly]{background:#eef2f5;color:#333}
.sap-area{border:1px solid #8aa9c0;border-radius:2px;background:#fff;color:#000;font-size:12px;padding:6px;outline:none;width:100%;resize:vertical;font-family:Arial;min-height:90px}
.sap-help{color:#5a6b78;font-size:11px}
/* Campos editáveis bem visíveis no tema escuro */
.app:not(.light-theme) .dcs-edit,.app:not(.light-theme) select.dcs-edit,.app:not(.light-theme) input.dcs-edit,.app:not(.light-theme) textarea.dcs-edit{background:rgba(37,99,235,.12)!important;border:1px solid rgba(96,165,250,.45)!important;box-shadow:inset 0 0 0 1px rgba(96,165,250,.08)}
.app:not(.light-theme) .dcs-edit:focus{border-color:#60A5FA!important;background:rgba(37,99,235,.2)!important}
.bg-texture{position:absolute;inset:0;background-image:radial-gradient(circle at 20% 50%,rgba(59,130,246,.08) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(245,158,11,.06) 0%,transparent 50%),radial-gradient(circle at 60% 80%,rgba(34,197,94,.05) 0%,transparent 50%)}
.bg-grad{position:absolute;inset:0;background:linear-gradient(135deg,rgba(11,25,41,.95),rgba(15,35,60,.9))}
.container{position:relative;z-index:1;display:flex;min-height:100vh;flex-wrap:wrap}
.left{flex:1 1 420px;display:flex;align-items:center;justify-content:center;padding:40px 32px;min-height:360px}
.left-inner{max-width:500px;text-align:center}
.right{flex:1 1 400px;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.form-area{width:100%;max-width:420px}
.brand-title{font-size:clamp(28px,4vw,44px);font-weight:800;line-height:1.15;margin-bottom:12px;letter-spacing:-.02em}
.brand-sub{font-size:clamp(13px,1.6vw,17px);color:#F59E0B;font-weight:600;letter-spacing:.15em;text-transform:uppercase;margin-bottom:32px}
.brand-footer{font-size:14px;color:#64748B;margin-top:24px;line-height:1.6;max-width:380px;margin-left:auto;margin-right:auto}
.logo-area{width:100px;height:100px;border-radius:16px;border:2px dashed #334155;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;cursor:pointer;overflow:hidden;background:rgba(15,23,42,.6);transition:border-color .3s}
.logo-area:hover{border-color:#60A5FA}
.logo-area img{width:100%;height:100%;object-fit:contain;padding:6px}
.logo-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;color:#64748B;font-size:11px;font-weight:500}
.form-block{background:rgba(15,23,42,.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(51,65,85,.5);border-radius:16px;padding:32px 28px}
.form-title{font-size:22px;font-weight:700;margin-bottom:6px}
.form-desc{font-size:14px;color:#94A3B8;margin-bottom:24px}
.label{display:block;font-size:13px;font-weight:600;color:#CBD5E1;margin:14px 0 6px}
.input-wrap{position:relative;display:flex;align-items:center;background:rgba(15,23,42,.7);border:1px solid #1E3A5F;border-radius:10px;transition:border-color .2s}
.input-wrap:focus-within{border-color:#3B82F6}
/* Campos do formulário A3 — alta visibilidade nos dois temas */
.a3-sec .input-wrap,.a3-sec textarea.input-field,.a3-sec .a3-cell{background:rgba(37,99,235,.10)!important;border:1.5px solid rgba(96,165,250,.55)!important;border-radius:10px}
.a3-sec .input-wrap:focus-within,.a3-sec textarea.input-field:focus,.a3-sec .a3-cell:focus{border-color:#3B82F6!important;background:rgba(37,99,235,.18)!important}
.a3-sec .label{color:#93C5FD}
.a3-cell{width:100%;color:#F1F5F9;font-size:13px;padding:8px 10px;outline:none}
.a3-cell::placeholder{color:#64748B}
.input-icon{position:absolute;left:12px;font-size:16px;pointer-events:none;display:flex;align-items:center}
.input-field{flex:1;background:transparent;border:none;outline:none;color:#F1F5F9;font-size:15px;padding:12px 12px 12px 40px;width:100%}
.input-field::placeholder{color:#475569}
.input-plain{padding-left:14px}
textarea.input-field{padding:12px 14px;resize:vertical;font-size:14px;border-radius:10px;background:rgba(15,23,42,.7);border:1px solid #1E3A5F;width:100%;margin-top:4px;color:#F1F5F9;outline:none}
.btn-primary{width:100%;padding:13px 20px;border:none;border-radius:10px;background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#FFF;font-size:15px;font-weight:700;cursor:pointer;margin-top:22px;box-shadow:0 4px 14px rgba(37,99,235,.3);display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s}
.btn-primary:hover{transform:translateY(-1px)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.eye-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:8px 12px}
.link-btn{background:none;border:none;color:#60A5FA;font-size:13px;cursor:pointer;font-weight:500;padding:0}
.links-row{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:18px;flex-wrap:wrap}
.admin-link{display:block;width:100%;text-align:center;background:none;border:none;color:#475569;font-size:12px;cursor:pointer;margin-top:14px;padding:4px}
.footer-text{text-align:center;color:#334155;font-size:12px;margin-top:24px}
.channel-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;border:1px solid;color:#FFF;font-size:14px;font-weight:600;cursor:pointer}
.channel-btn.whatsapp{background:#25D366;border-color:#25D366}
.channel-btn.teams{background:#5B5FC7;border-color:#5B5FC7}
.action-btn{flex:1;padding:10px;border-radius:8px;border:1px solid;font-size:13px;font-weight:700;cursor:pointer;text-align:center}
.action-btn.approve{background:rgba(34,197,94,.15);color:#22C55E;border-color:rgba(34,197,94,.2)}
.action-btn.reject{background:rgba(220,38,38,.15);color:#EF4444;border-color:rgba(220,38,38,.2)}
.tabs{display:flex;margin-bottom:20px;border-radius:8px;overflow:hidden;border:1px solid #1E3A5F}
.tab-btn{flex:1;padding:10px 4px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:rgba(15,23,42,.6);color:#94A3B8;transition:all .2s}
.tab-btn.active{background:#1D4ED8;color:#FFF}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:#0F172A;border:1px solid #1E3A5F;border-radius:16px;padding:28px;width:100%;max-height:85vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:18px;font-weight:700}
.close-btn{background:none;border:none;color:#64748B;font-size:18px;cursor:pointer;padding:4px 8px}
.toast{position:fixed;top:20px;right:20px;left:20px;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:2000;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:slideDown .3s ease}
.toast.success{background:#059669}.toast.error{background:#DC2626}.toast.info{background:#2563EB}
.req-card{border-radius:12px;padding:14px;margin-bottom:10px}
.req-card.pending{border:1px solid rgba(245,158,11,.2);background:rgba(245,158,11,.04)}
.req-card.resolved{border:1px solid #1E3A5F;background:rgba(15,23,42,.3)}
.req-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.req-body{color:#CBD5E1;font-size:13px;line-height:1.8}
.req-body strong{color:#F8FAFC}
.user-card{display:flex;justify-content:space-between;align-items:center;background:rgba(15,23,42,.4);border-radius:10px;padding:12px 14px;border:1px solid #1E3A5F;margin-bottom:8px}
.user-info{color:#CBD5E1;font-size:13px}.user-info .name{font-weight:700;color:#F8FAFC}.user-info .meta{color:#64748B;font-size:11px}
.admin-card{background:rgba(15,23,42,.4);border-radius:10px;padding:14px;border:1px solid #1E3A5F;margin-bottom:10px;position:relative}
.admin-card .remove{position:absolute;top:8px;right:10px;background:none;border:none;color:#64748B;cursor:pointer;font-size:14px}
.cfg-input{width:100%;background:rgba(15,23,42,.7);border:1px solid #1E3A5F;border-radius:8px;color:#F1F5F9;font-size:13px;padding:10px 12px;outline:none;box-sizing:border-box}
.cfg-input:focus{border-color:#3B82F6}.cfg-input::placeholder{color:#475569}
select.input-field{cursor:pointer;-webkit-appearance:auto;appearance:auto;background:transparent}
select.input-field option{background:#0F172A;color:#F1F5F9}
.cfg-row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}.cfg-row .cfg-input{flex:1;min-width:140px}
.empty{text-align:center;padding:40px 20px;color:#475569}.empty .icon{font-size:40px;margin-bottom:8px}
.pending-badge{background:#DC2626;color:#FFF;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;animation:pulse 2s infinite;position:absolute;top:-2px;margin-left:4px}
.notify-card{background:rgba(15,23,42,.5);border-radius:10px;padding:14px;border:1px solid #1E3A5F;margin-bottom:10px}
.warn-box{text-align:center;padding:20px;color:#F59E0B;font-size:13px;background:rgba(245,158,11,.08);border-radius:10px;border:1px solid rgba(245,158,11,.2);line-height:1.7}
.pw-strength{font-size:11px;margin-top:6px;font-weight:600}.pw-strength.weak{color:#EF4444}.pw-strength.medium{color:#F59E0B}.pw-strength.strong{color:#22C55E}
.export-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.export-bar .stats{color:#94A3B8;font-size:12px}.export-bar .stats strong{color:#F8FAFC}
.export-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid #166534;background:rgba(22,101,52,.2);color:#22C55E;font-size:13px;font-weight:600;cursor:pointer}
.filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-chip{padding:6px 12px;border-radius:20px;border:1px solid #1E3A5F;background:rgba(15,23,42,.6);color:#94A3B8;font-size:11px;font-weight:600;cursor:pointer}
.filter-chip.active{background:rgba(37,99,235,.2);border-color:#2563EB;color:#60A5FA}
.qr-card{background:white;border-radius:16px;padding:32px;text-align:center;max-width:360px;margin:0 auto}
.qr-card .qr-title{color:#0B1929;font-size:18px;font-weight:800;margin-bottom:4px}
.qr-card .qr-subtitle{color:#64748B;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px}
.qr-card .qr-container{display:inline-block;padding:12px;background:#FFF;border:3px solid #0B1929;border-radius:12px}
.qr-card .qr-url{color:#3B82F6;font-size:11px;margin-top:16px;word-break:break-all;font-weight:500}
.qr-card .qr-footer{color:#94A3B8;font-size:10px;margin-top:12px;border-top:1px solid #E2E8F0;padding-top:10px}
.qr-card .qr-logo-print{width:60px;height:60px;object-fit:contain;margin-bottom:10px;border-radius:8px}
.qr-actions{display:flex;gap:8px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.qr-action-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;border:1px solid;font-size:13px;font-weight:600;cursor:pointer}
.qr-action-btn.print{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.3);color:#60A5FA}
.qr-action-btn.download{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.3);color:#22C55E}
.qr-size-row{display:flex;gap:8px;justify-content:center;align-items:center}.qr-size-row label{color:#94A3B8;font-size:12px}
.qr-size-row select{background:rgba(15,23,42,.7);border:1px solid #1E3A5F;border-radius:6px;color:#F1F5F9;padding:6px 10px;font-size:12px;outline:none}
.sync-indicator{position:fixed;bottom:16px;right:16px;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;z-index:900;display:flex;align-items:center;gap:6px}
.sync-indicator.online{background:rgba(34,197,94,.15);color:#22C55E;border:1px solid rgba(34,197,94,.2)}
.super-admin-bar{position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,#7C3AED,#6D28D9);padding:8px 20px;display:flex;justify-content:space-between;align-items:center;z-index:500;font-size:13px;font-weight:600}
.super-admin-bar button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#FFF;padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600}
.sa-company-card{background:rgba(15,23,42,.4);border:1px solid #1E3A5F;border-radius:12px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.sa-company-card .info{flex:1}.sa-company-card .info .name{font-weight:700;color:#F8FAFC;font-size:15px}
.sa-company-card .info .detail{color:#64748B;font-size:12px;margin-top:2px}
.sa-company-card .actions{display:flex;gap:6px}.sa-company-card .actions button{background:none;border:none;cursor:pointer;font-size:16px;padding:4px}
.loading-spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.2);border-top-color:#60A5FA;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
/* ─── Dashboard ─── */
.dashboard{position:relative;z-index:1;min-height:100vh;padding:20px}
.dash-header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;flex-wrap:wrap;gap:12px;border-bottom:1px solid #1E3A5F;margin-bottom:30px}
.dash-header .left-h{display:flex;align-items:center;gap:14px}
.dash-header .company-logo{width:56px;height:56px;border-radius:12px;object-fit:contain;background:rgba(255,255,255,.05);padding:4px}
.dash-header .company-name{font-size:20px;font-weight:800}
.dash-header .user-name{color:#94A3B8;font-size:13px}
.dash-header .logout-btn{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.2);color:#EF4444;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;max-width:900px;margin:0 auto}
.dash-card{background:rgba(15,23,42,.5);backdrop-filter:blur(10px);border:1px solid rgba(51,65,85,.5);border-radius:16px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;gap:12px}
.dash-card:hover{border-color:#3B82F6;background:rgba(37,99,235,.08);transform:translateY(-4px);box-shadow:0 8px 30px rgba(37,99,235,.15)}
.dash-card .icon{font-size:36px;animation:float 3s ease-in-out infinite}
.dash-card .card-title{font-size:14px;font-weight:700;color:#F8FAFC}
.dash-card .card-desc{font-size:11px;color:#64748B;line-height:1.4}
.dash-card:nth-child(2) .icon{animation-delay:.3s}
.dash-card:nth-child(3) .icon{animation-delay:.6s}
.dash-card:nth-child(4) .icon{animation-delay:.9s}
.dash-card:nth-child(5) .icon{animation-delay:1.2s}
.dash-card:nth-child(6) .icon{animation-delay:1.5s}
.dash-card:nth-child(7) .icon{animation-delay:1.8s}
.dash-card:nth-child(8) .icon{animation-delay:2.1s}
/* ─── Report tables ─── */
.report-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:16px}
.report-table th{background:rgba(37,99,235,.15);color:#60A5FA;padding:10px 12px;text-align:left;font-weight:700;font-size:12px;border-bottom:1px solid #1E3A5F}
.report-table td{padding:10px 12px;border-bottom:1px solid rgba(30,58,95,.4);color:#CBD5E1}
.report-table tr:hover td{background:rgba(37,99,235,.04)}
.back-btn{background:none;border:1px solid #1E3A5F;color:#60A5FA;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.back-btn:hover{border-color:#3B82F6;background:rgba(37,99,235,.08)}
@media print{body *{visibility:hidden}.qr-print-area,.qr-print-area *{visibility:visible}.qr-print-area{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%)}}
@media(max-width:480px){.left{padding:30px 20px;min-height:280px}.right{padding:20px 16px}.form-block{padding:24px 20px}.modal{padding:20px}.brand-footer{display:none}.dash-grid{grid-template-columns:repeat(2,1fr);gap:12px}.dash-card{padding:20px 14px}.dash-card .icon{font-size:28px}}
</style>

// ─── Fila de gravações offline (outbox) + cache local de dados ───
const OUTBOX_KEY="pm-manager-outbox";
const loadOutbox=()=>{try{return JSON.parse(localStorage.getItem(OUTBOX_KEY)||"[]")}catch{return[]}};
const saveOutbox=(q)=>{try{localStorage.setItem(OUTBOX_KEY,JSON.stringify(q))}catch{}};
const queueOp=(op)=>{const q=loadOutbox();q.push({...op,ts:Date.now()});saveOutbox(q);window.dispatchEvent(new Event("pmq-change"));window.dispatchEvent(new Event("pmq-queued"))};

// Cache local de leituras (para abrir offline e ver últimos dados)
const cacheGet=(p)=>{try{const v=localStorage.getItem("pmc:"+p);return v?JSON.parse(v):undefined}catch{return undefined}};
const cacheSet=(p,d)=>{try{localStorage.setItem("pmc:"+p,JSON.stringify(d))}catch{}};
// Aplica as gravações PENDENTES (fila offline) sobre os dados lidos,
// para a tela refletir as edições feitas offline mesmo após recarregar o app.
const applyOutbox=(p,data)=>{
  const q=loadOutbox();if(!q.length)return data;
  let d;try{d=(data===null||data===undefined)?null:JSON.parse(JSON.stringify(data))}catch{d=data}
  const prefix=p+"/";
  q.forEach(op=>{
    try{
      if(op.path===p){
        if(op.method==="PUT")d=op.body;
        else if(op.method==="PATCH")d=(d&&typeof d==="object")?{...d,...op.body}:op.body;
        else if(op.method==="DELETE")d=null;
        else if(op.method==="POST"){if(d===null||typeof d!=="object")d={};d["off_"+op.ts]=op.body}
        return;
      }
      if(!op.path.startsWith(prefix))return;
      const segs=op.path.slice(prefix.length).split("/");
      if(d===null||typeof d!=="object")d={};
      let node=d;
      for(let i=0;i<segs.length-1;i++){const s=segs[i];if(node[s]===null||typeof node[s]!=="object")node[s]={};node=node[s]}
      const last=segs[segs.length-1];
      if(op.method==="PUT")node[last]=op.body;
      else if(op.method==="PATCH")node[last]=(node[last]&&typeof node[last]==="object")?{...node[last],...op.body}:op.body;
      else if(op.method==="DELETE")delete node[last];
      else if(op.method==="POST"){if(node[last]===null||typeof node[last]!=="object")node[last]={};node[last]["off_"+op.ts]=op.body}
    }catch{}
  });
  return d;
};
const api={
  async get(p){try{const r=await fetch(`${FB}/${p}.json`);const j=await r.json();cacheSet(p,j);return applyOutbox(p,j)}catch{const c=cacheGet(p);return applyOutbox(p,c!==undefined?c:null)}},
  async set(p,d){try{const r=await fetch(`${FB}/${p}.json`,{method:"PUT",body:JSON.stringify(d),headers:{"Content-Type":"application/json"}});if(!r.ok)throw 0;return true}catch{queueOp({method:"PUT",path:p,body:d});return"queued"}},
  async patch(p,d){try{const r=await fetch(`${FB}/${p}.json`,{method:"PATCH",body:JSON.stringify(d),headers:{"Content-Type":"application/json"}});if(!r.ok)throw 0;return true}catch{queueOp({method:"PATCH",path:p,body:d});return"queued"}},
  async del(p){try{const r=await fetch(`${FB}/${p}.json`,{method:"DELETE"});if(!r.ok)throw 0;return true}catch{queueOp({method:"DELETE",path:p});return"queued"}},
  async push(p,d){try{const r=await fetch(`${FB}/${p}.json`,{method:"POST",body:JSON.stringify(d),headers:{"Content-Type":"application/json"}});if(!r.ok)throw 0;return true}catch{queueOp({method:"POST",path:p,body:d});return"queued"}},
};
// Envia a fila pendente quando há internet
let _flushing=false;
async function flushOutbox(){
  if(_flushing||!navigator.onLine)return{sent:0,left:loadOutbox().length};
  _flushing=true;let sent=0;
  try{
    let q=loadOutbox();
    while(q.length){
      const op=q[0];
      try{
        const opts={method:op.method,headers:{"Content-Type":"application/json"}};
        if(op.body!==undefined)opts.body=JSON.stringify(op.body);
        const r=await fetch(`${FB}/${op.path}.json`,opts);
        if(!r.ok)throw 0;
        q.shift();saveOutbox(q);sent++;
      }catch(e){break;} // para na primeira falha; tenta de novo depois
    }
  }finally{_flushing=false;}
  window.dispatchEvent(new Event("pmq-change"));
  return{sent,left:loadOutbox().length};
}
window.addEventListener("online",()=>{flushOutbox();});

function genUniqueId(prefix,existing){

// ═══ Gráfico A3 (SVG puro) ═══
function A3Chart({type,data,cols,title,legend,size,colors}){
  const COLORS=(colors&&colors.length)?colors:["#3B82F6","#22C55E","#F59E0B","#EF4444","#A855F7","#06B6D4","#EC4899","#10B981","#F97316","#8B5CF6"];
  const rows=(data||[]).filter(r=>cols.some(c=>String(r[c]||"").trim()!==""));
  const Wrap=({children})=><div>{title&&<div style={{textAlign:"center",color:"#F1F5F9",fontWeight:700,fontSize:13,marginBottom:6}}>{title}</div>}{children}{legend&&<div style={{textAlign:"center",color:"#94A3B8",fontSize:11,marginTop:6,fontStyle:"italic"}}>{legend}</div>}</div>;
  if(rows.length===0)return<Wrap><div style={{padding:20,textAlign:"center",color:"#475569",fontSize:12}}>Preencha a tabela acima para gerar o gráfico.</div></Wrap>;
  const W=640,H=300,P=46;
  const num=(v)=>{const n=parseFloat(String(v).replace(",","."));return isNaN(n)?0:n};

  // PIZZA
  if(type==="Pizza"){
    const cat=cols[0],val=cols[1];
    const vals=rows.map(r=>({label:r[cat]||"—",value:num(r[val])}));
    const total=vals.reduce((s,v)=>s+v.value,0)||1;
    let ang=-Math.PI/2;const cx=150,cy=150,rad=110;
    const slices=vals.map((v,i)=>{const frac=v.value/total;const a2=ang+frac*Math.PI*2;const x1=cx+rad*Math.cos(ang),y1=cy+rad*Math.sin(ang),x2=cx+rad*Math.cos(a2),y2=cy+rad*Math.sin(a2);const large=frac>.5?1:0;const mid=ang+frac*Math.PI;ang=a2;return{d:`M${cx},${cy} L${x1},${y1} A${rad},${rad} 0 ${large},1 ${x2},${y2} Z`,color:COLORS[i%COLORS.length],label:v.label,value:v.value,pct:(frac*100).toFixed(1),lx:cx+(rad*.6)*Math.cos(mid),ly:cy+(rad*.6)*Math.sin(mid)}});
    return<Wrap><div style={{display:"flex",flexWrap:"wrap",gap:16,alignItems:"center",justifyContent:"center"}}>
    <svg viewBox="0 0 300 300" style={{width:size||240,height:size||240}}>{slices.map((s,i)=><path key={i} d={s.d} fill={s.color} stroke="#0B1929" strokeWidth="2"/>)}{slices.filter(s=>s.pct>5).map((s,i)=><text key={i} x={s.lx} y={s.ly} fill="#fff" fontSize="11" fontWeight="700" textAnchor="middle">{s.pct}%</text>)}</svg>
    <div style={{display:"flex",flexDirection:"column",gap:6}}>{slices.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:size?14:12,color:"#CBD5E1"}}><span style={{width:12,height:12,borderRadius:3,background:s.color}}/>{s.label}: <strong>{s.value}</strong> ({s.pct}%)</div>)}</div>
    </div></Wrap>;
  }

  // BARRA
  if(type==="Barra"){
    const cat=cols[0],val=cols[1];
    const vals=rows.map(r=>({label:String(r[cat]||"—"),value:num(r[val])}));
    const max=Math.max(...vals.map(v=>v.value),1);
    const BP=78;// espaço inferior maior p/ rótulos
    const bw=(W-2*P)/vals.length;
    // quebra o rótulo em até 3 linhas conforme a largura da barra
    const wrap=(txt,bw)=>{const maxch=Math.max(5,Math.floor(bw/5.2));const words=String(txt).split(/\s+/);const lines=[];let cur="";words.forEach(w=>{if((cur+" "+w).trim().length<=maxch){cur=(cur+" "+w).trim()}else{if(cur)lines.push(cur);if(w.length>maxch){for(let i=0;i<w.length&&lines.length<3;i+=maxch)lines.push(w.slice(i,i+maxch));cur=""}else cur=w}});if(cur&&lines.length<3)lines.push(cur);if(lines.length>3){lines.length=3;lines[2]=lines[2].slice(0,maxch-1)+"…"}return lines};
    return<Wrap><svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W}}>
    {[0,.25,.5,.75,1].map(t=>{const y=H-BP-(H-P-BP)*t;return<g key={t}><line x1={P} y1={y} x2={W-10} y2={y} stroke="#1E3A5F" strokeWidth="1"/><text x={P-6} y={y+3} fill="#64748B" fontSize="9" textAnchor="end">{Math.round(max*t)}</text></g>})}
    {vals.map((v,i)=>{const bh=(H-P-BP)*(v.value/max);const x=P+i*bw+bw*.15;const y=H-BP-bh;const lines=wrap(v.label,bw*.94);return<g key={i}><rect x={x} y={y} width={bw*.7} height={bh} fill={COLORS[i%COLORS.length]} rx="3"/><text x={x+bw*.35} y={y-4} fill="#CBD5E1" fontSize="10" fontWeight="700" textAnchor="middle">{v.value}</text>{lines.map((ln,li)=><text key={li} x={x+bw*.35} y={H-BP+13+li*10} fill="#94A3B8" fontSize="8.5" textAnchor="middle">{ln}</text>)}</g>})}
    </svg></Wrap>;
  }

  // PARETO (barras desc + linha cumulativa)
  if(type==="Pareto"){
    const cat=cols[0],val=cols[1];
    const vals=rows.map(r=>({label:String(r[cat]||"—"),value:num(r[val])})).sort((a,b)=>b.value-a.value);
    const total=vals.reduce((s,v)=>s+v.value,0)||1;const max=Math.max(...vals.map(v=>v.value),1);
    const BP=72;const bw=(W-2*P)/vals.length;let cum=0;const pts=[];
    const wrap=(txt,bw)=>{const maxch=Math.max(5,Math.floor(bw/5.2));const words=String(txt).split(/\s+/);const lines=[];let cur="";words.forEach(w=>{if((cur+" "+w).trim().length<=maxch){cur=(cur+" "+w).trim()}else{if(cur)lines.push(cur);if(w.length>maxch){for(let i=0;i<w.length&&lines.length<3;i+=maxch)lines.push(w.slice(i,i+maxch));cur=""}else cur=w}});if(cur&&lines.length<3)lines.push(cur);if(lines.length>3){lines.length=3;lines[2]=lines[2].slice(0,maxch-1)+"…"}return lines};
    vals.forEach((v,i)=>{cum+=v.value;pts.push({x:P+i*bw+bw*.5,y:H-BP-(H-P-BP)*(cum/total),pct:(cum/total*100).toFixed(0)})});
    return<Wrap><svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W}}>
    {[0,.25,.5,.75,1].map(t=>{const y=H-BP-(H-P-BP)*t;return<g key={t}><line x1={P} y1={y} x2={W-P} y2={y} stroke="#1E3A5F" strokeWidth="1"/><text x={P-6} y={y+3} fill="#64748B" fontSize="9" textAnchor="end">{Math.round(max*t)}</text><text x={W-P+6} y={y+3} fill="#F59E0B" fontSize="9">{Math.round(100*t)}%</text></g>})}
    {vals.map((v,i)=>{const bh=(H-P-BP)*(v.value/max);const x=P+i*bw+bw*.15;const lines=wrap(v.label,bw*.94);return<g key={i}><rect x={x} y={H-BP-bh} width={bw*.7} height={bh} fill="#3B82F6" rx="2"/>{lines.map((ln,li)=><text key={li} x={x+bw*.35} y={H-BP+13+li*10} fill="#94A3B8" fontSize="8.5" textAnchor="middle">{ln}</text>)}</g>})}
    <polyline points={pts.map(p=>`${p.x},${p.y}`).join(" ")} fill="none" stroke="#F59E0B" strokeWidth="2.5"/>
    {pts.map((p,i)=><g key={i}><circle cx={p.x} cy={p.y} r="4" fill="#F59E0B"/><text x={p.x} y={p.y-8} fill="#F59E0B" fontSize="9" fontWeight="700" textAnchor="middle">{p.pct}%</text></g>)}
    </svg></Wrap>;
  }

  // CARTA DE CONTROLE (valor + LSC/LM/LIC)
  if(type==="Carta de Controle"){
    const[amostra,valor,lsc,lm,lic]=cols;
    const vals=rows.map(r=>({label:r[amostra]||"",v:num(r[valor]),lsc:num(r[lsc]),lm:num(r[lm]),lic:num(r[lic])}));
    const allN=vals.flatMap(v=>[v.v,v.lsc,v.lm,v.lic]).filter(n=>n!==0);
    const max=Math.max(...allN,1),min=Math.min(...allN,0);const range=(max-min)||1;
    const sx=(i)=>P+(W-2*P)*(vals.length>1?i/(vals.length-1):.5);
    const sy=(v)=>H-P-(H-2*P)*((v-min)/range);
    const line=(key,color,dash)=><polyline points={vals.map((v,i)=>`${sx(i)},${sy(v[key])}`).join(" ")} fill="none" stroke={color} strokeWidth={key==="v"?2.5:1.5} strokeDasharray={dash||"none"}/>;
    return<Wrap><svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W}}>
    {[0,.25,.5,.75,1].map(t=>{const y=H-P-(H-2*P)*t;return<g key={t}><line x1={P} y1={y} x2={W-10} y2={y} stroke="#1E3A5F" strokeWidth="1"/><text x={P-6} y={y+3} fill="#64748B" fontSize="9" textAnchor="end">{(min+range*t).toFixed(1)}</text></g>})}
    {vals.some(v=>v.lsc)&&line("lsc","#EF4444","5,4")}
    {vals.some(v=>v.lm)&&line("lm","#22C55E","5,4")}
    {vals.some(v=>v.lic)&&line("lic","#EF4444","5,4")}
    {line("v","#3B82F6")}
    {vals.map((v,i)=>{const out=(v.lsc&&v.v>v.lsc)||(v.lic&&v.v<v.lic);return<g key={i}><circle cx={sx(i)} cy={sy(v.v)} r="4" fill={out?"#EF4444":"#3B82F6"}/><text x={sx(i)} y={H-P+14} fill="#94A3B8" fontSize="9" textAnchor="middle">{v.label}</text></g>})}
    <g transform={`translate(${P},12)`}><circle cx="0" cy="0" r="4" fill="#3B82F6"/><text x="8" y="3" fill="#94A3B8" fontSize="9">Valor</text><line x1="55" y1="0" x2="75" y2="0" stroke="#EF4444" strokeWidth="1.5" strokeDasharray="5,4"/><text x="80" y="3" fill="#94A3B8" fontSize="9">LSC/LIC</text><line x1="135" y1="0" x2="155" y2="0" stroke="#22C55E" strokeWidth="1.5" strokeDasharray="5,4"/><text x="160" y="3" fill="#94A3B8" fontSize="9">Média</text></g>
    </svg></Wrap>;
  }

  // GRÁFICO DE TENDÊNCIA (linha)
  const cat=cols[0],val=cols[1];
  const vals=rows.map(r=>({label:String(r[cat]||""),value:num(r[val])}));
  const max=Math.max(...vals.map(v=>v.value),1),min=Math.min(...vals.map(v=>v.value),0);const range=(max-min)||1;
  const BP=58;const sx=(i)=>P+(W-2*P)*(vals.length>1?i/(vals.length-1):.5);
  const sy=(v)=>H-BP-(H-P-BP)*((v-min)/range);
  const wrapL=(txt)=>{const maxch=10;const words=String(txt).split(/\s+/);const lines=[];let cur="";words.forEach(w=>{if((cur+" "+w).trim().length<=maxch){cur=(cur+" "+w).trim()}else{if(cur)lines.push(cur);cur=w}});if(cur&&lines.length<2)lines.push(cur);if(lines.length>2){lines.length=2;lines[1]=lines[1].slice(0,maxch-1)+"…"}return lines};
  return<Wrap><svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W}}>
  {[0,.25,.5,.75,1].map(t=>{const y=H-BP-(H-P-BP)*t;return<g key={t}><line x1={P} y1={y} x2={W-10} y2={y} stroke="#1E3A5F" strokeWidth="1"/><text x={P-6} y={y+3} fill="#64748B" fontSize="9" textAnchor="end">{(min+range*t).toFixed(1)}</text></g>})}
  <polyline points={vals.map((v,i)=>`${sx(i)},${sy(v.value)}`).join(" ")} fill="none" stroke="#3B82F6" strokeWidth="2.5"/>
  {vals.map((v,i)=><g key={i}><circle cx={sx(i)} cy={sy(v.value)} r="4" fill="#3B82F6"/><text x={sx(i)} y={sy(v.value)-8} fill="#CBD5E1" fontSize="9" fontWeight="700" textAnchor="middle">{v.value}</text>{wrapL(v.label).map((ln,li)=><text key={li} x={sx(i)} y={H-BP+14+li*10} fill="#94A3B8" fontSize="8.5" textAnchor="middle">{ln}</text>)}</g>)}
  </svg></Wrap>;
}

// ─── Init ───
useEffect(()=>{
  const sess=loadSession();
  // 1) Restauração INSTANTÂNEA a partir do cache local (sem esperar a rede)
  if(sess&&sess.companyId&&sess.matricula){
    const cComps=cacheGet("companies");
    const cdata=cComps&&cComps[sess.companyId];
    const u=cdata&&cdata.users?Object.values(cdata.users).find(x=>x.matricula===sess.matricula&&x.status==="approved"):null;
    if(u&&!u.mustChangePassword){
      setCompanies(Object.entries(cComps).map(([k,v])=>({id:k,...v})));
      setCurrentCompany({id:sess.companyId,...cdata});
      setLoggedUser({...u,role:u.role||"colaborador",permissions:u.permissions||{}});
      setPhase("dashboard");setSynced(true);
    }else{setPhase("main")}
  }else{setPhase("main")}
  // 2) Revalidação em segundo plano (atualiza dados/sessão sem travar a abertura)
  (async()=>{
    const[sa,comps]=await Promise.all([api.get("superadmin"),api.get("companies")]);
    if(sa)setSaCfg(sa);else await api.set("superadmin",{pin:"admin2024"});
    if(comps){setCompanies(Object.entries(comps).map(([k,v])=>({id:k,...v})))}
    const s2=loadSession();
    if(s2&&s2.companyId&&s2.matricula&&comps&&comps[s2.companyId]){
      const cdata=comps[s2.companyId];
      const u=cdata.users?Object.values(cdata.users).find(x=>x.matricula===s2.matricula&&x.status==="approved"):null;
      if(u&&!u.mustChangePassword){
        setCurrentCompany(prev=>prev&&prev.id===s2.companyId?prev:{id:s2.companyId,...cdata});
        setLoggedUser(prev=>prev||{...u,role:u.role||"colaborador",permissions:u.permissions||{}});
        setPhase(prev=>prev==="loading"?"dashboard":prev);
      }else if(!u){clearSession();setPhase(prev=>prev==="dashboard"?"main":prev)}
    }
    setSynced(true);setPhase(prev=>prev==="loading"?"main":prev);
    flushOutbox();
  })();
},[]);

// ─── LOGIN: search all companies ───
const handleLogin=async()=>{
  if(!mat||!pw){notify("Preencha matrícula e senha.","error");return}
  setSearching(true);
  try{
    const comps=await api.get("companies");
    if(!comps){notify("Nenhuma empresa.","error");setSearching(false);return}
    for(const[cid,cdata]of Object.entries(comps)){
      if(cdata.users){
        const u=Object.values(cdata.users).find(x=>x.matricula===mat&&x.status==="approved");
        if(u){
          if(u.password!==pw){notify("Senha incorreta.","error");setSearching(false);return}
          setCurrentCompany({id:cid,...cdata});setLoggedUser({...u,role:u.role||"colaborador",permissions:u.permissions||{}});
          if(u.mustChangePassword){setScreen("changePw");setPhase("main");notify("Primeiro acesso — crie nova senha.","info");setSearching(false);return}
          saveSession({companyId:cid,matricula:u.matricula});
          setPhase("dashboard");notify(`Bem-vindo(a), ${u.name}!`,"success");setSearching(false);return;
        }
      }
    }
    notify("Matrícula não encontrada ou acesso pendente.","error");
  }catch{notify("Erro de conexão.","error")}
  setSearching(false);
};

// ─── REGISTER ───
const handleRegister=async()=>{
  if(!regName||!regMat||!regEmail||!regCode){notify("Preencha todos os campos obrigatórios.","error");return}
  if(!regPw||regPw.length<4){notify("Senha mín. 4 caracteres.","error");return}
  if(regPw!==regPwC){notify("Senhas não coincidem.","error");return}
  setSearching(true);
  try{
    const comps=await api.get("companies");
    if(!comps){notify("Nenhuma empresa.","error");setSearching(false);return}
    let target=null;
    for(const[cid,cdata]of Object.entries(comps)){
      if(cdata.name&&cdata.name.toUpperCase()===regCode.toUpperCase()){target={id:cid,...cdata};break}
    }
    if(!target){notify("Nome de empresa não encontrado. Verifique com o Gerente.","error");setSearching(false);return}
    const existReqs=await api.get(`companies/${target.id}/requests`);
    if(existReqs&&Object.values(existReqs).find(r=>r.matricula===regMat&&r.type==="register"&&r.status==="pending")){notify("Já existe solicitação pendente.","error");setSearching(false);return}
    const req={id:Date.now().toString(),type:"register",name:regName,matricula:regMat,email:regEmail,area:regArea||"—",justification:regJust||"—",password:regPw,date:new Date().toLocaleString("pt-BR"),status:"pending"};
    const upd=existReqs?{...existReqs,[req.id]:req}:{[req.id]:req};
    await api.set(`companies/${target.id}/requests`,upd);
    await logUser("Solicitação de Cadastro",`${regName} (${regMat}) → ${target.name}`);
    const tcfg=await api.get(`companies/${target.id}/config`);
    setCurrentCompany(target);if(tcfg)setCfg(p=>({...p,...tcfg}));
    setLastReq(req);setShowNotify(true);
    notify(`✅ Cadastro enviado para ${target.name}!`,"success");
    setRegName("");setRegMat("");setRegEmail("");setRegArea("");setRegJust("");setRegPw("");setRegPwC("");setRegCode("");setScreen("login");
  }catch{notify("Erro.","error")}
  setSearching(false);
};

const handleRecovery=async()=>{
  if(!recMat||!recEmail){notify("Preencha.","error");return}
  setSearching(true);
  try{
    const comps=await api.get("companies");
    let target=null;
    for(const[cid,cdata]of Object.entries(comps||{})){
      if(cdata.users){const u=Object.values(cdata.users).find(x=>x.matricula===recMat);if(u){target={id:cid,...cdata};break}}
    }
    if(!target){notify("Matrícula não encontrada.","error");setSearching(false);return}
    const req={id:Date.now().toString(),type:"recovery",matricula:recMat,email:recEmail,date:new Date().toLocaleString("pt-BR"),status:"pending"};
    const exist=await api.get(`companies/${target.id}/requests`)||{};
    await api.set(`companies/${target.id}/requests`,{...exist,[req.id]:req});
    const tcfg=await api.get(`companies/${target.id}/config`);
    setCurrentCompany(target);if(tcfg)setCfg(p=>({...p,...tcfg}));
    setLastReq(req);setShowNotify(true);
    notify("✅ Recuperação enviada!","success");setRecMat("");setRecEmail("");setScreen("login");
  }catch{notify("Erro.","error")}
  setSearching(false);
};

// Status que IMPACTAM no absenteísmo (faltas não justificadas adequadamente):
const STATUS_ABSENTEISMO=["Falta","Atestado"];
// Status que NÃO impactam (presenças e ausências justificadas/programadas):
const STATUS_NAO_ABSENTEISMO=["Presente","Folga","Férias","Afastado","Treinamento","Hora Extra","Emprestado"];
const getDateRange=(start,end)=>{const dates=[];const s=new Date(start+"T12:00:00");const e=new Date(end+"T12:00:00");for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){dates.push(d.toISOString().slice(0,10))}return dates};
const getStatusForDate=(matricula,dateStr,turno)=>{const[y,m,d]=dateStr.split("-");const monthKey=`${y}-${m}`;const key=`${monthKey}_${matricula}_${parseInt(d)}`;return hcOverrides[key]||getDefaultStatus(turno,dateStr)};
const calcAbsenteismo=(start,end,terminal,centro)=>{
  const dates=getDateRange(start,end);
  const byTurno={A:{worked:0,absent:0,total:0},B:{worked:0,absent:0,total:0},C:{worked:0,absent:0,total:0},D:{worked:0,absent:0,total:0},ADM:{worked:0,absent:0,total:0}};
  let totWorked=0,totAbsent=0;
  const filtered=hcList.filter(h=>(!terminal||h.terminal===terminal)&&(!centro||h.centroTrabalho===centro));
  filtered.forEach(h=>{
    if(!byTurno[h.turno])return;
    dates.forEach(ds=>{
      const st=getStatusForDate(h.matricula,ds,h.turno);
      byTurno[h.turno].total++;
      if(STATUS_ABSENTEISMO.includes(st)){byTurno[h.turno].absent++;totAbsent++;byTurno[h.turno].worked++;totWorked++}
      else if(st==="Presente"||st==="Hora Extra"||st==="Emprestado"){byTurno[h.turno].worked++;totWorked++}
    });
  });
  const result={};
  Object.keys(byTurno).forEach(t=>{const v=byTurno[t];result[t]={...v,rate:v.worked>0?(v.absent/v.worked*100):0}});
  return{byTurno:result,totalRate:totWorked>0?(totAbsent/totWorked*100):0,totWorked,totAbsent,collaborators:filtered.length};
};

// Escala de Folga: cycle of 8 days starting 2025-01-01 = D
const ESCALA_CYCLE=["D","D","A","A","B","B","C","C"];
const ESCALA_BASE=new Date(2025,0,1);
const getDiaSemana=d=>{const n=["dom","seg","ter","qua","qui","sex","sáb"];return n[d.getDay()]};
const getDiaSemanaFull=d=>{const n=["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];return n[d.getDay()]};
const getFolgaTurno=(dateStr)=>{const d=new Date(dateStr+"T12:00:00");const diff=Math.floor((d-ESCALA_BASE)/(86400000));const idx=((diff%8)+8)%8;return ESCALA_CYCLE[idx]};
const isAdmFolga=(dateStr)=>{const d=new Date(dateStr+"T12:00:00");const dow=d.getDay();return dow===0||dow===6};
const getDefaultStatus=(turno,dateStr)=>{if(turno==="ADM")return isAdmFolga(dateStr)?"Folga":"Presente";const folgaTurno=getFolgaTurno(dateStr);return turno===folgaTurno?"Folga":"Presente"};
const getMonthEscala=(monthStr)=>{const[y,m]=monthStr.split("-").map(Number);const days=[];const dt=new Date(y,m-1,1);while(dt.getMonth()===m-1){const ds=dt.toISOString().slice(0,10);days.push({date:ds,turno:getFolgaTurno(ds),diaSemana:getDiaSemana(dt),diaFull:getDiaSemanaFull(dt),dia:dt.getDate()});dt.setDate(dt.getDate()+1)}return days};

const exportSvgAsImage=(elId,filename)=>{
  const host=document.getElementById(elId);if(!host){notify("Gráfico não encontrado.","error");return}
  const svg=host.querySelector("svg");if(!svg){notify("Nenhum gráfico para exportar.","error");return}
  const clone=svg.cloneNode(true);
  const vb=svg.viewBox.baseVal;const w=(vb&&vb.width)||svg.clientWidth||700;const h=(vb&&vb.height)||svg.clientHeight||400;
  clone.setAttribute("width",w);clone.setAttribute("height",h);clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
  const data=new XMLSerializer().serializeToString(clone);
  const img=new Image();const svg64="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(data)));
  img.onload=()=>{const sc=2;const cv=document.createElement("canvas");cv.width=w*sc;cv.height=h*sc;const ctx=cv.getContext("2d");ctx.fillStyle="#0B1929";ctx.fillRect(0,0,cv.width,cv.height);ctx.scale(sc,sc);ctx.drawImage(img,0,0);cv.toBlob(b=>{const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=filename+".png";a.click();URL.revokeObjectURL(u);notify("📷 Gráfico exportado!","success")})};
  img.onerror=()=>notify("Erro ao gerar imagem.","error");
  img.src=svg64;
};

const handleDcsBulkUpload=(e)=>{
  const file=e.target.files[0];if(!file)return;
  e.target.value="";
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:"binary"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
      if(!rows.length){notify("Arquivo vazio.","error");return}
      // Validate columns
      const fileCols=Object.keys(rows[0]);
      const missing=DCS_COLUMNS.filter(c=>!fileCols.includes(c));
      if(missing.length){notify(`❌ Colunas faltando: ${missing.join(", ")}. Upload cancelado.`,"error");return}
      setDcsImportData(rows);setShowDcsImport(true);
    }catch(err){notify("Erro ao ler arquivo.","error")}
  };
  reader.readAsBinaryString(file);
};

<b>Legenda de Prioridade (SAP PM):</b><br/>
<b style={{color:"#b91c1c"}}>Alto</b> — Risco à segurança, qualidade, ao meio ambiente ou parada de produção. <i>Obs: Atendimento imediato via Nota Corretiva se o risco for eminente.</i><br/>
<b style={{color:"#b45309"}}>Médio</b> — Afeta o desempenho, a qualidade ou gera risco potencial.<br/>
<b style={{color:"#15803d"}}>Baixo</b> — Sem impacto imediato na operação.
</div>

<div className="sap-row"><label>Fim do trabalho</label><input type="checkbox" disabled={notaForm.tipo!=="P1"} checked={!!notaForm.confFimChk} onChange={upd("confFimChk")} style={{marginRight:6}}/><input id="nf-confFimData" className="sap-inp" type="date" disabled={notaForm.tipo!=="P1"} value={notaForm.confFimData||""} onChange={upd("confFimData")} style={{width:140,...(notaForm.tipo==="P1"?reqS("confFimData"):{background:"#eef1f4"}),...(dErrF.confFimData?{border:"1px solid #d97706",background:"#fff8ec"}:{})}}/><input id="nf-confFimHora" className="sap-inp" type="time" disabled={notaForm.tipo!=="P1"} value={notaForm.confFimHora||""} onChange={upd("confFimHora")} style={{width:90,...(notaForm.tipo==="P1"?reqS("confFimHora"):{background:"#eef1f4"}),...(dErrF.confFimHora?{border:"1px solid #d97706",background:"#fff8ec"}:{})}}/></div>
<div className="sap-row"><label>Txt.confirmação</label><input id="nf-confTexto" className="sap-inp" type="text" disabled={notaForm.tipo!=="P1"} value={notaForm.confTexto||""} onChange={upd("confTexto")} style={{flex:1,minWidth:240,...(notaForm.tipo==="P1"?reqS("confTexto"):{background:"#eef1f4"})}}/></div>

</div></div>
<div className="sap-group">
<div className="sap-group-title">Item</div>
<div className="sap-group-body">
<div className="sap-row"><label>Parte objeto</label><input className="sap-inp" style={{width:80}} value={notaForm.parteObjeto} disabled/></div>
<div className="sap-row"><label>Sintom.dano</label><input className="sap-inp" style={{width:80}} value={notaForm.sintomaDano} disabled/></div>
<div className="sap-row"><label>Texto</label><input className="sap-inp" style={{flex:1,minWidth:240}} value={notaForm.textoItem} disabled/></div>
<div className="sap-row"><label>Cód.causa</label><input className="sap-inp" style={{width:80}} value={notaForm.codCausa} disabled/></div>
<div className="sap-row"><label>Texto da causa</label><input className="sap-inp" style={{flex:1,minWidth:240}} value={notaForm.textoCausa} disabled/></div>
</div></div>
</>
</div>
</div>
<div style={{maxWidth:760,marginTop:12,display:"flex",gap:10}}>
<button className="btn-primary" style={{flex:1}} onClick={handleNotaSave}>{notaEditing?"💾 Salvar Alterações":"💾 Gravar Nota"}</button>

<div><label className="label">Prazo</label><div className="input-wrap"><span className="input-icon">📅</span><input className="input-field" type="date" value={a3Form.metaPrazo} onChange={e=>setA3Form(p=>({...p,metaPrazo:e.target.value}))}/></div></div>
</div>
</div>
</div>

{/* 2. Contexto e indicadores */}
<div className="a3-sec" style={{background:"rgba(15,23,42,.4)",border:"1px solid #1E3A5F",borderRadius:12,padding:18,marginBottom:16}}>
<div style={{color:"#60A5FA",fontSize:13,fontWeight:700,marginBottom:14}}>2️⃣ Contexto / Histórico e Indicadores</div>
<label className="label" style={{marginTop:0}}>Contexto / Histórico do Estado Atual</label>
<textarea className="input-field" style={{minHeight:80,paddingLeft:14,resize:"vertical"}} placeholder="Descreva a situação atual, histórico do problema..." value={a3Form.contexto} onChange={e=>setA3Form(p=>({...p,contexto:e.target.value}))}/>
<label className="label">🔢 Nº da Nota ou Ordem de Manutenção (opcional)</label>
<div className="input-wrap"><span className="input-icon">🔢</span><input className="input-field" placeholder="Ex: 100234567 (opcional)" value={a3Form.numNota} onChange={e=>setA3Form(p=>({...p,numNota:e.target.value}))}/></div>
<label className="label">🎯 Problema a ser Tratado</label>
<div className="input-wrap"><span className="input-icon">❗</span><input className="input-field" placeholder="Defina claramente o problema (será a cabeça do peixe no Ishikawa)" value={a3Form.problema} onChange={e=>setA3Form(p=>({...p,problema:e.target.value}))}/></div>
<label className="label">Tipo de Indicador</label>
<div className="input-wrap"><span className="input-icon">📈</span><select className="input-field" style={{paddingLeft:40}} value={a3Form.indicadorTipo} onChange={e=>setA3Form(p=>({...p,indicadorTipo:e.target.value,indicadorDados:[]}))}>{A3_IND_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
<div><label className="label">🏷 Título do Gráfico (aparece no topo)</label><div className="input-wrap"><span className="input-icon">🏷</span><input className="input-field" placeholder="Ex: Falhas por mês" value={a3Form.indicadorTitulo} onChange={e=>setA3Form(p=>({...p,indicadorTitulo:e.target.value}))}/></div></div>
<div><label className="label">🔖 Legenda dos Rótulos</label><div className="input-wrap"><span className="input-icon">🔖</span><input className="input-field" placeholder="Ex: Fonte: SAP PM · 2025" value={a3Form.indicadorLegenda} onChange={e=>setA3Form(p=>({...p,indicadorLegenda:e.target.value}))}/></div></div>
</div>
{/* Tabela de dados do indicador conforme o tipo */}
<div style={{marginTop:12,background:"rgba(11,25,41,.5)",borderRadius:10,padding:12,border:"1px solid #1E3A5F"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
<span style={{color:"#94A3B8",fontSize:12,fontWeight:700}}>📋 Dados para o {a3Form.indicadorTipo}</span>
<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
<button style={{background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",color:"#F59E0B",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}} onClick={()=>a3IndModelDownload(a3Form.indicadorTipo,a3Form.indicadorDados)}>📥 Modelo Excel</button>
<label style={{background:"rgba(34,197,94,.1)",border:"1px solid rgba(34,197,94,.3)",color:"#22C55E",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>📤 Upload Dados<input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>a3IndUpload(a3Form.indicadorTipo,e)}/></label>
<button style={{background:"rgba(59,130,246,.12)",border:"1px solid rgba(59,130,246,.3)",color:"#60A5FA",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}} onClick={()=>setA3Form(p=>{const cols=A3_IND_TEMPLATES[p.indicadorTipo]||["Categoria","Valor"];const row={};cols.forEach(c=>row[c]="");return{...p,indicadorDados:[...p.indicadorDados,row]}})}>+ Linha</button>
</div>
</div>
<div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
<thead><tr>{(A3_IND_TEMPLATES[a3Form.indicadorTipo]||["Categoria","Valor"]).map(c=><th key={c} style={{textAlign:"left",color:"#60A5FA",padding:"6px 8px",borderBottom:"1px solid #1E3A5F",fontSize:11,whiteSpace:"nowrap"}}>{c}</th>)}<th style={{width:30,borderBottom:"1px solid #1E3A5F"}}></th></tr></thead>
<tbody>
{a3Form.indicadorDados.length===0?<tr><td colSpan={(A3_IND_TEMPLATES[a3Form.indicadorTipo]||["x","y"]).length+1} style={{padding:"10px 8px",color:"#64748B",fontSize:11}}>Clique em "+ Linha" ou faça upload pelo modelo.</td></tr>:
a3Form.indicadorDados.map((row,ri)=><tr key={ri}>
{(A3_IND_TEMPLATES[a3Form.indicadorTipo]||["Categoria","Valor"]).map(c=><td key={c} style={{padding:"4px 6px"}}><input className="a3-cell" value={row[c]||""} onChange={e=>setA3Form(p=>{const dd=[...p.indicadorDados];dd[ri]={...dd[ri],[c]:e.target.value};return{...p,indicadorDados:dd}})} style={{minWidth:90}}/></td>)}
<td style={{padding:"4px 6px",textAlign:"center"}}><button style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:14}} onClick={()=>setA3Form(p=>({...p,indicadorDados:p.indicadorDados.filter((_,x)=>x!==ri)}))}>✕</button></td>
</tr>)}
</tbody></table></div>
<p style={{color:"#64748B",fontSize:10,marginTop:8}}>💡 Padrão de preenchimento do {a3Form.indicadorTipo}: {(A3_IND_TEMPLATES[a3Form.indicadorTipo]||[]).join(" · ")}</p>
{a3Form.indicadorDados.length>0&&<div style={{marginTop:14,background:"rgba(8,14,28,.6)",borderRadius:10,padding:14,border:"1px solid #1E3A5F"}}>
<div style={{color:"#22C55E",fontSize:12,fontWeight:700,marginBottom:10}}>📊 Gráfico Gerado</div>
<A3Chart type={a3Form.indicadorTipo} data={a3Form.indicadorDados} cols={A3_IND_TEMPLATES[a3Form.indicadorTipo]||["Categoria","Valor"]} title={a3Form.indicadorTitulo} legend={a3Form.indicadorLegenda}/>
</div>}
</div>
<label className="label">Observações do Indicador (valores, período, fonte)</label>
<textarea className="input-field" style={{minHeight:50,paddingLeft:14,resize:"vertical"}} placeholder="Ex: 12 falhas no último trimestre, tendência crescente" value={a3Form.indicadorObs} onChange={e=>setA3Form(p=>({...p,indicadorObs:e.target.value}))}/>
</div>

{/* 4. Brainstorming - tabela */}
<div className="a3-sec" style={{background:"rgba(15,23,42,.4)",border:"1px solid #1E3A5F",borderRadius:12,padding:18,marginBottom:16}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
<div style={{color:"#60A5FA",fontSize:13,fontWeight:700}}>4️⃣ Brainstorming</div>
<button style={{background:"rgba(34,197,94,.1)",border:"1px solid rgba(34,197,94,.3)",color:"#22C55E",borderRadius:8,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}} onClick={()=>setA3Form(p=>({...p,brainstorming:[...p.brainstorming,{causa:"",ishikawa:A3_ISHIKAWA_CATS[0],prioridade:"Média",manter:"Sim"}]}))}>+ Possível Causa</button>
</div>
<p style={{color:"#64748B",fontSize:11,marginBottom:8}}>Liste as possíveis causas, classifique no Ishikawa (6M) e priorize. As causas alimentam automaticamente o diagrama abaixo.</p>
{/* Nota dos critérios de priorização */}
<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
<span style={{fontSize:10,color:"#EF4444",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:6,padding:"4px 8px"}}><strong>Alta:</strong> causa provável e de alto impacto — tratar com urgência</span>
<span style={{fontSize:10,color:"#F59E0B",background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",borderRadius:6,padding:"4px 8px"}}><strong>Média:</strong> impacto moderado ou evidência parcial — avaliar</span>
<span style={{fontSize:10,color:"#22C55E",background:"rgba(34,197,94,.1)",border:"1px solid rgba(34,197,94,.3)",borderRadius:6,padding:"4px 8px"}}><strong>Baixa:</strong> pouco provável ou baixo impacto — monitorar</span>
</div>
<div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
<thead><tr style={{background:"rgba(37,99,235,.15)"}}>
<th style={{padding:"8px",color:"#60A5FA",fontSize:11,textAlign:"left",borderBottom:"1px solid #1E3A5F",width:40}}>Nº</th>
<th style={{padding:"8px",color:"#60A5FA",fontSize:11,textAlign:"left",borderBottom:"1px solid #1E3A5F"}}>Possível Causa</th>
<th style={{padding:"8px",color:"#60A5FA",fontSize:11,textAlign:"left",borderBottom:"1px solid #1E3A5F",minWidth:140}}>Tipo (Ishikawa 6M)</th>
<th style={{padding:"8px",color:"#60A5FA",fontSize:11,textAlign:"left",borderBottom:"1px solid #1E3A5F",minWidth:100}}>Priorização</th>
<th style={{padding:"8px",color:"#60A5FA",fontSize:11,textAlign:"left",borderBottom:"1px solid #1E3A5F",minWidth:120}}>Manter Analisando?</th>
<th style={{padding:"8px",borderBottom:"1px solid #1E3A5F",width:30}}></th>
</tr></thead>
<tbody>
{a3Form.brainstorming.length===0?<tr><td colSpan="6" style={{padding:"12px 8px",color:"#64748B",fontSize:11}}>Clique em "+ Possível Causa" para começar.</td></tr>:
a3Form.brainstorming.map((b,i)=><tr key={i} style={{borderBottom:"1px solid rgba(30,58,95,.4)"}}>
<td style={{padding:"4px 8px",color:"#94A3B8",fontWeight:700}}>{i+1}</td>
<td style={{padding:"4px 6px"}}><input className="a3-cell" value={b.causa||""} onChange={e=>setA3Form(p=>{const bs=[...p.brainstorming];bs[i]={...bs[i],causa:e.target.value};return{...p,brainstorming:bs}})} placeholder="Descreva a possível causa" style={{minWidth:160}}/></td>
<td style={{padding:"4px 6px"}}><select className="a3-cell" value={b.ishikawa||A3_ISHIKAWA_CATS[0]} onChange={e=>setA3Form(p=>{const bs=[...p.brainstorming];bs[i]={...bs[i],ishikawa:e.target.value};return{...p,brainstorming:bs}})}>{A3_ISHIKAWA_CATS.map(c=><option key={c} value={c} style={{background:"#0F172A"}}>{c}</option>)}</select></td>
<td style={{padding:"4px 6px"}}><select value={b.prioridade||"Média"} onChange={e=>setA3Form(p=>{const bs=[...p.brainstorming];bs[i]={...bs[i],prioridade:e.target.value};return{...p,brainstorming:bs}})} style={{background:`${a3PriorColor[b.prioridade||"Média"]}22`,color:a3PriorColor[b.prioridade||"Média"],border:"1px solid transparent",borderRadius:5,padding:"5px 6px",fontSize:11,fontWeight:700,outline:"none",width:"100%"}}>{A3_PRIOR.map(pr=><option key={pr} value={pr} style={{background:"#0F172A",color:"#F1F5F9"}}>{pr}</option>)}</select></td>
<td style={{padding:"4px 6px"}}><select value={b.manter||"Sim"} onChange={e=>setA3Form(p=>{const bs=[...p.brainstorming];bs[i]={...bs[i],manter:e.target.value};return{...p,brainstorming:bs}})} style={{background:(b.manter||"Sim")==="Sim"?"rgba(34,197,94,.15)":"rgba(100,116,139,.15)",color:(b.manter||"Sim")==="Sim"?"#22C55E":"#94A3B8",border:"1px solid transparent",borderRadius:5,padding:"5px 6px",fontSize:11,fontWeight:700,outline:"none",width:"100%"}}><option value="Sim" style={{background:"#0F172A",color:"#F1F5F9"}}>Sim — tratar adiante</option><option value="Não" style={{background:"#0F172A",color:"#F1F5F9"}}>Não — descartar</option></select></td>
<td style={{padding:"4px 6px",textAlign:"center"}}><button style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:14}} onClick={()=>setA3Form(p=>({...p,brainstorming:p.brainstorming.filter((_,x)=>x!==i)}))}>✕</button></td>
</tr>)}
</tbody></table></div>
<p style={{color:"#64748B",fontSize:10,marginTop:8}}>💡 As causas marcadas com "Manter Analisando? = Sim" são as que devem ser aprofundadas nos 5 Porquês e/ou tratadas no Plano de Ação.</p>
</div>

{/* 5. Ishikawa (6M) estruturado a partir do brainstorming */}
<div className="a3-sec" style={{background:"rgba(15,23,42,.4)",border:"1px solid #1E3A5F",borderRadius:12,padding:18,marginBottom:16}}>
<div style={{color:"#60A5FA",fontSize:13,fontWeight:700,marginBottom:6}}>5️⃣ Diagrama de Ishikawa (6M)</div>
<p style={{color:"#64748B",fontSize:11,marginBottom:14}}>Montado automaticamente a partir das causas do Brainstorming. A cabeça do peixe é o Problema a ser tratado.</p>
{/* Cabeça do peixe */}
<div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
<div style={{background:"linear-gradient(135deg,#DC2626,#991B1B)",borderRadius:12,padding:"12px 18px",maxWidth:300,textAlign:"center",boxShadow:"0 4px 14px rgba(220,38,38,.3)"}}>
<div style={{color:"#FCA5A5",fontSize:10,fontWeight:700,marginBottom:2}}>🐟 PROBLEMA (cabeça do peixe)</div>
<div style={{color:"#FFF",fontWeight:700,fontSize:13}}>{a3Form.problema||"⚠ Defina o problema na seção 2"}</div>
</div>
</div>
{/* Espinhas (6M) preenchidas pelo brainstorming */}
<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:12}}>
{A3_ISHIKAWA_CATS.map(cat=>{const causas=a3Form.brainstorming.filter(b=>b.ishikawa===cat&&b.causa);return(
<div key={cat} style={{background:"rgba(11,25,41,.5)",borderRadius:10,padding:12,border:"1px solid #1E3A5F"}}>
<div style={{color:"#60A5FA",fontSize:12,fontWeight:700,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>🦴 {cat} <span style={{color:"#64748B",fontWeight:400,fontSize:10}}>({causas.length})</span></div>
{causas.length===0?<div style={{color:"#475569",fontSize:11}}>Sem causas classificadas</div>:
<ul style={{margin:0,paddingLeft:16}}>{causas.map((c,ci)=><li key={ci} style={{color:(c.manter||"Sim")==="Não"?"#64748B":"#CBD5E1",fontSize:12,marginBottom:4,textDecoration:(c.manter||"Sim")==="Não"?"line-through":"none"}}>{c.causa} <span style={{color:a3PriorColor[c.prioridade||"Média"],fontSize:10,fontWeight:700}}>[{c.prioridade||"Média"}]</span>{(c.manter||"Sim")==="Sim"&&<span style={{color:"#22C55E",fontSize:10}}> ✓</span>}</li>)}</ul>}
</div>)})}
</div>
</div>

{/* Pergunta: fará 5 Porquês? */}
<div style={{background:"rgba(168,85,247,.06)",border:"1px solid rgba(168,85,247,.3)",borderRadius:12,padding:18,marginBottom:16}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
<div><div style={{color:"#C4B5FD",fontSize:13,fontWeight:700,marginBottom:2}}>❓ Irá realizar a análise dos 5 Porquês?</div><div style={{color:"#64748B",fontSize:11}}>Se "Não", a seção dos 5 Porquês ficará desabilitada e você trata as causas diretamente no Plano de Ação.</div></div>
<div style={{display:"flex",gap:8}}>
{["Sim","Não"].map(op=><button key={op} onClick={()=>setA3Form(p=>({...p,fazPorques:op}))} style={{padding:"8px 18px",borderRadius:8,border:`1px solid ${a3Form.fazPorques===op?(op==="Sim"?"#22C55E":"#EF4444"):"#1E3A5F"}`,background:a3Form.fazPorques===op?(op==="Sim"?"rgba(34,197,94,.15)":"rgba(239,68,68,.15)"):"rgba(15,23,42,.4)",color:a3Form.fazPorques===op?(op==="Sim"?"#22C55E":"#EF4444"):"#94A3B8",fontSize:13,fontWeight:700,cursor:"pointer"}}>{op}</button>)}
</div>
</div>
</div>

{/* 6. 5 Porquês */}
<div className="a3-sec" style={{background:"rgba(15,23,42,.4)",border:"1px solid #1E3A5F",borderRadius:12,padding:18,marginBottom:16,opacity:a3Form.fazPorques==="Não"?.5:1}}>
<div style={{color:"#60A5FA",fontSize:13,fontWeight:700,marginBottom:6}}>6️⃣ 5 Porquês {a3Form.fazPorques==="Não"&&<span style={{color:"#EF4444",fontSize:11,fontWeight:600}}>(desabilitado)</span>}</div>
<p style={{color:"#64748B",fontSize:11,marginBottom:14}}>{a3Form.fazPorques==="Não"?"Você optou por não realizar os 5 Porquês. Trate as causas no Plano de Ação.":"Um quadro para cada causa mantida no Brainstorming. Cada quadro começa em \"Por quê 1?\" e você adiciona os porquês conforme a necessidade até a causa-raiz."}</p>
{a3Form.fazPorques!=="Não"&&(()=>{
const mantidas=(a3Form.brainstorming||[]).filter(b=>(b.manter||"Sim")==="Sim"&&String(b.causa||"").trim());
if(mantidas.length===0)return<p style={{color:"#F59E0B",fontSize:12}}>⚠ Nenhuma causa marcada como "Manter Analisando? = Sim" no Brainstorming. Marque as causas que deseja aprofundar para gerar os quadros de 5 Porquês.</p>;
// helpers para ler/gravar respostas de cada causa em porquesBlocks (por texto da causa)
const getBlock=(causa)=>{const b=(a3Form.porquesBlocks||[]).find(x=>x.causa===causa);return b?b.respostas:[""]};
const setBlock=(causa,respostas)=>setA3Form(p=>{const blocks=Array.isArray(p.porquesBlocks)?[...p.porquesBlocks]:[];const idx=blocks.findIndex(x=>x.causa===causa);if(idx>=0)blocks[idx]={causa,respostas};else blocks.push({causa,respostas});return{...p,porquesBlocks:blocks}});
return<div style={{display:"grid",gap:14}}>{mantidas.map((b,bi)=>{const resp=getBlock(b.causa);return(
<div key={bi} style={{background:"rgba(11,25,41,.5)",border:"1px solid #2A4A6B",borderRadius:10,padding:14}}>
<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
<span style={{background:"rgba(168,85,247,.15)",border:"1px solid rgba(168,85,247,.35)",color:"#A855F7",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>Causa {bi+1}</span>
<span style={{color:"#CBD5E1",fontSize:13,fontWeight:600}}>{b.causa}</span>
<span style={{color:a3PriorColor[b.prioridade||"Média"],fontSize:10,fontWeight:700}}>[{b.prioridade||"Média"}]</span>
</div>
{resp.map((r,ri)=><div key={ri} style={{marginBottom:8}}><label className="label" style={{marginTop:0}}>Por quê {ri+1}?{ri===resp.length-1&&resp.length>=2?" (possível causa-raiz)":""}</label>
<div style={{display:"flex",gap:6,alignItems:"center"}}>
<div className="input-wrap" style={{flex:1,margin:0}}><span className="input-icon">{ri+1}️⃣</span><input className="input-field" placeholder={ri===0?"Por que o problema/causa ocorre?":"Por que isso acontece?"} value={r} onChange={e=>{const nr=[...resp];nr[ri]=e.target.value;setBlock(b.causa,nr)}}/></div>
{resp.length>1&&<button style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:16}} onClick={()=>{const nr=resp.filter((_,x)=>x!==ri);setBlock(b.causa,nr.length?nr:[""])}}>✕</button>}
</div></div>)}
<button style={{background:"rgba(168,85,247,.12)",border:"1px solid rgba(168,85,247,.3)",color:"#A855F7",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer",marginTop:4}} onClick={()=>setBlock(b.causa,[...resp,""])}>+ Adicionar Por quê</button>
</div>)})}</div>;
})()}
</div>

{/* 7. Plano de ação */}
<div className="a3-sec" style={{background:"rgba(15,23,42,.4)",border:"1px solid #1E3A5F",borderRadius:12,padding:18,marginBottom:16}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
<div style={{color:"#60A5FA",fontSize:13,fontWeight:700}}>7️⃣ Plano de Ação (5W2H)</div>
<button style={{background:"rgba(34,197,94,.1)",border:"1px solid rgba(34,197,94,.3)",color:"#22C55E",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}} onClick={()=>setA3Form(p=>({...p,planoAcao:[...p.planoAcao,{descricao:"",responsavel:"",prazo:"",status:"Pendente",numNota:""}]}))}>+ Ação</button>
</div>
{a3Form.planoAcao.length===0?<p style={{color:"#64748B",fontSize:12}}>Nenhuma ação adicionada. Clique em "+ Ação".</p>:
<div style={{display:"flex",flexDirection:"column",gap:10}}>
{a3Form.planoAcao.map((ac,i)=><div key={i} style={{background:"rgba(11,25,41,.6)",border:"1px solid #1E3A5F",borderRadius:10,padding:12,position:"relative"}}>
<button style={{position:"absolute",top:8,right:8,background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:14}} onClick={()=>setA3Form(p=>({...p,planoAcao:p.planoAcao.filter((_,x)=>x!==i)}))}>✕</button>
<div style={{color:"#94A3B8",fontSize:11,fontWeight:700,marginBottom:8}}>Ação {i+1}</div>
<textarea className="input-field" style={{minHeight:40,paddingLeft:14,resize:"vertical",marginBottom:8}} placeholder="Descrição da ação (O quê / Como)" value={ac.descricao} onChange={e=>setA3Form(p=>{const pa=[...p.planoAcao];pa[i]={...pa[i],descricao:e.target.value};return{...p,planoAcao:pa}})}/>
<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:8}}>

<script>
/* ═══ PWA: Service Worker para uso offline (etapa 1 — consulta) ═══ */
(function(){
  if(!("serviceWorker" in navigator))return;
  // SW gerado em runtime (mantém o deploy de arquivo único). Cacheia o app e respostas do Firebase (GET).
  var swCode = [
    "var CACHE='pm-manager-v2';",
    "var APP_URL=self.registration.scope;",
    "self.addEventListener('install',function(e){self.skipWaiting();});",
    "self.addEventListener('activate',function(e){e.waitUntil((async function(){var ks=await caches.keys();await Promise.all(ks.filter(function(k){return k!=='pm-manager-v2'&&k!=='pm-manager-data'}).map(function(k){return caches.delete(k)}));await self.clients.claim();})());});",
    "self.addEventListener('fetch',function(e){",
    "  var req=e.request;var url=new URL(req.url);",
    "  if(req.method!=='GET'){return;}",
    // App shell + CDNs (React/Babel/XLSX/qrcode): cache-first, atualiza em segundo plano (stale-while-revalidate)
    "  var isShell = req.mode==='navigate' || /cloudflare|cdnjs|jsdelivr|unpkg/.test(url.host) || url.origin===location.origin;",
    "  var isFirebase = /firebaseio\\.com$/.test(url.host);",
    "  if(isFirebase){",
    // Dados: network-first (sempre tenta online), cai no cache se offline
    "    e.respondWith((async function(){try{var fresh=await fetch(req);var c=await caches.open('pm-manager-data');c.put(req,fresh.clone());return fresh;}catch(err){var cached=await caches.match(req);if(cached)return cached;return new Response('null',{headers:{'Content-Type':'application/json'}});}})());",
    "    return;",
    "  }",
    "  if(isShell){",
    "    e.respondWith((async function(){var cache=await caches.open('pm-manager-v2');var cached=await cache.match(req);var net=fetch(req).then(function(r){if(r&&r.status===200)cache.put(req,r.clone());return r;}).catch(function(){return cached;});return cached||net;})());",
    "    return;",
    "  }",
    "});"
  ].join("\n");
  try{
    var blob=new Blob([swCode],{type:"text/javascript"});
    var swUrl=URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).then(function(reg){
      // pré-cacheia a própria página + bibliotecas (garantia de abrir offline)
      if(window.caches){caches.open("pm-manager-v2").then(function(c){
        var assets=[location.href,
          "https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.bundle.js"];
        assets.forEach(function(u){c.add(u).catch(function(){});});
      });}
    }).catch(function(){});
  }catch(e){}
})();

/* ═══ Indicador de status online/offline ═══ */
(function(){
  var bar=document.createElement("div");
  bar.id="net-status";
  bar.style.cssText="position:fixed;bottom:0;left:0;right:0;z-index:99999;text-align:center;font-size:12px;font-weight:600;padding:6px 10px;font-family:'Segoe UI',Arial,sans-serif;transition:transform .3s,opacity .3s;transform:translateY(100%);opacity:0;pointer-events:none";
  document.body.appendChild(bar);
  var hideTimer=null;
  function show(online){
    if(hideTimer){clearTimeout(hideTimer);hideTimer=null;}
    if(online){
      bar.textContent="🟢 Conectado — dados sincronizados com a nuvem";
      bar.style.background="rgba(34,197,94,.95)";bar.style.color="#04240f";
      bar.style.transform="translateY(0)";bar.style.opacity="1";
      hideTimer=setTimeout(function(){bar.style.transform="translateY(100%)";bar.style.opacity="0";},2600);
    }else{
      bar.textContent="🟡 Sem internet — modo consulta (exibindo últimos dados carregados; edições não serão salvas)";
      bar.style.background="rgba(245,158,11,.97)";bar.style.color="#3a2503";
      bar.style.transform="translateY(0)";bar.style.opacity="1";
    }
  }
  window.addEventListener("online",function(){show(true);});
  window.addEventListener("offline",function(){show(false);});
  // estado inicial: só avisa se já estiver offline
  if(!navigator.onLine)setTimeout(function(){show(false);},800);
})();
</script>
</body>
</html>

.app{min-height:100vh;position:relative;overflow:hidden}
.bg-texture{position:absolute;inset:0;background-image:radial-gradient(circle at 20% 50%,rgba(59,130,246,.08) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(245,158,11,.06) 0%,transparent 50%),radial-gradient(circle at 60% 80%,rgba(34,197,94,.05) 0%,transparent 50%)}

.eye-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:8px 12px}

.filter-chip.active{background:rgba(37,99,235,.2);border-color:#2563EB;color:#60A5FA}
.qr-card{background:white;border-radius:16px;padding:32px;text-align:center;max-width:360px;margin:0 auto}
.qr-card .qr-title{color:#0B1929;font-size:18px;font-weight:800;margin-bottom:4px}
.qr-card .qr-subtitle{color:#64748B;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px}
.qr-card .qr-container{display:inline-block;padding:12px;background:#FFF;border:3px solid #0B1929;border-radius:12px}
.qr-card .qr-url{color:#3B82F6;font-size:11px;margin-top:16px;word-break:break-all;font-weight:500}
.qr-card .qr-footer{color:#94A3B8;font-size:10px;margin-top:12px;border-top:1px solid #E2E8F0;padding-top:10px}
.qr-card .qr-logo-print{width:60px;height:60px;object-fit:contain;margin-bottom:10px;border-radius:8px}
.qr-actions{display:flex;gap:8px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.qr-action-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;border:1px solid;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.qr-action-btn:hover{opacity:.85;transform:translateY(-1px)}
.qr-action-btn.print{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.3);color:#60A5FA}
.qr-action-btn.download{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.3);color:#22C55E}
.qr-size-row{display:flex;gap:8px;justify-content:center;margin-top:12px;align-items:center}
.qr-size-row label{color:#94A3B8;font-size:12px}
.qr-size-row select{background:rgba(15,23,42,.7);border:1px solid #1E3A5F;border-radius:6px;color:#F1F5F9;padding:6px 10px;font-size:12px;outline:none;cursor:pointer}
.sync-indicator{position:fixed;bottom:16px;right:16px;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;z-index:900;display:flex;align-items:center;gap:6px}
.sync-indicator.online{background:rgba(34,197,94,.15);color:#22C55E;border:1px solid rgba(34,197,94,.2)}

@media print{body *{visibility:hidden}.qr-print-area,.qr-print-area *{visibility:visible}.qr-print-area{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%)}}
@media(max-width:480px){.left{padding:30px 20px;min-height:280px}.right{padding:20px 16px}.form-block{padding:24px 20px}.modal{padding:20px}.brand-footer{display:none}}

const[reqFilter,setReqFilter]=useState("all");

const logoRef=useRef(null);
const notify=(m,t="info")=>setToast({message:m,type:t});

// ─── Load from Firebase ───
useEffect(()=>{
  (async()=>{
    try{
      const[c,r,u,l]=await Promise.all([DB.get("config"),DB.get("requests"),DB.get("users"),DB.get("logo")]);
      if(c)setCfg(p=>({...p,...c}));
      if(r)setReqs(Object.values(r));
      if(u)setUsers(Object.values(u));
      if(l)setLogo(l);
      setSynced(true);
    }catch{notify("Erro ao conectar ao banco de dados.","error")}
    setLoading(false);
  })();
},[]);

// ─── Auto-refresh every 15s ───
useEffect(()=>{
  const interval=setInterval(async()=>{
    try{
      const[r,u]=await Promise.all([DB.get("requests"),DB.get("users")]);
      if(r)setReqs(Object.values(r));
      if(u)setUsers(Object.values(u));
      setSynced(true);
    }catch{setSynced(false)}
  },15000);
  return()=>clearInterval(interval);
},[]);

const saveReqs=async(arr)=>{setReqs(arr);const obj={};arr.forEach(r=>obj[r.id]=r);await DB.set("requests",obj)};
const saveUsers=async(arr)=>{setUsers(arr);const obj={};arr.forEach(u=>obj[u.matricula]=u);await DB.set("users",obj)};
const saveCfg=async(c)=>{setCfg(c);await DB.set("config",c)};
const saveLogo=async(l)=>{setLogo(l);await DB.set("logo",l)};

const handleLogo=(e)=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=(ev)=>{saveLogo(ev.target.result)};rd.readAsDataURL(f)};

const handleLogin=()=>{
  if(!mat||!pw){notify("Preencha matrícula e senha.","error");return}
  const u=users.find(x=>x.matricula===mat&&x.status==="approved");
  if(!u){notify("Matrícula não encontrada ou acesso pendente.","error");return}
  if(u.password!==pw){notify("Senha incorreta.","error");return}
  if(u.mustChangePassword){setLoggedUser(u);setScreen("changePassword");notify("Primeiro acesso! Crie sua nova senha.","info");return}
  setLoggedUser(u);notify(`Bem-vindo(a), ${u.name}!`,"success");
};

const handleChangePassword=()=>{
  if(!cpNew||!cpConfirm){notify("Preencha a nova senha e confirmação.","error");return}
  if(cpNew.length<4){notify("A senha deve ter pelo menos 4 caracteres.","error");return}
  if(cpNew!==cpConfirm){notify("As senhas não coincidem.","error");return}
  if(loggedUser.mustChangePassword===false&&cpOld!==loggedUser.password){notify("Senha atual incorreta.","error");return}
  const upd=users.map(u=>u.matricula===loggedUser.matricula?{...u,password:cpNew,mustChangePassword:false}:u);
  saveUsers(upd);setCpOld("");setCpNew("");setCpConfirm("");setScreen("login");notify("✅ Senha alterada! Faça login novamente.","success");
};

const generatePassword=()=>{const c="ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789";let p="";for(let i=0;i<8;i++)p+=c[Math.floor(Math.random()*c.length)];return p};
const getPasswordStrength=(p)=>{if(!p)return null;if(p.length<4)return{label:"Fraca",cls:"weak"};let s=0;if(p.length>=6)s++;if(p.length>=8)s++;if(/[A-Z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;if(s<=2)return{label:"Fraca",cls:"weak"};if(s<=3)return{label:"Média",cls:"medium"};return{label:"Forte",cls:"strong"}};

const submitReq=(req)=>{const upd=[req,...reqs];saveReqs(upd);setLastReq(req);setShowNotify(true)};

const handleRecovery=()=>{
  if(!recMat||!recEmail){notify("Preencha matrícula e e-mail.","error");return}
  submitReq({id:Date.now().toString(),type:"recovery",matricula:recMat,email:recEmail,date:new Date().toLocaleString("pt-BR"),status:"pending"});
  setRecMat("");setRecEmail("");setScreen("login");
};

const handleRegister=()=>{
  if(!regName||!regMat||!regEmail){notify("Preencha nome, matrícula e e-mail.","error");return}
  if(!regPw||regPw.length<4){notify("Crie uma senha com pelo menos 4 caracteres.","error");return}
  if(regPw!==regPwConfirm){notify("As senhas não coincidem.","error");return}
  if(reqs.find(r=>r.matricula===regMat&&r.type==="register"&&r.status==="pending")){notify("Já existe solicitação pendente.","error");return}
  submitReq({id:Date.now().toString(),type:"register",name:regName,matricula:regMat,email:regEmail,area:regArea||"—",justification:regJust||"—",password:regPw,date:new Date().toLocaleString("pt-BR"),status:"pending"});
  setRegName("");setRegMat("");setRegEmail("");setRegArea("");setRegJust("");setRegPw("");setRegPwConfirm("");setScreen("login");
};

const buildMsg=(req)=>{
  if(req.type==="register")return`📋 *[PM Manager] NOVO CADASTRO*\n\n👤 Nome: ${req.name}\n🔖 Matrícula: ${req.matricula}\n📧 E-mail: ${req.email}\n🏭 Área: ${req.area}\n📝 Justificativa: ${req.justification}\n📅 Data: ${req.date}\n\n⚠ Acesse o Painel Admin do PM Manager para APROVAR ou REJEITAR.`;
  return`🔑 *[PM Manager] RECUPERAÇÃO DE SENHA*\n\n🔖 Matrícula: ${req.matricula}\n📧 E-mail: ${req.email}\n📅 Data: ${req.date}\n\n⚠ Acesse o Painel Admin para resetar a senha.`;
};

const notifyAdmin=(admin,channel)=>{if(!lastReq)return;if(channel==="whatsapp")sendWhatsApp(admin.whatsapp,buildMsg(lastReq));else sendTeams(admin.teams,buildMsg(lastReq));notify(`${channel==="whatsapp"?"WhatsApp":"Teams"} aberto!`,"success")};

const openApproveModal=(req)=>{setApproveReq(req);setApprovePassword(generatePassword());setApproveShowPw(false);setShowApproveModal(true)};

const confirmApprove=()=>{
  const req=approveReq;
  if(req.type==="recovery"&&(!approvePassword||approvePassword.length<4)){notify("Defina uma senha (mín. 4 caracteres).","error");return}
  const upd=reqs.map(r=>r.id===req.id?{...r,status:"approved",resolvedAt:new Date().toLocaleString("pt-BR")}:r);
  saveReqs(upd);
  if(req.type==="register"){
    saveUsers([...users,{matricula:req.matricula,name:req.name,email:req.email,area:req.area,password:req.password,mustChangePassword:true,status:"approved",createdAt:new Date().toLocaleString("pt-BR")}]);
    notify(`✅ ${req.name} aprovado!`,"success");
  }else{
    saveUsers(users.map(u=>u.matricula===req.matricula?{...u,password:approvePassword,mustChangePassword:true}:u));
    notify(`✅ Senha resetada — ${req.matricula}.`,"success");
  }
  setShowApproveModal(false);setApproveReq(null);setApprovePassword("");
};

const handleReject=(req)=>{saveReqs(reqs.map(r=>r.id===req.id?{...r,status:"rejected",resolvedAt:new Date().toLocaleString("pt-BR")}:r));notify("Solicitação rejeitada.","info")};
const handleDeleteUser=(m)=>{saveUsers(users.filter(u=>u.matricula!==m));notify("Usuário removido.","info")};
const addAdmin=()=>{if(cfg.admins.length>=5)return;setCfg(p=>({...p,admins:[...p.admins,{name:"",whatsapp:"",teams:""}]}))};
const removeAdmin=(i)=>{setCfg(p=>({...p,admins:p.admins.filter((_,idx)=>idx!==i)}))};
const updateAdmin=(i,f,v)=>{setCfg(p=>{const a=[...p.admins];a[i]={...a[i],[f]:v};return{...p,admins:a}})};

const pending=reqs.filter(r=>r.status==="pending").length;
const configuredAdmins=cfg.admins.filter(a=>a.whatsapp||a.teams);
const filteredReqs=reqFilter==="all"?reqs:reqs.filter(r=>r.status===reqFilter);

const exportToExcel=()=>{
  if(reqs.length===0){notify("Nenhuma solicitação.","error");return}
  const sm={pending:"Pendente",approved:"Aprovado",rejected:"Rejeitado"};const tm={register:"Novo Cadastro",recovery:"Recuperação"};
  const data=reqs.map((r,i)=>({"Nº":i+1,"Tipo":tm[r.type]||r.type,"Nome":r.name||"—","Matrícula":r.matricula,"E-mail":r.email,"Área":r.area||"—","Justificativa":r.justification||"—","Data Solicitação":r.date,"Status":sm[r.status]||r.status,"Data Resolução":r.resolvedAt||"—"}));
  const wb=XLSX.utils.book_new();const ws=XLSX.utils.json_to_sheet(data);ws["!cols"]=[{wch:5},{wch:20},{wch:28},{wch:14},{wch:28},{wch:20},{wch:30},{wch:18},{wch:12},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws,"Solicitações");
  const summary=[{"Indicador":"Total","Valor":reqs.length},{"Indicador":"Cadastros","Valor":reqs.filter(r=>r.type==="register").length},{"Indicador":"Recuperações","Valor":reqs.filter(r=>r.type==="recovery").length},{"Indicador":"Pendentes","Valor":pending},{"Indicador":"Aprovadas","Valor":reqs.filter(r=>r.status==="approved").length},{"Indicador":"Rejeitadas","Valor":reqs.filter(r=>r.status==="rejected").length},{"Indicador":"Usuários Ativos","Valor":users.length},{"Indicador":"Data Relatório","Valor":new Date().toLocaleString("pt-BR")}];
  const ws2=XLSX.utils.json_to_sheet(summary);ws2["!cols"]=[{wch:22},{wch:14}];XLSX.utils.book_append_sheet(wb,ws2,"Resumo");
  if(users.length>0){const ud=users.map((u,i)=>({"Nº":i+1,"Nome":u.name,"Matrícula":u.matricula,"E-mail":u.email,"Área":u.area||"—","Status":u.mustChangePassword?"1º acesso pendente":"Ativo","Cadastro":u.createdAt||"—"}));const ws3=XLSX.utils.json_to_sheet(ud);ws3["!cols"]=[{wch:5},{wch:28},{wch:14},{wch:28},{wch:20},{wch:22},{wch:18}];XLSX.utils.book_append_sheet(wb,ws3,"Usuários")}
  XLSX.writeFile(wb,`PM_Manager_${new Date().toISOString().slice(0,10)}.xlsx`);notify("📊 Excel exportado!","success");
};

const generateQR=(url,cs)=>{if(!url)return null;try{const q=qrcode(0,"M");q.addData(url);q.make();const n=q.getModuleCount();const s=n*cs;let svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${s} ${s}" width="${s}" height="${s}">`;for(let r=0;r<n;r++)for(let c=0;c<n;c++)if(q.isDark(r,c))svg+=`<rect x="${c*cs}" y="${r*cs}" width="${cs}" height="${cs}" fill="#0B1929"/>`;svg+=`</svg>`;return svg}catch{return null}};
const printQR=()=>{const el=document.getElementById("qr-print-area");if(!el)return;const w=window.open("","_blank","width=500,height=700");w.document.write(`<!DOCTYPE html><html><head><style>body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',Arial,sans-serif}</style></head><body>${el.outerHTML}</body></html>`);w.document.close();setTimeout(()=>{w.print();w.close()},400)};
const downloadQR=()=>{const url=cfg.appUrl;if(!url)return;const q=qrcode(0,"M");q.addData(url);q.make();const n=q.getModuleCount();const cs=12;const canvas=document.createElement("canvas");canvas.width=n*cs+80;canvas.height=n*cs+160;const ctx=canvas.getContext("2d");ctx.fillStyle="#FFF";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle="#0B1929";ctx.font="bold 22px 'Segoe UI',Arial";ctx.textAlign="center";ctx.fillText("PM Manager",canvas.width/2,36);ctx.fillStyle="#64748B";ctx.font="11px Arial";ctx.fillText("GESTÃO DE MANUTENÇÃO",canvas.width/2,54);const ox=(canvas.width-n*cs)/2;const oy=74;ctx.strokeStyle="#0B1929";ctx.lineWidth=3;ctx.strokeRect(ox-14,oy-14,n*cs+28,n*cs+28);for(let r=0;r<n;r++)for(let c=0;c<n;c++)if(q.isDark(r,c)){ctx.fillStyle="#0B1929";ctx.fillRect(ox+c*cs,oy+r*cs,cs,cs);}ctx.fillStyle="#3B82F6";ctx.font="11px Arial";ctx.fillText(url,canvas.width/2,oy+n*cs+30);ctx.fillStyle="#94A3B8";ctx.font="9px Arial";ctx.fillText("Escaneie para acessar",canvas.width/2,oy+n*cs+48);const link=document.createElement("a");link.download="PM_Manager_QRCode.png";link.href=canvas.toDataURL("image/png");link.click();notify("📥 QR Code baixado!","success")};

if(loading)return<div className="app" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}><div className="bg-texture"/><div className="bg-grad"/><p style={{color:"#64748B",position:"relative",zIndex:1}}>Conectando ao banco de dados...</p></div>;

return(
<div className="app">
<div className="bg-texture"/><div className="bg-grad"/>
{toast&&<Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)}/>}
<div className={`sync-indicator ${synced?"online":"offline"}`}>{synced?"🟢 Sincronizado":"🔴 Offline"}</div>

<div className="container">
<div className="left"><div className="left-inner">
<h1 className="brand-title">Gestão de<br/>Manutenção</h1>
<p className="brand-sub">Planejamento · Controle · Execução</p>
<Illustration/>
<p className="brand-footer">Sistema integrado para gestão completa do ciclo de manutenção industrial</p>
</div></div>

<div className="right"><div className="form-area">
<div className="logo-area" onClick={()=>logoRef.current?.click()}>
{logo?<img src={logo} alt=""/>:(<div className="logo-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>Adicionar Logo</div>)}
<input ref={logoRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleLogo}/>
</div>

{screen==="login"&&<div className="form-block fade-in">
<h2 className="form-title">Entrar no Sistema</h2><p className="form-desc">Acesse o módulo de manutenção</p>
<label className="label">CS (Matrícula)</label><div className="input-wrap"><span className="input-icon">🔖</span><input className="input-field" placeholder="Digite sua matrícula" value={mat} onChange={e=>setMat(e.target.value)}/></div>
<label className="label">Senha</label><div className="input-wrap"><span className="input-icon">🔒</span><input className="input-field" type={showPw?"text":"password"} placeholder="••••••••" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/><button className="eye-btn" onClick={()=>setShowPw(!showPw)}>{showPw?"🙈":"👁"}</button></div>
<button className="btn-primary" onClick={handleLogin}>Entrar</button>
<div className="links-row"><button className="link-btn" onClick={()=>setScreen("recovery")}>Esqueceu a senha?</button><span className="divider">|</span><button className="link-btn" onClick={()=>setScreen("register")}>Solicitar Cadastro</button><span className="divider">|</span><button className="link-btn" onClick={()=>{setLoggedUser(null);setScreen("changePasswordManual")}}>Alterar Senha</button></div>
<div style={{position:"relative",display:"inline-block",width:"100%",textAlign:"center"}}><button className="admin-link" onClick={()=>{setShowAdmin(true);setAdminOk(false);setAdminPin("")}}>⚙ Painel do Administrador</button>{pending>0&&<span className="pending-badge">{pending}</span>}</div>
</div>}

{screen==="recovery"&&<div className="form-block fade-in">
<h2 className="form-title">Recuperar Senha</h2><p className="form-desc">Envie solicitação ao administrador</p>
<label className="label">CS (Matrícula)</label><div className="input-wrap"><span className="input-icon">🔖</span><input className="input-field" placeholder="Sua matrícula" value={recMat} onChange={e=>setRecMat(e.target.value)}/></div>
<label className="label">E-mail cadastrado</label><div className="input-wrap"><span className="input-icon">📧</span><input className="input-field" type="email" placeholder="seu@email.com" value={recEmail} onChange={e=>setRecEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleRecovery()}/></div>
<button className="btn-primary" onClick={handleRecovery}>Enviar Solicitação</button>
<button className="link-btn" style={{marginTop:16,display:"block",textAlign:"center",width:"100%"}} onClick={()=>setScreen("login")}>← Voltar ao Login</button>
</div>}

{screen==="register"&&<div className="form-block fade-in">
<h2 className="form-title">Solicitar Cadastro</h2><p className="form-desc">Preencha seus dados e notifique o admin</p>
<label className="label">Nome Completo *</label><div className="input-wrap"><span className="input-icon">👤</span><input className="input-field" placeholder="Seu nome" value={regName} onChange={e=>setRegName(e.target.value)}/></div>
<label className="label">CS (Matrícula) *</label><div className="input-wrap"><span className="input-icon">🔖</span><input className="input-field" placeholder="Sua matrícula" value={regMat} onChange={e=>setRegMat(e.target.value)}/></div>
<label className="label">E-mail Corporativo *</label><div className="input-wrap"><span className="input-icon">📧</span><input className="input-field" type="email" placeholder="seu@empresa.com" value={regEmail} onChange={e=>setRegEmail(e.target.value)}/></div>
<label className="label">Área / Setor</label><div className="input-wrap"><span className="input-icon">🏭</span><input className="input-field" placeholder="Ex: Manutenção Mecânica" value={regArea} onChange={e=>setRegArea(e.target.value)}/></div>
<label className="label">Justificativa</label><textarea className="input-field" placeholder="Por que precisa de acesso..." value={regJust} onChange={e=>setRegJust(e.target.value)} rows={3}/>
<div style={{marginTop:16,padding:12,background:"rgba(59,130,246,.06)",borderRadius:10,border:"1px solid rgba(59,130,246,.15)"}}>
<div style={{color:"#60A5FA",fontSize:12,fontWeight:700,marginBottom:10}}>🔐 Crie sua senha de acesso</div>
<label className="label" style={{marginTop:0}}>Senha *</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type={regShowPw?"text":"password"} placeholder="Mínimo 4 caracteres" value={regPw} onChange={e=>setRegPw(e.target.value)}/><button className="eye-btn" onClick={()=>setRegShowPw(!regShowPw)}>{regShowPw?"🙈":"👁"}</button></div>
{regPw&&(()=>{const s=getPasswordStrength(regPw);return s?<div className={`pw-strength ${s.cls}`}>Força: {s.label}</div>:null})()}
<label className="label">Confirmar Senha *</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type="password" placeholder="Repita a senha" value={regPwConfirm} onChange={e=>setRegPwConfirm(e.target.value)}/></div>
{regPwConfirm&&regPw!==regPwConfirm&&<div style={{color:"#EF4444",fontSize:12,marginTop:6}}>❌ Senhas não coincidem</div>}
{regPwConfirm&&regPw===regPwConfirm&&regPw.length>=4&&<div style={{color:"#22C55E",fontSize:12,marginTop:6}}>✅ Senhas coincidem</div>}
<div style={{color:"#64748B",fontSize:11,marginTop:8}}>⚠ Após aprovação, você deverá trocar a senha no primeiro login.</div>
</div>
<button className="btn-primary" onClick={handleRegister}>Enviar Solicitação</button>
<button className="link-btn" style={{marginTop:16,display:"block",textAlign:"center",width:"100%"}} onClick={()=>setScreen("login")}>← Voltar ao Login</button>
</div>}

{screen==="changePassword"&&loggedUser&&<div className="form-block fade-in">
<h2 className="form-title">🔐 Criar Nova Senha</h2><p className="form-desc">Primeiro acesso — <strong style={{color:"#F8FAFC"}}>{loggedUser.name}</strong>, defina sua senha.</p>
<label className="label">Nova Senha</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type="password" placeholder="Mínimo 4 caracteres" value={cpNew} onChange={e=>setCpNew(e.target.value)}/></div>
{cpNew&&(()=>{const s=getPasswordStrength(cpNew);return s?<div className={`pw-strength ${s.cls}`}>Força: {s.label}</div>:null})()}
<label className="label">Confirmar</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type="password" placeholder="Repita" value={cpConfirm} onChange={e=>setCpConfirm(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleChangePassword()}/></div>
{cpConfirm&&cpNew!==cpConfirm&&<div style={{color:"#EF4444",fontSize:12,marginTop:6}}>❌ Não coincidem</div>}
{cpConfirm&&cpNew===cpConfirm&&cpNew.length>=4&&<div style={{color:"#22C55E",fontSize:12,marginTop:6}}>✅ Coincidem</div>}
<button className="btn-primary" onClick={handleChangePassword}>Salvar Nova Senha</button>
</div>}

{screen==="changePasswordManual"&&<div className="form-block fade-in">
<h2 className="form-title">🔐 Alterar Senha</h2><p className="form-desc">Digite matrícula e senha atual</p>
<label className="label">CS (Matrícula)</label><div className="input-wrap"><span className="input-icon">🔖</span><input className="input-field" placeholder="Sua matrícula" value={mat} onChange={e=>setMat(e.target.value)}/></div>
<label className="label">Senha Atual</label><div className="input-wrap"><span className="input-icon">🔒</span><input className="input-field" type="password" placeholder="Senha atual" value={cpOld} onChange={e=>setCpOld(e.target.value)}/></div>
<label className="label">Nova Senha</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type="password" placeholder="Mínimo 4 caracteres" value={cpNew} onChange={e=>setCpNew(e.target.value)}/></div>
{cpNew&&(()=>{const s=getPasswordStrength(cpNew);return s?<div className={`pw-strength ${s.cls}`}>Força: {s.label}</div>:null})()}
<label className="label">Confirmar</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type="password" placeholder="Repita" value={cpConfirm} onChange={e=>setCpConfirm(e.target.value)}/></div>
{cpConfirm&&cpNew!==cpConfirm&&<div style={{color:"#EF4444",fontSize:12,marginTop:6}}>❌ Não coincidem</div>}
{cpConfirm&&cpNew===cpConfirm&&cpNew.length>=4&&<div style={{color:"#22C55E",fontSize:12,marginTop:6}}>✅ Coincidem</div>}
<button className="btn-primary" onClick={()=>{const u=users.find(x=>x.matricula===mat);if(!u){notify("Matrícula não encontrada.","error");return}if(u.password!==cpOld){notify("Senha atual incorreta.","error");return}setLoggedUser({...u,mustChangePassword:false});handleChangePassword()}}>Alterar Senha</button>
<button className="link-btn" style={{marginTop:16,display:"block",textAlign:"center",width:"100%"}} onClick={()=>{setScreen("login");setCpOld("");setCpNew("");setCpConfirm("")}}>← Voltar ao Login</button>
</div>}

<p className="footer-text">PM Manager v1.0 — Firebase Cloud ☁</p>
</div></div>
</div>

{/* NOTIFY */}
{showNotify&&<div className="overlay" onClick={()=>setShowNotify(false)}><div className="modal slide-down" style={{maxWidth:480}} onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h2 className="modal-title">✅ Solicitação Registrada!</h2><button className="close-btn" onClick={()=>setShowNotify(false)}>✕</button></div>
<p style={{color:"#94A3B8",fontSize:14,marginBottom:16}}>Agora notifique o administrador:</p>
{configuredAdmins.length===0?<div className="warn-box">⚠ Nenhum admin com WhatsApp/Teams configurado.</div>:
<div>{configuredAdmins.map((a,i)=>(<div key={i} className="notify-card"><div className="admin-name">{a.name||`Admin ${i+1}`}</div><div className="notify-btns">
{a.whatsapp&&<button className="channel-btn whatsapp" onClick={()=>notifyAdmin(a,"whatsapp")}>📱 WhatsApp</button>}
{a.teams&&<button className="channel-btn teams" onClick={()=>notifyAdmin(a,"teams")}>💬 Teams</button>}
</div></div>))}</div>}
<button className="link-btn" style={{marginTop:20,display:"block",textAlign:"center",width:"100%",fontSize:14}} onClick={()=>setShowNotify(false)}>Fechar</button>
</div></div>}

{/* ADMIN */}
{showAdmin&&<div className="overlay" onClick={()=>setShowAdmin(false)}><div className="modal slide-down" style={{maxWidth:640}} onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h2 className="modal-title">Painel do Administrador</h2><button className="close-btn" onClick={()=>setShowAdmin(false)}>✕</button></div>
{!adminOk?<div>
<p style={{color:"#94A3B8",fontSize:14,marginBottom:16}}>Digite o PIN.</p>
<div className="input-wrap"><input className="input-field input-plain" type="password" placeholder="PIN (padrão: 1234)" value={adminPin} onChange={e=>setAdminPin(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){if(adminPin===(cfg.pin||"1234")){setAdminOk(true);setAdminPin("")}else notify("PIN incorreto.","error")}}}/></div>
<button className="btn-primary" onClick={()=>{if(adminPin===(cfg.pin||"1234")){setAdminOk(true);setAdminPin("")}else notify("PIN incorreto.","error")}}>Acessar</button>
</div>:<div>
<div className="tabs">{[["requests",`📋 Solicitações${pending?` (${pending})`:""}`],["users","👥 Usuários"],["qrcode","📱 QR Code"],["config","⚙ Config"]].map(([k,l])=>(<button key={k} className={`tab-btn ${adminTab===k?"active":""}`} onClick={()=>setAdminTab(k)}>{l}</button>))}</div>

{adminTab==="requests"&&<div>
{reqs.length===0?<div className="empty"><div className="icon">📭</div>Nenhuma solicitação.</div>:<div>
<div className="export-bar"><div className="stats"><strong>{reqs.length}</strong> solicitações · <strong style={{color:"#F59E0B"}}>{pending}</strong> pendentes</div>
<button className="export-btn" onClick={exportToExcel}>📊 Exportar Excel</button></div>
<div className="filter-bar">{[["all","Todas"],["pending","⏳ Pendentes"],["approved","✅ Aprovadas"],["rejected","❌ Rejeitadas"]].map(([k,l])=>(<button key={k} className={`filter-chip ${reqFilter===k?"active":""}`} onClick={()=>setReqFilter(k)}>{l}</button>))}</div>
{filteredReqs.length===0?<div className="empty" style={{padding:20}}>🔍 Nenhuma com este filtro.</div>:
filteredReqs.map(r=><div key={r.id} className={`req-card ${r.status==="pending"?"pending":"resolved"}`}>
<div className="req-header"><span className="req-badge" style={{background:r.type==="register"?"rgba(59,130,246,.15)":"rgba(245,158,11,.15)",color:r.type==="register"?"#60A5FA":"#F59E0B"}}>{r.type==="register"?"📋 Cadastro":"🔑 Recuperação"}</span><span className="req-badge" style={{background:r.status==="pending"?"rgba(245,158,11,.2)":r.status==="approved"?"rgba(34,197,94,.2)":"rgba(220,38,38,.2)",color:r.status==="pending"?"#F59E0B":r.status==="approved"?"#22C55E":"#EF4444"}}>{r.status==="pending"?"⏳ Pendente":r.status==="approved"?"✅ Aprovado":"❌ Rejeitado"}</span></div>
<div className="req-body">{r.name&&<div><strong>Nome:</strong> {r.name}</div>}<div><strong>Matrícula:</strong> {r.matricula}</div><div><strong>E-mail:</strong> {r.email}</div>{r.area&&r.area!=="—"&&<div><strong>Área:</strong> {r.area}</div>}{r.justification&&r.justification!=="—"&&<div><strong>Justificativa:</strong> {r.justification}</div>}<div className="req-date">📅 {r.date}{r.resolvedAt?` → ${r.resolvedAt}`:""}</div></div>
{r.status==="pending"&&<div className="req-actions"><button className="action-btn approve" onClick={()=>openApproveModal(r)}>✅ Aprovar</button><button className="action-btn reject" onClick={()=>handleReject(r)}>❌ Rejeitar</button></div>}
</div>)}
</div>}
</div>}

{adminTab==="users"&&<div>
{users.length===0?<div className="empty"><div className="icon">👥</div>Nenhum usuário.</div>:
users.map(u=><div key={u.matricula} className="user-card">
<div className="user-info"><div className="name">{u.name} {u.mustChangePassword&&<span style={{fontSize:10,color:"#F59E0B",background:"rgba(245,158,11,.15)",padding:"1px 6px",borderRadius:4,marginLeft:6}}>1º acesso pendente</span>}</div><div>🔖 {u.matricula} · 📧 {u.email}</div><div className="meta">{u.area!=="—"?`🏭 ${u.area} · `:""}{u.createdAt}</div></div>
<div style={{display:"flex",gap:6}}><button style={{background:"none",border:"none",color:"#60A5FA",cursor:"pointer",fontSize:14,padding:4}} title="Resetar senha" onClick={()=>{const np=generatePassword();saveUsers(users.map(x=>x.matricula===u.matricula?{...x,password:np,mustChangePassword:true}:x));notify(`🔑 Senha resetada: ${np}`,"success")}}>🔑</button><button className="del-btn" onClick={()=>handleDeleteUser(u.matricula)} title="Remover">🗑</button></div>
</div>)}
</div>}

{adminTab==="qrcode"&&<div>
{!cfg.appUrl?<div><div className="warn-box" style={{marginBottom:16}}>⚠ Cadastre a URL na aba ⚙ Config primeiro.</div><div style={{textAlign:"center"}}><button className="filter-chip active" onClick={()=>setAdminTab("config")}>Ir para Config →</button></div></div>:<div>
<div className="qr-size-row" style={{marginBottom:16}}><label>Tamanho:</label><select value={qrSize} onChange={e=>setQrSize(Number(e.target.value))}><option value={4}>Pequeno</option><option value={5}>Médio</option><option value={7}>Grande</option><option value={10}>Extra Grande</option></select></div>
<div id="qr-print-area" className="qr-card qr-print-area">{logo&&<img src={logo} className="qr-logo-print" alt=""/>}<div className="qr-title">PM Manager</div><div className="qr-subtitle">Gestão de Manutenção</div><div className="qr-container" dangerouslySetInnerHTML={{__html:generateQR(cfg.appUrl,qrSize)||""}}/><div className="qr-url">{cfg.appUrl}</div><div className="qr-footer">Escaneie com a câmera do celular</div></div>
<div className="qr-actions"><button className="qr-action-btn print" onClick={printQR}>🖨 Imprimir</button><button className="qr-action-btn download" onClick={downloadQR}>📥 Baixar PNG</button></div>
</div>}
</div>}

{adminTab==="config"&&<div>
<div style={{marginBottom:24,padding:16,background:"rgba(59,130,246,.06)",borderRadius:12,border:"1px solid rgba(59,130,246,.15)"}}><div style={{color:"#60A5FA",fontSize:13,fontWeight:700,marginBottom:10}}>📱 URL do App</div><div className="input-wrap"><input className="input-field input-plain" placeholder="https://pm-manager.vercel.app" value={cfg.appUrl||""} onChange={e=>setCfg(p=>({...p,appUrl:e.target.value}))}/></div></div>
<label className="label" style={{marginTop:0}}>PIN Admin</label><div className="input-wrap"><input className="input-field input-plain" value={cfg.pin} onChange={e=>setCfg(p=>({...p,pin:e.target.value}))}/></div>
<div style={{marginTop:20,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}><label className="label" style={{margin:0}}>Administradores</label>{cfg.admins.length<5&&<button className="add-admin-btn" onClick={addAdmin}>+ Adicionar</button>}</div>
{cfg.admins.map((a,i)=><div key={i} className="admin-card">{cfg.admins.length>1&&<button className="remove" onClick={()=>removeAdmin(i)}>✕</button>}<div className="admin-label">Admin {i+1}</div><input className="cfg-input" placeholder="Nome" value={a.name} onChange={e=>updateAdmin(i,"name",e.target.value)}/><div className="cfg-row"><input className="cfg-input" placeholder="📱 WhatsApp (5565...)" value={a.whatsapp} onChange={e=>updateAdmin(i,"whatsapp",e.target.value)}/><input className="cfg-input" placeholder="💬 Teams (e-mail)" value={a.teams} onChange={e=>updateAdmin(i,"teams",e.target.value)}/></div></div>)}
<button className="btn-primary" onClick={()=>{saveCfg(cfg);notify("✅ Configurações salvas na nuvem!","success")}}>Salvar Configurações</button>
</div>}
</div>}
</div></div>}

{/* APPROVE MODAL */}
{showApproveModal&&approveReq&&<div className="overlay" onClick={()=>setShowApproveModal(false)}><div className="modal slide-down" style={{maxWidth:460}} onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h2 className="modal-title">{approveReq.type==="register"?"✅ Aprovar Cadastro":"🔑 Resetar Senha"}</h2><button className="close-btn" onClick={()=>setShowApproveModal(false)}>✕</button></div>
<div>
<div style={{marginBottom:16,padding:12,background:"rgba(59,130,246,.08)",borderRadius:8,border:"1px solid rgba(59,130,246,.15)",color:"#CBD5E1",fontSize:13,lineHeight:1.8}}>
{approveReq.name&&<div><strong style={{color:"#F8FAFC"}}>👤 Nome:</strong> {approveReq.name}</div>}<div><strong style={{color:"#F8FAFC"}}>🔖 Matrícula:</strong> {approveReq.matricula}</div><div><strong style={{color:"#F8FAFC"}}>📧 E-mail:</strong> {approveReq.email}</div>{approveReq.area&&approveReq.area!=="—"&&<div><strong style={{color:"#F8FAFC"}}>🏭 Área:</strong> {approveReq.area}</div>}</div>
{approveReq.type==="register"?(<div><div style={{padding:12,background:"rgba(34,197,94,.08)",borderRadius:8,border:"1px solid rgba(34,197,94,.15)",marginBottom:12}}><div style={{color:"#22C55E",fontSize:13}}>✅ O solicitante já definiu sua senha.</div></div><div style={{padding:10,background:"rgba(245,158,11,.08)",borderRadius:8,border:"1px solid rgba(245,158,11,.15)"}}><div style={{color:"#F59E0B",fontSize:12}}>⚠ No primeiro login, será obrigado a trocar.</div></div></div>):(<div>
<label className="label" style={{marginTop:0}}>Senha Temporária</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type={approveShowPw?"text":"password"} placeholder="Senha" value={approvePassword} onChange={e=>setApprovePassword(e.target.value)}/><button className="eye-btn" onClick={()=>setApproveShowPw(!approveShowPw)}>{approveShowPw?"🙈":"👁"}</button></div>
{approvePassword&&(()=>{const s=getPasswordStrength(approvePassword);return s?<div className={`pw-strength ${s.cls}`}>Força: {s.label}</div>:null})()}
<div style={{display:"flex",gap:8,marginTop:8}}><button style={{flex:1,padding:"8px",borderRadius:8,border:"1px solid #1E3A5F",background:"rgba(15,23,42,.6)",color:"#60A5FA",fontSize:12,cursor:"pointer"}} onClick={()=>setApprovePassword(generatePassword())}>🎲 Gerar</button><button style={{flex:1,padding:"8px",borderRadius:8,border:"1px solid #1E3A5F",background:"rgba(15,23,42,.6)",color:"#94A3B8",fontSize:12,cursor:"pointer"}} onClick={()=>{navigator.clipboard?.writeText(approvePassword);notify("Copiada!","success")}}>📋 Copiar</button></div>
<div style={{marginTop:12,padding:10,background:"rgba(245,158,11,.08)",borderRadius:8,border:"1px solid rgba(245,158,11,.15)"}}><div style={{color:"#F59E0B",fontSize:12}}>⚠ Envie ao colaborador. No próximo login, trocará.</div></div></div>)}
<button className="btn-primary" onClick={confirmApprove}>Confirmar Aprovação</button>
</div>
</div></div>}
</div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

<style>
*{margin:0;padding:0;box-sizing:border-box}html,body,#root{height:100%;width:100%}
body{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#0B1929;color:#F8FAFC;overflow-x:hidden}
input,textarea,button,select{font-family:inherit}

@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.bg-texture{position:absolute;inset:0;background-image:radial-gradient(circle at 20% 50%,rgba(59,130,246,.08) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(245,158,11,.06) 0%,transparent 50%),radial-gradient(circle at 60% 80%,rgba(34,197,94,.05) 0%,transparent 50%)}

.container{position:relative;z-index:1;display:flex;min-height:100vh;flex-wrap:wrap}

.left-inner{max-width:500px;text-align:center}
.right{flex:1 1 400px;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.form-area{width:100%;max-width:420px}
.brand-title{font-size:clamp(28px,4vw,44px);font-weight:800;line-height:1.15;margin-bottom:12px;letter-spacing:-.02em}
.brand-sub{font-size:clamp(13px,1.6vw,17px);color:#F59E0B;font-weight:600;letter-spacing:.15em;text-transform:uppercase;margin-bottom:32px}
.brand-footer{font-size:14px;color:#64748B;margin-top:24px;line-height:1.6;max-width:380px;margin-left:auto;margin-right:auto}
.logo-area{width:100px;height:100px;border-radius:16px;border:2px dashed #334155;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;cursor:pointer;overflow:hidden;background:rgba(15,23,42,.6);transition:border-color .3s}

.logo-area img{width:100%;height:100%;object-fit:contain;padding:6px}
.logo-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;color:#64748B;font-size:11px;font-weight:500}
.form-block{background:rgba(15,23,42,.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(51,65,85,.5);border-radius:16px;padding:32px 28px}
.form-title{font-size:22px;font-weight:700;margin-bottom:6px}
.form-desc{font-size:14px;color:#94A3B8;margin-bottom:24px}
.label{display:block;font-size:13px;font-weight:600;color:#CBD5E1;margin:14px 0 6px}
.input-wrap{position:relative;display:flex;align-items:center;background:rgba(15,23,42,.7);border:1px solid #1E3A5F;border-radius:10px;transition:border-color .2s}
.input-wrap:focus-within{border-color:#3B82F6}
.input-icon{position:absolute;left:12px;font-size:16px;pointer-events:none;display:flex;align-items:center}
.input-field{flex:1;background:transparent;border:none;outline:none;color:#F1F5F9;font-size:15px;padding:12px 12px 12px 40px;width:100%}
.input-field::placeholder{color:#475569}
.input-plain{padding-left:14px}
textarea.input-field{padding:12px 14px;resize:vertical;font-size:14px;border-radius:10px;background:rgba(15,23,42,.7);border:1px solid #1E3A5F;width:100%;margin-top:4px;color:#F1F5F9;outline:none}
.btn-primary{width:100%;padding:13px 20px;border:none;border-radius:10px;background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#FFF;font-size:15px;font-weight:700;cursor:pointer;margin-top:22px;box-shadow:0 4px 14px rgba(37,99,235,.3);display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s}

.eye-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:8px 12px}
.link-btn{background:none;border:none;color:#60A5FA;font-size:13px;cursor:pointer;font-weight:500;padding:0}

.channel-btn.teams{background:#5B5FC7;border-color:#5B5FC7}
.action-btn{flex:1;padding:10px;border-radius:8px;border:1px solid;font-size:13px;font-weight:700;cursor:pointer;text-align:center}
.action-btn.approve{background:rgba(34,197,94,.15);color:#22C55E;border-color:rgba(34,197,94,.2)}
.action-btn.reject{background:rgba(220,38,38,.15);color:#EF4444;border-color:rgba(220,38,38,.2)}
.tabs{display:flex;margin-bottom:20px;border-radius:8px;overflow:hidden;border:1px solid #1E3A5F}
.tab-btn{flex:1;padding:10px 4px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:rgba(15,23,42,.6);color:#94A3B8;transition:all .2s}
.tab-btn.active{background:#1D4ED8;color:#FFF}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:#0F172A;border:1px solid #1E3A5F;border-radius:16px;padding:28px;width:100%;max-height:85vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:18px;font-weight:700}

.toast.success{background:#059669}.toast.error{background:#DC2626}.toast.info{background:#2563EB}

.req-body{color:#CBD5E1;font-size:13px;line-height:1.8}

.user-info{color:#CBD5E1;font-size:13px}.user-info .name{font-weight:700;color:#F8FAFC}.user-info .meta{color:#64748B;font-size:11px}
.admin-card{background:rgba(15,23,42,.4);border-radius:10px;padding:14px;border:1px solid #1E3A5F;margin-bottom:10px;position:relative}
.admin-card .remove{position:absolute;top:8px;right:10px;background:none;border:none;color:#64748B;cursor:pointer;font-size:14px}
.cfg-input{width:100%;background:rgba(15,23,42,.7);border:1px solid #1E3A5F;border-radius:8px;color:#F1F5F9;font-size:13px;padding:10px 12px;outline:none;box-sizing:border-box}
.cfg-input:focus{border-color:#3B82F6}.cfg-input::placeholder{color:#475569}
select.input-field{cursor:pointer;-webkit-appearance:auto;appearance:auto;background:transparent}
select.input-field option{background:#0F172A;color:#F1F5F9}
.cfg-row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}.cfg-row .cfg-input{flex:1;min-width:140px}
.empty{text-align:center;padding:40px 20px;color:#475569}.empty .icon{font-size:40px;margin-bottom:8px}
.pending-badge{background:#DC2626;color:#FFF;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;animation:pulse 2s infinite;position:absolute;top:-2px;margin-left:4px}
.notify-card{background:rgba(15,23,42,.5);border-radius:10px;padding:14px;border:1px solid #1E3A5F;margin-bottom:10px}
.warn-box{text-align:center;padding:20px;color:#F59E0B;font-size:13px;background:rgba(245,158,11,.08);border-radius:10px;border:1px solid rgba(245,158,11,.2);line-height:1.7}
.pw-strength{font-size:11px;margin-top:6px;font-weight:600}.pw-strength.weak{color:#EF4444}.pw-strength.medium{color:#F59E0B}.pw-strength.strong{color:#22C55E}
.export-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.export-bar .stats{color:#94A3B8;font-size:12px}.export-bar .stats strong{color:#F8FAFC}
.export-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid #166534;background:rgba(22,101,52,.2);color:#22C55E;font-size:13px;font-weight:600;cursor:pointer}
.filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-chip{padding:6px 12px;border-radius:20px;border:1px solid #1E3A5F;background:rgba(15,23,42,.6);color:#94A3B8;font-size:11px;font-weight:600;cursor:pointer}
.filter-chip.active{background:rgba(37,99,235,.2);border-color:#2563EB;color:#60A5FA}
.qr-card{background:white;border-radius:16px;padding:32px;text-align:center;max-width:360px;margin:0 auto}
.qr-card .qr-title{color:#0B1929;font-size:18px;font-weight:800;margin-bottom:4px}
.qr-card .qr-subtitle{color:#64748B;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px}
.qr-card .qr-container{display:inline-block;padding:12px;background:#FFF;border:3px solid #0B1929;border-radius:12px}
.qr-card .qr-url{color:#3B82F6;font-size:11px;margin-top:16px;word-break:break-all;font-weight:500}
.qr-card .qr-footer{color:#94A3B8;font-size:10px;margin-top:12px;border-top:1px solid #E2E8F0;padding-top:10px}
.qr-card .qr-logo-print{width:60px;height:60px;object-fit:contain;margin-bottom:10px;border-radius:8px}
.qr-actions{display:flex;gap:8px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.qr-action-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;border:1px solid;font-size:13px;font-weight:600;cursor:pointer}
.qr-action-btn.print{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.3);color:#60A5FA}
.qr-action-btn.download{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.3);color:#22C55E}
.qr-size-row{display:flex;gap:8px;justify-content:center;align-items:center}.qr-size-row label{color:#94A3B8;font-size:12px}
.qr-size-row select{background:rgba(15,23,42,.7);border:1px solid #1E3A5F;border-radius:6px;color:#F1F5F9;padding:6px 10px;font-size:12px;outline:none}
.sync-indicator{position:fixed;bottom:16px;right:16px;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;z-index:900;display:flex;align-items:center;gap:6px}
.sync-indicator.online{background:rgba(34,197,94,.15);color:#22C55E;border:1px solid rgba(34,197,94,.2)}
.super-admin-bar{position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,#7C3AED,#6D28D9);padding:8px 20px;display:flex;justify-content:space-between;align-items:center;z-index:500;font-size:13px;font-weight:600}
.super-admin-bar button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#FFF;padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600}
.sa-company-card{background:rgba(15,23,42,.4);border:1px solid #1E3A5F;border-radius:12px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.sa-company-card .info{flex:1}.sa-company-card .info .name{font-weight:700;color:#F8FAFC;font-size:15px}
.sa-company-card .info .detail{color:#64748B;font-size:12px;margin-top:2px}
.sa-company-card .actions{display:flex;gap:6px}.sa-company-card .actions button{background:none;border:none;cursor:pointer;font-size:16px;padding:4px}
.loading-spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.2);border-top-color:#60A5FA;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
/* ─── Dashboard ─── */
.dashboard{position:relative;z-index:1;min-height:100vh;padding:20px}
.dash-header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;flex-wrap:wrap;gap:12px;border-bottom:1px solid #1E3A5F;margin-bottom:30px}
.dash-header .left-h{display:flex;align-items:center;gap:14px}
.dash-header .company-logo{width:56px;height:56px;border-radius:12px;object-fit:contain;background:rgba(255,255,255,.05);padding:4px}
.dash-header .company-name{font-size:20px;font-weight:800}
.dash-header .user-name{color:#94A3B8;font-size:13px}
.dash-header .logout-btn{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.2);color:#EF4444;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;max-width:900px;margin:0 auto}
.dash-card{background:rgba(15,23,42,.5);backdrop-filter:blur(10px);border:1px solid rgba(51,65,85,.5);border-radius:16px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;gap:12px}
.dash-card:hover{border-color:#3B82F6;background:rgba(37,99,235,.08);transform:translateY(-4px);box-shadow:0 8px 30px rgba(37,99,235,.15)}
.dash-card .icon{font-size:36px;animation:float 3s ease-in-out infinite}
.dash-card .card-title{font-size:14px;font-weight:700;color:#F8FAFC}
.dash-card .card-desc{font-size:11px;color:#64748B;line-height:1.4}
.dash-card:nth-child(2) .icon{animation-delay:.3s}
.dash-card:nth-child(3) .icon{animation-delay:.6s}
.dash-card:nth-child(4) .icon{animation-delay:.9s}
.dash-card:nth-child(5) .icon{animation-delay:1.2s}
.dash-card:nth-child(6) .icon{animation-delay:1.5s}
.dash-card:nth-child(7) .icon{animation-delay:1.8s}
.dash-card:nth-child(8) .icon{animation-delay:2.1s}
/* ─── Report tables ─── */
.report-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:16px}
.report-table th{background:rgba(37,99,235,.15);color:#60A5FA;padding:10px 12px;text-align:left;font-weight:700;font-size:12px;border-bottom:1px solid #1E3A5F}
.report-table td{padding:10px 12px;border-bottom:1px solid rgba(30,58,95,.4);color:#CBD5E1}
.report-table tr:hover td{background:rgba(37,99,235,.04)}
.back-btn{background:none;border:1px solid #1E3A5F;color:#60A5FA;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.back-btn:hover{border-color:#3B82F6;background:rgba(37,99,235,.08)}
@media print{body *{visibility:hidden}.qr-print-area,.qr-print-area *{visibility:visible}.qr-print-area{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%)}}
@media(max-width:480px){.left{padding:30px 20px;min-height:280px}.right{padding:20px 16px}.form-block{padding:24px 20px}.modal{padding:20px}.brand-footer{display:none}.dash-grid{grid-template-columns:repeat(2,1fr);gap:12px}.dash-card{padding:20px 14px}.dash-card .icon{font-size:28px}}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>

<script type="text/babel">
const{useState,useEffect,useRef}=React;
const FB="https://pm-manager-3c06f-default-rtdb.firebaseio.com";
const api={
  async get(p){try{const r=await fetch(`${FB}/${p}.json`);return await r.json()}catch{return null}},
  async set(p,d){try{await fetch(`${FB}/${p}.json`,{method:"PUT",body:JSON.stringify(d),headers:{"Content-Type":"application/json"}});return true}catch{return false}},
  async del(p){try{await fetch(`${FB}/${p}.json`,{method:"DELETE"});return true}catch{return false}},
  async push(p,d){try{await fetch(`${FB}/${p}.json`,{method:"POST",body:JSON.stringify(d),headers:{"Content-Type":"application/json"}});return true}catch{return false}},
};
function sendWhatsApp(p,t){window.open(`https://wa.me/${p.replace(/\D/g,"")}?text=${encodeURIComponent(t)}`,"_blank")}
// Unique ID generator: prefix + zero-padded sequential based on existing list
function genUniqueId(prefix,existing){
  let max=0;
  (existing||[]).forEach(item=>{const id=String(item.uid||item.id||"");const m=id.match(new RegExp("^"+prefix+"-(\\d+)$"));if(m){const n=parseInt(m[1]);if(n>max)max=n}});
  return `${prefix}-${String(max+1).padStart(5,"0")}`;
}
function sendTeams(e,t){window.open(`https://teams.microsoft.com/l/chat/0/0?users=${encodeURIComponent(e)}&message=${encodeURIComponent(t)}`,"_blank")}
function genPw(){const c="ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789";let p="";for(let i=0;i<8;i++)p+=c[Math.floor(Math.random()*c.length)];return p}
function pwStr(p){if(!p)return null;if(p.length<4)return{label:"Fraca",cls:"weak"};let s=0;if(p.length>=6)s++;if(p.length>=8)s++;if(/[A-Z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;if(s<=2)return{label:"Fraca",cls:"weak"};if(s<=3)return{label:"Média",cls:"medium"};return{label:"Forte",cls:"strong"}}

// ─── LOGIN: search all companies ───
const handleLogin=async()=>{
  if(!mat||!pw){notify("Preencha matrícula e senha.","error");return}
  setSearching(true);
  try{
    const comps=await api.get("companies");
    if(!comps){notify("Nenhuma empresa.","error");setSearching(false);return}
    for(const[cid,cdata]of Object.entries(comps)){
      if(cdata.users){
        const u=Object.values(cdata.users).find(x=>x.matricula===mat&&x.status==="approved");
        if(u){
          if(u.password!==pw){notify("Senha incorreta.","error");setSearching(false);return}
          setCurrentCompany({id:cid,...cdata});setLoggedUser({...u,role:u.role||"colaborador",permissions:u.permissions||{}});
          if(u.mustChangePassword){setScreen("changePw");setPhase("main");notify("Primeiro acesso — crie nova senha.","info");setSearching(false);return}
          setPhase("dashboard");notify(`Bem-vindo(a), ${u.name}!`,"success");setSearching(false);return;
        }
      }
    }
    notify("Matrícula não encontrada ou acesso pendente.","error");
  }catch{notify("Erro de conexão.","error")}
  setSearching(false);
};

// ─── REGISTER ───
const handleRegister=async()=>{
  if(!regName||!regMat||!regEmail||!regCode){notify("Preencha todos os campos obrigatórios.","error");return}
  if(!regPw||regPw.length<4){notify("Senha mín. 4 caracteres.","error");return}
  if(regPw!==regPwC){notify("Senhas não coincidem.","error");return}
  setSearching(true);
  try{
    const comps=await api.get("companies");
    if(!comps){notify("Nenhuma empresa.","error");setSearching(false);return}
    let target=null;
    for(const[cid,cdata]of Object.entries(comps)){
      if(cdata.name&&cdata.name.toUpperCase()===regCode.toUpperCase()){target={id:cid,...cdata};break}
    }
    if(!target){notify("Nome de empresa não encontrado. Verifique com o Gerente.","error");setSearching(false);return}
    const existReqs=await api.get(`companies/${target.id}/requests`);
    if(existReqs&&Object.values(existReqs).find(r=>r.matricula===regMat&&r.type==="register"&&r.status==="pending")){notify("Já existe solicitação pendente.","error");setSearching(false);return}
    const req={id:Date.now().toString(),type:"register",name:regName,matricula:regMat,email:regEmail,area:regArea||"—",justification:regJust||"—",password:regPw,date:new Date().toLocaleString("pt-BR"),status:"pending"};
    const upd=existReqs?{...existReqs,[req.id]:req}:{[req.id]:req};
    await api.set(`companies/${target.id}/requests`,upd);
    await logUser("Solicitação de Cadastro",`${regName} (${regMat}) → ${target.name}`);
    const tcfg=await api.get(`companies/${target.id}/config`);
    setCurrentCompany(target);if(tcfg)setCfg(p=>({...p,...tcfg}));
    setLastReq(req);setShowNotify(true);
    notify(`✅ Cadastro enviado para ${target.name}!`,"success");
    setRegName("");setRegMat("");setRegEmail("");setRegArea("");setRegJust("");setRegPw("");setRegPwC("");setRegCode("");setScreen("login");
  }catch{notify("Erro.","error")}
  setSearching(false);
};

    for(const[cid,cdata]of Object.entries(comps||{})){
      if(cdata.users){const u=Object.values(cdata.users).find(x=>x.matricula===recMat);if(u){target={id:cid,...cdata};break}}
    }
    if(!target){notify("Matrícula não encontrada.","error");setSearching(false);return}
    const req={id:Date.now().toString(),type:"recovery",matricula:recMat,email:recEmail,date:new Date().toLocaleString("pt-BR"),status:"pending"};
    const exist=await api.get(`companies/${target.id}/requests`)||{};

    setLastReq(req);setShowNotify(true);
    notify("✅ Recuperação enviada!","success");setRecMat("");setRecEmail("");setScreen("login");

// Status que IMPACTAM no absenteísmo (faltas não justificadas adequadamente):
const STATUS_ABSENTEISMO=["Falta","Atestado"];
// Status que NÃO impactam (presenças e ausências justificadas/programadas):
const STATUS_NAO_ABSENTEISMO=["Presente","Folga","Férias","Afastado","Treinamento","Hora Extra","Emprestado"];
const getDateRange=(start,end)=>{const dates=[];const s=new Date(start+"T12:00:00");const e=new Date(end+"T12:00:00");for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){dates.push(d.toISOString().slice(0,10))}return dates};
const getStatusForDate=(matricula,dateStr,turno)=>{const[y,m,d]=dateStr.split("-");const monthKey=`${y}-${m}`;const key=`${monthKey}_${matricula}_${parseInt(d)}`;return hcOverrides[key]||getDefaultStatus(turno,dateStr)};
const calcAbsenteismo=(start,end,terminal,centro)=>{
  const dates=getDateRange(start,end);
  const byTurno={A:{worked:0,absent:0,total:0},B:{worked:0,absent:0,total:0},C:{worked:0,absent:0,total:0},D:{worked:0,absent:0,total:0},ADM:{worked:0,absent:0,total:0}};
  let totWorked=0,totAbsent=0;
  const filtered=hcList.filter(h=>(!terminal||h.terminal===terminal)&&(!centro||h.centroTrabalho===centro));
  filtered.forEach(h=>{
    if(!byTurno[h.turno])return;
    dates.forEach(ds=>{
      const st=getStatusForDate(h.matricula,ds,h.turno);
      byTurno[h.turno].total++;
      if(STATUS_ABSENTEISMO.includes(st)){byTurno[h.turno].absent++;totAbsent++;byTurno[h.turno].worked++;totWorked++}
      else if(st==="Presente"||st==="Hora Extra"||st==="Emprestado"){byTurno[h.turno].worked++;totWorked++}
    });
  });
  const result={};
  Object.keys(byTurno).forEach(t=>{const v=byTurno[t];result[t]={...v,rate:v.worked>0?(v.absent/v.worked*100):0}});
  return{byTurno:result,totalRate:totWorked>0?(totAbsent/totWorked*100):0,totWorked,totAbsent,collaborators:filtered.length};
};

// Escala de Folga: cycle of 8 days starting 2025-01-01 = D
const ESCALA_CYCLE=["D","D","A","A","B","B","C","C"];
const ESCALA_BASE=new Date(2025,0,1);
const getDiaSemana=d=>{const n=["dom","seg","ter","qua","qui","sex","sáb"];return n[d.getDay()]};
const getDiaSemanaFull=d=>{const n=["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];return n[d.getDay()]};
const getFolgaTurno=(dateStr)=>{const d=new Date(dateStr+"T12:00:00");const diff=Math.floor((d-ESCALA_BASE)/(86400000));const idx=((diff%8)+8)%8;return ESCALA_CYCLE[idx]};
const isAdmFolga=(dateStr)=>{const d=new Date(dateStr+"T12:00:00");const dow=d.getDay();return dow===0||dow===6};
const getDefaultStatus=(turno,dateStr)=>{if(turno==="ADM")return isAdmFolga(dateStr)?"Folga":"Presente";const folgaTurno=getFolgaTurno(dateStr);return turno===folgaTurno?"Folga":"Presente"};
const getMonthEscala=(monthStr)=>{const[y,m]=monthStr.split("-").map(Number);const days=[];const dt=new Date(y,m-1,1);while(dt.getMonth()===m-1){const ds=dt.toISOString().slice(0,10);days.push({date:ds,turno:getFolgaTurno(ds),diaSemana:getDiaSemana(dt),diaFull:getDiaSemanaFull(dt),dia:dt.getDate()});dt.setDate(dt.getDate()+1)}return days};

{(()=>{
// Distribui as unidades de cada linha:
// nc = unidades não conformes/pendentes da linha; o restante (qtd - nc) é conforme (se instalado).
const farolCounts={"Conforme":0,"Não Conforme":0,"Melhoria Necessária":0};
dcsList.forEach(d=>{
  const qty=parseInt(d.quantidade)||0;
  const ncRaw=(d.qtdNaoConforme!==undefined&&d.qtdNaoConforme!=="")?(parseInt(d.qtdNaoConforme)||0):(d.status==="Conforme"?0:qty);
  const nc=Math.min(ncRaw,qty);
  if(d.status==="Conforme"){farolCounts["Conforme"]+=qty;}
  else if(d.status==="Não Conforme"){farolCounts["Não Conforme"]+=nc;farolCounts["Conforme"]+=(qty-nc);}
  else if(d.status==="Melhoria Necessária"){farolCounts["Melhoria Necessária"]+=nc;}
});
return DCS_STATUS.map(s=>{const count=farolCounts[s];const active=farolFilter===s;return(
<div key={s} onClick={()=>setFarolFilter(active?"":s)} style={{background:active?dcsStatusBg[s]:"rgba(15,23,42,.4)",borderRadius:10,border:`1px solid ${active?dcsStatusColor[s]:"#1E3A5F"}`,padding:14,cursor:"pointer",transition:"all .2s",position:"relative"}}>
<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
<span style={{width:12,height:12,borderRadius:"50%",background:dcsStatusColor[s],display:"inline-block",boxShadow:active?`0 0 10px ${dcsStatusColor[s]}`:"none"}}/>
<div style={{color:"#94A3B8",fontSize:11}}>{dcsStatusIcon[s]} {s}</div>
</div>
<div style={{fontSize:32,fontWeight:800,color:dcsStatusColor[s]}}>{count}</div>
<div style={{fontSize:9,color:"#64748B",marginTop:2}}>unidades</div>
</div>);});})()}
</div>

ha Resetada",`${u.name} (${u.matricula})`);notify(`🔑 Reset: ${np}`,"success")}}>🔑</button><button style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:18,padding:4}} onClick={async()=>{saveUsers(users.filter(x=>x.matricula!==u.matricula));await logUser("Usuário Removido",`${u.name} (${u.matricula}) de ${currentCompany?.name}`);notify("Removido.","info")}}>🗑</button></div></div>)}</div>}

<input className="cfg-input" placeholder="Nome do Gerente" value={a.name} onChange={e=>{const admins=[...(saEditCfg.admins||[])];admins[i]={...admins[i],name:e.target.value};setSaEditCfg(p=>({...p,admins}))}}/>
<div className="cfg-row">
<input className="cfg-input" placeholder="📱 WhatsApp (5566...)" value={a.whatsapp} onChange={e=>{const admins=[...(saEditCfg.admins||[])];admins[i]={...admins[i],whatsapp:e.target.value};setSaEditCfg(p=>({...p,admins}))}}/>
<input className="cfg-input" placeholder="💬 Teams (e-mail)" value={a.teams} onChange={e=>{const admins=[...(saEditCfg.admins||[])];admins[i]={...admins[i],teams:e.target.value};setSaEditCfg(p=>({...p,admins}))}}/>
</div>
</div>)}

<button className="btn-primary" onClick={async()=>{
  await api.set(`companies/${saEditComp.id}/config`,saEditCfg);
  if(saEditLogo)await api.set(`companies/${saEditComp.id}/logo`,saEditLogo);
  notify(`✅ "${saEditComp.name}" atualizada!`,"success");
  setSaEditComp(null);
}}>Salvar Configuração</button>
</div></div>}

{saTab==="settings"&&<div className="fade-in form-block">
<h2 className="form-title">🔐 PIN do Administrador</h2><p className="form-desc">Altere o PIN de controle total</p>
<label className="label">PIN Atual: <code style={{color:"#F59E0B"}}>{saCfg.pin}</code></label>
<label className="label">Novo PIN</label><div className="input-wrap"><input className="input-field input-plain" placeholder="Mín. 4 caracteres" id="sa-new-pin"/></div>
<button className="btn-primary" onClick={async()=>{const v=document.getElementById("sa-new-pin").value;if(!v||v.length<4){notify("Mín. 4.","error");return}const u={...saCfg,pin:v};setSaCfg(u);await api.set("superadmin",u);notify("✅ Atualizado!","success")}}>Alterar PIN</button>
</div>}
</div></div>);

return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

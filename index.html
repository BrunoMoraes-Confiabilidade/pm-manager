<style>
*{margin:0;padding:0;box-sizing:border-box}html,body,#root{height:100%;width:100%}
body{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#0B1929;color:#F8FAFC;overflow-x:hidden}
input,textarea,button,select{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}

.fade-in{animation:fadeIn .4s ease}.slide-down{animation:slideDown .3s ease}
.app{min-height:100vh;position:relative;overflow:hidden}
.bg-texture{position:absolute;inset:0;background-image:radial-gradient(circle at 20% 50%,rgba(59,130,246,.08) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(245,158,11,.06) 0%,transparent 50%),radial-gradient(circle at 60% 80%,rgba(34,197,94,.05) 0%,transparent 50%)}

.container{position:relative;z-index:1;display:flex;min-height:100vh;flex-wrap:wrap}
.left{flex:1 1 420px;display:flex;align-items:center;justify-content:center;padding:40px 32px;min-height:360px}
.left-inner{max-width:500px;text-align:center}
.right{flex:1 1 400px;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.form-area{width:100%;max-width:420px}
.brand-title{font-size:clamp(28px,4vw,44px);font-weight:800;line-height:1.15;margin-bottom:12px;letter-spacing:-.02em}
.brand-sub{font-size:clamp(13px,1.6vw,17px);color:#F59E0B;font-weight:600;letter-spacing:.15em;text-transform:uppercase;margin-bottom:32px}
.brand-footer{font-size:14px;color:#64748B;margin-top:24px;line-height:1.6;max-width:380px;margin-left:auto;margin-right:auto}
.logo-area{width:100px;height:100px;border-radius:16px;border:2px dashed #334155;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;cursor:pointer;overflow:hidden;background:rgba(15,23,42,.6);transition:border-color .3s}

.form-title{font-size:22px;font-weight:700;margin-bottom:6px}
.form-desc{font-size:14px;color:#94A3B8;margin-bottom:24px}
.label{display:block;font-size:13px;font-weight:600;color:#CBD5E1;margin:14px 0 6px}
.input-wrap{position:relative;display:flex;align-items:center;background:rgba(15,23,42,.7);border:1px solid #1E3A5F;border-radius:10px;transition:border-color .2s}
.input-wrap:focus-within{border-color:#3B82F6}
.input-icon{position:absolute;left:12px;font-size:16px;pointer-events:none;display:flex;align-items:center}

.btn-primary{width:100%;padding:13px 20px;border:none;border-radius:10px;background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#FFF;font-size:15px;font-weight:700;cursor:pointer;margin-top:22px;box-shadow:0 4px 14px rgba(37,99,235,.3);display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s}

.links-row{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:18px;flex-wrap:wrap}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}

.toast.success{background:#059669}.toast.error{background:#DC2626}.toast.info{background:#2563EB}

.user-info{color:#CBD5E1;font-size:13px}.user-info .name{font-weight:700;color:#F8FAFC}.user-info .meta{color:#64748B;font-size:11px}
.admin-card{background:rgba(15,23,42,.4);border-radius:10px;padding:14px;border:1px solid #1E3A5F;margin-bottom:10px;position:relative}
.admin-card .remove{position:absolute;top:8px;right:10px;background:none;border:none;color:#64748B;cursor:pointer;font-size:14px}
.cfg-input{width:100%;background:rgba(15,23,42,.7);border:1px solid #1E3A5F;border-radius:8px;color:#F1F5F9;font-size:13px;padding:10px 12px;outline:none;box-sizing:border-box}
.cfg-input:focus{border-color:#3B82F6}.cfg-input::placeholder{color:#475569}
select.input-field{cursor:pointer;-webkit-appearance:auto;appearance:auto;background:transparent}
select.input-field option{background:#0F172A;color:#F1F5F9}
.cfg-row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}.cfg-row .cfg-input{flex:1;min-width:140px}
.empty{text-align:center;padding:40px 20px;color:#475569}.empty .icon{font-size:40px;margin-bottom:8px}
.pending-badge{background:#DC2626;color:#FFF;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;animation:pulse 2s infinite;position:absolute;top:-2px;margin-left:4px}
.notify-card{background:rgba(15,23,42,.5);border-radius:10px;padding:14px;border:1px solid #1E3A5F;margin-bottom:10px}
.warn-box{text-align:center;padding:20px;color:#F59E0B;font-size:13px;background:rgba(245,158,11,.08);border-radius:10px;border:1px solid rgba(245,158,11,.2);line-height:1.7}
.pw-strength{font-size:11px;margin-top:6px;font-weight:600}.pw-strength.weak{color:#EF4444}.pw-strength.medium{color:#F59E0B}.pw-strength.strong{color:#22C55E}
.export-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.export-bar .stats{color:#94A3B8;font-size:12px}.export-bar .stats strong{color:#F8FAFC}
.export-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid #166534;background:rgba(22,101,52,.2);color:#22C55E;font-size:13px;font-weight:600;cursor:pointer}
.filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-chip{padding:6px 12px;border-radius:20px;border:1px solid #1E3A5F;background:rgba(15,23,42,.6);color:#94A3B8;font-size:11px;font-weight:600;cursor:pointer}
.filter-chip.active{background:rgba(37,99,235,.2);border-color:#2563EB;color:#60A5FA}
.qr-card{background:white;border-radius:16px;padding:32px;text-align:center;max-width:360px;margin:0 auto}
.qr-card .qr-title{color:#0B1929;font-size:18px;font-weight:800;margin-bottom:4px}
.qr-card .qr-subtitle{color:#64748B;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px}
.qr-card .qr-container{display:inline-block;padding:12px;background:#FFF;border:3px solid #0B1929;border-radius:12px}
.qr-card .qr-url{color:#3B82F6;font-size:11px;margin-top:16px;word-break:break-all;font-weight:500}
.qr-card .qr-footer{color:#94A3B8;font-size:10px;margin-top:12px;border-top:1px solid #E2E8F0;padding-top:10px}
.qr-card .qr-logo-print{width:60px;height:60px;object-fit:contain;margin-bottom:10px;border-radius:8px}
.qr-actions{display:flex;gap:8px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.qr-action-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;border:1px solid;font-size:13px;font-weight:600;cursor:pointer}
.qr-action-btn.print{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.3);color:#60A5FA}
.qr-action-btn.download{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.3);color:#22C55E}
.qr-size-row{display:flex;gap:8px;justify-content:center;align-items:center}.qr-size-row label{color:#94A3B8;font-size:12px}
.qr-size-row select{background:rgba(15,23,42,.7);border:1px solid #1E3A5F;border-radius:6px;color:#F1F5F9;padding:6px 10px;font-size:12px;outline:none}
.sync-indicator{position:fixed;bottom:16px;right:16px;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;z-index:900;display:flex;align-items:center;gap:6px}
.sync-indicator.online{background:rgba(34,197,94,.15);color:#22C55E;border:1px solid rgba(34,197,94,.2)}
.super-admin-bar{position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,#7C3AED,#6D28D9);padding:8px 20px;display:flex;justify-content:space-between;align-items:center;z-index:500;font-size:13px;font-weight:600}
.super-admin-bar button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#FFF;padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600}
.sa-company-card{background:rgba(15,23,42,.4);border:1px solid #1E3A5F;border-radius:12px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.sa-company-card .info{flex:1}.sa-company-card .info .name{font-weight:700;color:#F8FAFC;font-size:15px}
.sa-company-card .info .detail{color:#64748B;font-size:12px;margin-top:2px}
.sa-company-card .actions{display:flex;gap:6px}.sa-company-card .actions button{background:none;border:none;cursor:pointer;font-size:16px;padding:4px}
.loading-spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.2);border-top-color:#60A5FA;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
/* ─── Dashboard ─── */
.dashboard{position:relative;z-index:1;min-height:100vh;padding:20px}
.dash-header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;flex-wrap:wrap;gap:12px;border-bottom:1px solid #1E3A5F;margin-bottom:30px}
.dash-header .left-h{display:flex;align-items:center;gap:14px}
.dash-header .company-logo{width:56px;height:56px;border-radius:12px;object-fit:contain;background:rgba(255,255,255,.05);padding:4px}
.dash-header .company-name{font-size:20px;font-weight:800}
.dash-header .user-name{color:#94A3B8;font-size:13px}
.dash-header .logout-btn{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.2);color:#EF4444;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;max-width:900px;margin:0 auto}
.dash-card{background:rgba(15,23,42,.5);backdrop-filter:blur(10px);border:1px solid rgba(51,65,85,.5);border-radius:16px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;gap:12px}
.dash-card:hover{border-color:#3B82F6;background:rgba(37,99,235,.08);transform:translateY(-4px);box-shadow:0 8px 30px rgba(37,99,235,.15)}
.dash-card .icon{font-size:36px;animation:float 3s ease-in-out infinite}
.dash-card .card-title{font-size:14px;font-weight:700;color:#F8FAFC}
.dash-card .card-desc{font-size:11px;color:#64748B;line-height:1.4}
.dash-card:nth-child(2) .icon{animation-delay:.3s}
.dash-card:nth-child(3) .icon{animation-delay:.6s}
.dash-card:nth-child(4) .icon{animation-delay:.9s}
.dash-card:nth-child(5) .icon{animation-delay:1.2s}
.dash-card:nth-child(6) .icon{animation-delay:1.5s}
/* ─── Report tables ─── */
.report-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:16px}
.report-table th{background:rgba(37,99,235,.15);color:#60A5FA;padding:10px 12px;text-align:left;font-weight:700;font-size:12px;border-bottom:1px solid #1E3A5F}
.report-table td{padding:10px 12px;border-bottom:1px solid rgba(30,58,95,.4);color:#CBD5E1}
.report-table tr:hover td{background:rgba(37,99,235,.04)}
.back-btn{background:none;border:1px solid #1E3A5F;color:#60A5FA;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.back-btn:hover{border-color:#3B82F6;background:rgba(37,99,235,.08)}
@media print{body *{visibility:hidden}.qr-print-area,.qr-print-area *{visibility:visible}.qr-print-area{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%)}}
@media(max-width:480px){.left{padding:30px 20px;min-height:280px}.right{padding:20px 16px}.form-block{padding:24px 20px}.modal{padding:20px}.brand-footer{display:none}.dash-grid{grid-template-columns:repeat(2,1fr);gap:12px}.dash-card{padding:20px 14px}.dash-card .icon{font-size:28px}}
</style>

<script type="text/babel">
const{useState,useEffect,useRef}=React;
const FB="https://pm-manager-3c06f-default-rtdb.firebaseio.com";
const api={
  async get(p){try{const r=await fetch(`${FB}/${p}.json`);return await r.json()}catch{return null}},
  async set(p,d){try{await fetch(`${FB}/${p}.json`,{method:"PUT",body:JSON.stringify(d),headers:{"Content-Type":"application/json"}});return true}catch{return false}},
  async del(p){try{await fetch(`${FB}/${p}.json`,{method:"DELETE"});return true}catch{return false}},
  async push(p,d){try{await fetch(`${FB}/${p}.json`,{method:"POST",body:JSON.stringify(d),headers:{"Content-Type":"application/json"}});return true}catch{return false}},
};
function sendWhatsApp(p,t){window.open(`https://wa.me/${p.replace(/\D/g,"")}?text=${encodeURIComponent(t)}`,"_blank")}
function sendTeams(e,t){window.open(`https://teams.microsoft.com/l/chat/0/0?users=${encodeURIComponent(e)}&message=${encodeURIComponent(t)}`,"_blank")}
function genPw(){const c="ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789";let p="";for(let i=0;i<8;i++)p+=c[Math.floor(Math.random()*c.length)];return p}
function pwStr(p){if(!p)return null;if(p.length<4)return{label:"Fraca",cls:"weak"};let s=0;if(p.length>=6)s++;if(p.length>=8)s++;if(/[A-Z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;if(s<=2)return{label:"Fraca",cls:"weak"};if(s<=3)return{label:"Média",cls:"medium"};return{label:"Forte",cls:"strong"}}
function Illust(){return(<svg viewBox="0 0 520 400" fill="none" xmlns="http://www.w3.org/2000/svg" style={{width:"100%",maxWidth:480,height:"auto"}}><g opacity=".08"><circle cx="260" cy="200" r="160" stroke="#F59E0B" strokeWidth="30"/>{[0,45,90,135,180,225,270,315].map((a,i)=>{const r=a*Math.PI/180;return<line key={i} x1={260+140*Math.cos(r)} y1={200+140*Math.sin(r)} x2={260+185*Math.cos(r)} y2={200+185*Math.sin(r)} stroke="#F59E0B" strokeWidth="28" strokeLinecap="round"/>})}</g><g opacity=".12" transform="translate(400,80)"><circle r="35" stroke="#3B82F6" strokeWidth="10"/>{[0,60,120,180,240,300].map((a,i)=>{const r=a*Math.PI/180;return<line key={i} x1={30*Math.cos(r)} y1={30*Math.sin(r)} x2={48*Math.cos(r)} y2={48*Math.sin(r)} stroke="#3B82F6" strokeWidth="12" strokeLinecap="round"/>})}</g><g transform="translate(180,120)"><rect width="100" height="130" rx="8" fill="#1E3A5F" opacity=".85"/><rect x="-8" y="-6" width="116" height="20" rx="4" fill="#2D5F8A" opacity=".9"/>{[30,56,82,108].map((y,i)=>(<g key={i}><rect x="14" y={y} width="14" height="14" rx="2" stroke="#F59E0B" strokeWidth="2" fill="none"/>{i<2&&<path d={`M17 ${y+7} L22 ${y+12} L30 ${y+3}`} stroke="#22C55E" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>}<rect x="38" y={y+4} width={40+i%2*8} height="6" rx="3" fill="#94A3B8" opacity=".5"/></g>))}</g><g transform="translate(340,140)" opacity=".7"><ellipse cx="28" cy="10" rx="22" ry="10" fill="#F59E0B"/><rect x="6" y="8" width="44" height="6" rx="3" fill="#D97706"/><circle cx="28" cy="26" r="14" fill="#475569"/><rect x="14" y="40" width="28" height="50" rx="6" fill="#334155"/><rect x="62" y="34" width="22" height="30" rx="3" fill="#1E3A5F" stroke="#3B82F6" strokeWidth="1.5" transform="rotate(15 73 49)"/><rect x="14" y="88" width="12" height="40" rx="5" fill="#1E293B"/><rect x="30" y="88" width="12" height="40" rx="5" fill="#1E293B"/></g><g transform="translate(60,340)" opacity=".35"><polyline points="0,20 40,20 55,5 70,35 85,15 100,20 160,20 180,8 200,25 220,12 260,20 360,20" stroke="#3B82F6" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></g></svg>)}
function Toast({msg,type,onClose}){useEffect(()=>{const t=setTimeout(onClose,4500);return()=>clearTimeout(t)},[]);return<div className={`toast ${type} slide-down`}><span>{type==="success"?"✓":type==="error"?"✕":"ℹ"}</span>{msg}</div>}

function App(){
const[phase,setPhase]=useState("loading");
const[toast,setToast]=useState(null);
const[synced,setSynced]=useState(false);

const[companies,setCompanies]=useState([]);const[saTab,setSaTab]=useState("companies");
const[saNewName,setSaNewName]=useState("");const[showSaPinModal,setShowSaPinModal]=useState(false);
const[companyLogs,setCompanyLogs]=useState([]);const[userLogs,setUserLogs]=useState([]);

// Login
const[screen,setScreen]=useState("login");const[mat,setMat]=useState("");const[pw,setPw]=useState("");const[showPwV,setShowPwV]=useState(false);const[searching,setSearching]=useState(false);

// Register
const[regCode,setRegCode]=useState("");const[regName,setRegName]=useState("");const[regMat,setRegMat]=useState("");const[regEmail,setRegEmail]=useState("");const[regArea,setRegArea]=useState("");const[regJust,setRegJust]=useState("");const[regPw,setRegPw]=useState("");const[regPwC,setRegPwC]=useState("");const[regShowPw,setRegShowPw]=useState(false);
const[recMat,setRecMat]=useState("");const[recEmail,setRecEmail]=useState("");

// Change pw
const[loggedUser,setLoggedUser]=useState(null);const[cpOld,setCpOld]=useState("");const[cpNew,setCpNew]=useState("");const[cpConf,setCpConf]=useState("");

// Company context
const[currentCompany,setCurrentCompany]=useState(null);const[logo,setLogo]=useState(null);
const[reqs,setReqs]=useState([]);const[users,setUsers]=useState([]);
const[cfg,setCfg]=useState({pin:"1234",admins:[{name:"",whatsapp:"",teams:""}],appUrl:""});
const[showNotify,setShowNotify]=useState(false);const[lastReq,setLastReq]=useState(null);

// Gerente da Conta (company admin)
const[showGerente,setShowGerente]=useState(false);const[gerentePin,setGerentePin]=useState("");const[gerenteOk,setGerenteOk]=useState(false);const[gerenteTab,setGerenteTab]=useState("requests");const[gerenteCompanyId,setGerenteCompanyId]=useState("");
const[showApprove,setShowApprove]=useState(false);const[appReq,setAppReq]=useState(null);const[appPw,setAppPw]=useState("");const[appShowPw,setAppShowPw]=useState(false);
const[reqFilter,setReqFilter]=useState("all");const[qrSize,setQrSize]=useState(5);

// Dashboard
const[dashPhase,setDashPhase]=useState("home"); // home, reports, reportUserHist, reportCompanyHist
const logoRef=useRef(null);

// ─── Init ───
useEffect(()=>{(async()=>{
  const[sa,comps]=await Promise.all([api.get("superadmin"),api.get("companies")]);
  if(sa)setSaCfg(sa);else await api.set("superadmin",{pin:"admin2024"});
  if(comps){setCompanies(Object.entries(comps).map(([k,v])=>({id:k,...v})))}
  setSynced(true);setPhase("main");
})()},[]);

// ─── Auto-refresh company data ───
useEffect(()=>{
  if(!currentCompany)return;
  const load=async()=>{
    const[r,u,c,l]=await Promise.all([api.get(`companies/${currentCompany.id}/requests`),api.get(`companies/${currentCompany.id}/users`),api.get(`companies/${currentCompany.id}/config`),api.get(`companies/${currentCompany.id}/logo`)]);
    if(r)setReqs(Object.values(r));else setReqs([]);
    if(u)setUsers(Object.values(u));else setUsers([]);
    if(c)setCfg(p=>({...p,...c}));
    if(l)setLogo(l);else setLogo(null);
    setSynced(true);
  };load();const iv=setInterval(load,15000);return()=>clearInterval(iv);
},[currentCompany]);

const cPath=(p)=>`companies/${currentCompany.id}/${p}`;
const saveReqs=async(arr)=>{setReqs(arr);const o={};arr.forEach(r=>o[r.id]=r);await api.set(cPath("requests"),o)};
const saveUsers=async(arr)=>{setUsers(arr);const o={};arr.forEach(u=>o[u.matricula]=u);await api.set(cPath("users"),o)};
const saveCfg=async(c)=>{setCfg(c);await api.set(cPath("config"),c)};
const saveLogo=async(l)=>{setLogo(l);await api.set(cPath("logo"),l)};

// ─── Audit logs ───
const logUser=async(action,details)=>{await api.push("logs/users",{action,details,date:new Date().toLocaleString("pt-BR"),timestamp:Date.now()})};
const logCompany=async(action,details)=>{await api.push("logs/companies",{action,details,date:new Date().toLocaleString("pt-BR"),timestamp:Date.now()})};

const enterCompany=(comp)=>{setCurrentCompany(comp);setGerenteOk(false)};
const exitCompany=()=>{setCurrentCompany(null);setPhase("main");setScreen("login");setLogo(null);setReqs([]);setUsers([]);setLoggedUser(null);setDashPhase("home");setShowGerente(false)};
const handleLogo=(e)=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=(ev)=>saveLogo(ev.target.result);rd.readAsDataURL(f)};

// ─── LOGIN: search all companies ───
const handleLogin=async()=>{
  if(!mat||!pw){notify("Preencha matrícula e senha.","error");return}
  setSearching(true);
  try{
    const comps=await api.get("companies");
    if(!comps){notify("Nenhuma empresa.","error");setSearching(false);return}
    for(const[cid,cdata]of Object.entries(comps)){
      if(cdata.users){
        const u=Object.values(cdata.users).find(x=>x.matricula===mat&&x.status==="approved");
        if(u){
          if(u.password!==pw){notify("Senha incorreta.","error");setSearching(false);return}
          setCurrentCompany({id:cid,...cdata});setLoggedUser(u);
          if(u.mustChangePassword){setScreen("changePw");setPhase("main");notify("Primeiro acesso — crie nova senha.","info");setSearching(false);return}
          setPhase("dashboard");notify(`Bem-vindo(a), ${u.name}!`,"success");setSearching(false);return;
        }
      }
    }
    notify("Matrícula não encontrada ou acesso pendente.","error");
  }catch{notify("Erro de conexão.","error")}
  setSearching(false);
};

// ─── REGISTER ───
const handleRegister=async()=>{
  if(!regName||!regMat||!regEmail||!regCode){notify("Preencha todos os campos obrigatórios.","error");return}
  if(!regPw||regPw.length<4){notify("Senha mín. 4 caracteres.","error");return}
  if(regPw!==regPwC){notify("Senhas não coincidem.","error");return}
  setSearching(true);
  try{
    const comps=await api.get("companies");
    if(!comps){notify("Nenhuma empresa.","error");setSearching(false);return}
    let target=null;
    for(const[cid,cdata]of Object.entries(comps)){
      if(cdata.name&&cdata.name.toUpperCase()===regCode.toUpperCase()){target={id:cid,...cdata};break}
    }
    if(!target){notify("Nome de empresa não encontrado. Verifique com o Gerente.","error");setSearching(false);return}
    const existReqs=await api.get(`companies/${target.id}/requests`);
    if(existReqs&&Object.values(existReqs).find(r=>r.matricula===regMat&&r.type==="register"&&r.status==="pending")){notify("Já existe solicitação pendente.","error");setSearching(false);return}
    const req={id:Date.now().toString(),type:"register",name:regName,matricula:regMat,email:regEmail,area:regArea||"—",justification:regJust||"—",password:regPw,date:new Date().toLocaleString("pt-BR"),status:"pending"};
    const upd=existReqs?{...existReqs,[req.id]:req}:{[req.id]:req};
    await api.set(`companies/${target.id}/requests`,upd);
    await logUser("Solicitação de Cadastro",`${regName} (${regMat}) → ${target.name}`);
    const tcfg=await api.get(`companies/${target.id}/config`);
    setCurrentCompany(target);if(tcfg)setCfg(p=>({...p,...tcfg}));
    setLastReq(req);setShowNotify(true);
    notify(`✅ Cadastro enviado para ${target.name}!`,"success");
    setRegName("");setRegMat("");setRegEmail("");setRegArea("");setRegJust("");setRegPw("");setRegPwC("");setRegCode("");setScreen("login");
  }catch{notify("Erro.","error")}
  setSearching(false);
};

// ─── RECOVERY ───
const handleRecovery=async()=>{
  if(!recMat||!recEmail){notify("Preencha.","error");return}
  setSearching(true);
  try{
    const comps=await api.get("companies");
    let target=null;
    for(const[cid,cdata]of Object.entries(comps||{})){
      if(cdata.users){const u=Object.values(cdata.users).find(x=>x.matricula===recMat);if(u){target={id:cid,...cdata};break}}
    }
    if(!target){notify("Matrícula não encontrada.","error");setSearching(false);return}
    const req={id:Date.now().toString(),type:"recovery",matricula:recMat,email:recEmail,date:new Date().toLocaleString("pt-BR"),status:"pending"};
    const exist=await api.get(`companies/${target.id}/requests`)||{};
    await api.set(`companies/${target.id}/requests`,{...exist,[req.id]:req});
    const tcfg=await api.get(`companies/${target.id}/config`);
    setCurrentCompany(target);if(tcfg)setCfg(p=>({...p,...tcfg}));
    setLastReq(req);setShowNotify(true);
    notify("✅ Recuperação enviada!","success");setRecMat("");setRecEmail("");setScreen("login");
  }catch{notify("Erro.","error")}
  setSearching(false);
};

const handleChangePw=async()=>{if(!cpNew||!cpConf){notify("Preencha.","error");return}if(cpNew.length<4){notify("Mín. 4.","error");return}if(cpNew!==cpConf){notify("Não coincidem.","error");return}if(loggedUser.mustChangePassword===false&&cpOld!==loggedUser.password){notify("Senha incorreta.","error");return}saveUsers(users.map(u=>u.matricula===loggedUser.matricula?{...u,password:cpNew,mustChangePassword:false}:u));await logUser("Alteração de Senha",`${loggedUser.name} (${loggedUser.matricula})`);setCpOld("");setCpNew("");setCpConf("");setScreen("login");exitCompany();notify("✅ Senha alterada!","success")};

const configuredAdmins=cfg.admins?cfg.admins.filter(a=>a.whatsapp||a.teams):[];
const buildMsg=(req)=>{const cn=currentCompany?.name||"";if(req.type==="register")return`📋 *[PM Manager - ${cn}] NOVO CADASTRO*\n\n👤 ${req.name}\n🔖 ${req.matricula}\n📧 ${req.email}\n🏭 ${req.area}\n📅 ${req.date}\n\n⚠ Acesse o Painel do Gerente para APROVAR.`;return`🔑 *[PM Manager - ${cn}] RECUPERAÇÃO*\n\n🔖 ${req.matricula}\n📧 ${req.email}\n📅 ${req.date}`};
const notifyAdm=(a,ch)=>{if(!lastReq)return;if(ch==="whatsapp")sendWhatsApp(a.whatsapp,buildMsg(lastReq));else sendTeams(a.teams,buildMsg(lastReq));notify("Aberto!","success")};

// ─── Gerente da Conta actions ───
const openApprove=(r)=>{setAppReq(r);setAppPw(genPw());setShowApprove(true)};
const confirmApprove=async()=>{const r=appReq;if(r.type==="recovery"&&(!appPw||appPw.length<4)){notify("Defina senha.","error");return}saveReqs(reqs.map(x=>x.id===r.id?{...x,status:"approved",resolvedAt:new Date().toLocaleString("pt-BR")}:x));if(r.type==="register"){saveUsers([...users,{matricula:r.matricula,name:r.name,email:r.email,area:r.area,password:r.password,mustChangePassword:true,status:"approved",createdAt:new Date().toLocaleString("pt-BR")}]);await logUser("Cadastro Aprovado",`${r.name} (${r.matricula}) na empresa ${currentCompany?.name}`);notify(`✅ ${r.name} aprovado!`,"success")}else{saveUsers(users.map(u=>u.matricula===r.matricula?{...u,password:appPw,mustChangePassword:true}:u));await logUser("Senha Resetada",`Matrícula ${r.matricula} na empresa ${currentCompany?.name}`);notify("✅ Senha resetada.","success")}setShowApprove(false)};
const handleReject=async(r)=>{saveReqs(reqs.map(x=>x.id===r.id?{...x,status:"rejected",resolvedAt:new Date().toLocaleString("pt-BR")}:x));await logUser("Cadastro Rejeitado",`${r.name||r.matricula} na empresa ${currentCompany?.name}`);notify("Rejeitada.","info")};
const addAdmin=()=>{if(cfg.admins.length>=5)return;setCfg(p=>({...p,admins:[...p.admins,{name:"",whatsapp:"",teams:""}]}))};
const updateAdmin=(i,f,v)=>{setCfg(p=>{const a=[...p.admins];a[i]={...a[i],[f]:v};return{...p,admins:a}})};
const removeAdmin=(i)=>{setCfg(p=>({...p,admins:p.admins.filter((_,x)=>x!==i)}))};
const pending=reqs.filter(r=>r.status==="pending").length;
const filteredReqs=reqFilter==="all"?reqs:reqs.filter(r=>r.status===reqFilter);

// ─── Administrador (Super Admin) ───
const saCreateCompany=async()=>{if(!saNewName){notify("Nome obrigatório.","error");return}const id=saNewName.toLowerCase().replace(/[^a-z0-9]/g,"_").slice(0,20)+"_"+Date.now().toString().slice(-4);const comp={name:saNewName,createdAt:new Date().toLocaleString("pt-BR")};await api.set(`companies/${id}`,comp);await api.set(`companies/${id}/config`,{pin:"1234",admins:[{name:"",whatsapp:"",teams:""}],appUrl:""});setCompanies([...companies,{id,...comp}]);await logCompany("Empresa Criada",saNewName);setSaNewName("");notify(`✅ "${saNewName}" criada! Código = nome da empresa.`,"success")};
const saDeleteCompany=async(c)=>{if(!confirm(`Excluir "${c.name}" e todos os dados?`))return;await api.del(`companies/${c.id}`);setCompanies(companies.filter(x=>x.id!==c.id));await logCompany("Empresa Excluída",c.name);notify("Removida.","info")};

// ─── Export Excel ───
const exportXls=()=>{if(!reqs.length){notify("Nenhuma.","error");return}const sm={pending:"Pendente",approved:"Aprovado",rejected:"Rejeitado"};const d=reqs.map((r,i)=>({"Nº":i+1,"Tipo":r.type==="register"?"Cadastro":"Recuperação","Nome":r.name||"—","Matrícula":r.matricula,"E-mail":r.email,"Área":r.area||"—","Data":r.date,"Status":sm[r.status],"Resolução":r.resolvedAt||"—"}));const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(d),"Solicitações");if(users.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(users.map((u,i)=>({"Nº":i+1,"Nome":u.name,"Mat":u.matricula,"E-mail":u.email,"Área":u.area||"—","Status":u.mustChangePassword?"Pendente":"Ativo"}))),"Usuários");XLSX.writeFile(wb,`PM_${currentCompany?.name||""}_${new Date().toISOString().slice(0,10)}.xlsx`);notify("📊 Exportado!","success")};

// QR
const genQR=(url,cs)=>{if(!url)return null;try{const q=qrcode(0,"M");q.addData(url);q.make();const n=q.getModuleCount();let svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${n*cs} ${n*cs}" width="${n*cs}" height="${n*cs}">`;for(let r=0;r<n;r++)for(let c=0;c<n;c++)if(q.isDark(r,c))svg+=`<rect x="${c*cs}" y="${r*cs}" width="${cs}" height="${cs}" fill="#0B1929"/>`;return svg+`</svg>`}catch{return null}};
const printQR=()=>{const el=document.getElementById("qr-print-area");if(!el)return;const w=window.open("");w.document.write(`<!DOCTYPE html><html><head><style>body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Arial}</style></head><body>${el.outerHTML}</body></html>`);w.document.close();setTimeout(()=>{w.print();w.close()},400)};

// ─── Load logs for reports ───
const loadLogs=async()=>{const[ul,cl]=await Promise.all([api.get("logs/users"),api.get("logs/companies")]);setUserLogs(ul?Object.values(ul).sort((a,b)=>b.timestamp-a.timestamp):[]);setCompanyLogs(cl?Object.values(cl).sort((a,b)=>b.timestamp-a.timestamp):[])};

  <div className="dash-card" onClick={()=>notify("🚧 Em desenvolvimento","info")}><div className="icon">✅</div><div className="card-title">Apropriar Nota</div><div className="card-desc">Registrar horas e serviços</div></div>
  <div className="dash-card" onClick={()=>notify("🚧 Em desenvolvimento","info")}><div className="icon">👥</div><div className="card-title">Controle de Head Count</div><div className="card-desc">Gestão de efetivo</div></div>
  <div className="dash-card" onClick={()=>notify("🚧 Em desenvolvimento","info")}><div className="icon">📅</div><div className="card-title">Plano de Manutenção</div><div className="card-desc">Solicitar planos preventivos</div></div>
  <div className="dash-card" onClick={()=>notify("🚧 Em desenvolvimento","info")}><div className="icon">📚</div><div className="card-title">Procedimentos</div><div className="card-desc">Links e documentos</div></div>

</div>

companyLogs.map((l,i)=><tr key={i}><td>{i+1}</td><td><span style={{padding:"2px 8px",borderRadius:6,fontSize:11,fontWeight:700,background:l.action.includes("Criada")?"rgba(34,197,94,.15)":"rgba(220,38,38,.15)",color:l.action.includes("Criada")?"#22C55E":"#EF4444"}}>{l.action}</span></td><td>{l.details}</td><td style={{color:"#64748B",fontSize:12}}>{l.date}</td></tr>)}

// ═══ MAIN (login/register/recovery) ═══
if(phase==="main")return(
<div className="app"><div className="bg-texture"/><div className="bg-grad"/>
{toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
<div className="container">

</div></div>
<div className="right"><div className="form-area">
<div style={{width:80,height:80,borderRadius:16,background:"rgba(59,130,246,.1)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 28px",fontSize:36}}>⚙</div>

{screen==="login"&&<div className="form-block fade-in">
<h2 className="form-title">Entrar no Sistema</h2><p className="form-desc">O sistema encontra sua empresa automaticamente</p>
<label className="label">CS (Matrícula)</label><div className="input-wrap"><span className="input-icon">🔖</span><input className="input-field" placeholder="Sua matrícula" value={mat} onChange={e=>setMat(e.target.value)}/></div>
<label className="label">Senha</label><div className="input-wrap"><span className="input-icon">🔒</span><input className="input-field" type={showPwV?"text":"password"} placeholder="••••••••" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/><button className="eye-btn" onClick={()=>setShowPwV(!showPwV)}>{showPwV?"🙈":"👁"}</button></div>
<button className="btn-primary" onClick={handleLogin} disabled={searching}>{searching?<><div className="loading-spinner" style={{width:18,height:18,borderWidth:2}}/>Buscando...</>:"Entrar"}</button>
<div className="links-row"><button className="link-btn" onClick={()=>setScreen("recovery")}>Esqueceu a senha?</button><span style={{color:"#334155"}}>|</span><button className="link-btn" onClick={()=>setScreen("register")}>Solicitar Cadastro</button></div>
<button className="admin-link" onClick={()=>{setShowGerente(true);setGerenteOk(false);setGerentePin("");setGerenteCompanyId("")}}>Gerente da Conta</button>
<button className="admin-link" style={{color:"#7C3AED",marginTop:8}} onClick={()=>{setShowSaPinModal(true);setSaPin("")}}>🔐 Administrador</button>
</div>}

{screen==="recovery"&&<div className="form-block fade-in"><h2 className="form-title">Recuperar Senha</h2><p className="form-desc">O sistema encontra sua empresa pela matrícula</p>
<label className="label">CS (Matrícula)</label><div className="input-wrap"><span className="input-icon">🔖</span><input className="input-field" placeholder="Matrícula" value={recMat} onChange={e=>setRecMat(e.target.value)}/></div>
<label className="label">E-mail</label><div className="input-wrap"><span className="input-icon">📧</span><input className="input-field" type="email" placeholder="seu@email.com" value={recEmail} onChange={e=>setRecEmail(e.target.value)}/></div>
<button className="btn-primary" onClick={handleRecovery} disabled={searching}>{searching?"Buscando...":"Enviar"}</button>
<button className="link-btn" style={{marginTop:16,display:"block",textAlign:"center",width:"100%"}} onClick={()=>setScreen("login")}>← Voltar</button></div>}

{screen==="register"&&<div className="form-block fade-in"><h2 className="form-title">Solicitar Cadastro</h2><p className="form-desc">Informe o nome da empresa (peça ao Gerente)</p>
<label className="label">Nome da Empresa *</label><div className="input-wrap"><span className="input-icon">🏢</span><input className="input-field" placeholder="Nome exato da empresa" value={regCode} onChange={e=>setRegCode(e.target.value)}/></div>
<label className="label">Nome Completo *</label><div className="input-wrap"><span className="input-icon">👤</span><input className="input-field" placeholder="Seu nome" value={regName} onChange={e=>setRegName(e.target.value)}/></div>
<label className="label">CS (Matrícula) *</label><div className="input-wrap"><span className="input-icon">🔖</span><input className="input-field" placeholder="Matrícula" value={regMat} onChange={e=>setRegMat(e.target.value)}/></div>
<label className="label">E-mail *</label><div className="input-wrap"><span className="input-icon">📧</span><input className="input-field" type="email" placeholder="seu@empresa.com" value={regEmail} onChange={e=>setRegEmail(e.target.value)}/></div>
<label className="label">Área</label><div className="input-wrap"><span className="input-icon">🏭</span><input className="input-field" placeholder="Ex: Manutenção" value={regArea} onChange={e=>setRegArea(e.target.value)}/></div>
<label className="label">Justificativa</label><textarea className="input-field" placeholder="Por que precisa de acesso..." value={regJust} onChange={e=>setRegJust(e.target.value)} rows={2}/>
<div style={{marginTop:16,padding:12,background:"rgba(59,130,246,.06)",borderRadius:10,border:"1px solid rgba(59,130,246,.15)"}}>
<div style={{color:"#60A5FA",fontSize:12,fontWeight:700,marginBottom:10}}>🔐 Crie sua senha</div>
<label className="label" style={{marginTop:0}}>Senha *</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type={regShowPw?"text":"password"} placeholder="Mín. 4" value={regPw} onChange={e=>setRegPw(e.target.value)}/><button className="eye-btn" onClick={()=>setRegShowPw(!regShowPw)}>{regShowPw?"🙈":"👁"}</button></div>
{regPw&&(()=>{const s=pwStr(regPw);return s?<div className={`pw-strength ${s.cls}`}>{s.label}</div>:null})()}
<label className="label">Confirmar *</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type="password" placeholder="Repita" value={regPwC} onChange={e=>setRegPwC(e.target.value)}/></div>
{regPwC&&regPw!==regPwC&&<div style={{color:"#EF4444",fontSize:12,marginTop:6}}>❌ Não coincidem</div>}
{regPwC&&regPw===regPwC&&regPw.length>=4&&<div style={{color:"#22C55E",fontSize:12,marginTop:6}}>✅</div>}
</div>
<button className="btn-primary" onClick={handleRegister} disabled={searching}>{searching?"Enviando...":"Enviar"}</button>
<button className="link-btn" style={{marginTop:16,display:"block",textAlign:"center",width:"100%"}} onClick={()=>setScreen("login")}>← Voltar</button></div>}

{screen==="changePw"&&loggedUser&&<div className="form-block fade-in"><h2 className="form-title">🔐 Nova Senha</h2><p className="form-desc"><strong style={{color:"#F8FAFC"}}>{loggedUser.name}</strong> — primeiro acesso</p>
<label className="label">Nova Senha</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type="password" placeholder="Mín. 4" value={cpNew} onChange={e=>setCpNew(e.target.value)}/></div>
{cpNew&&(()=>{const s=pwStr(cpNew);return s?<div className={`pw-strength ${s.cls}`}>{s.label}</div>:null})()}
<label className="label">Confirmar</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type="password" placeholder="Repita" value={cpConf} onChange={e=>setCpConf(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleChangePw()}/></div>
<button className="btn-primary" onClick={handleChangePw}>Salvar</button></div>}

<p className="footer-text">PM Manager v2.0 — Multi-empresa ☁</p>
</div></div></div>

{/* NOTIFY */}
{showNotify&&<div className="overlay" onClick={()=>setShowNotify(false)}><div className="modal slide-down" style={{maxWidth:480}} onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h2 className="modal-title">✅ Registrada!</h2><button className="close-btn" onClick={()=>setShowNotify(false)}>✕</button></div>
{configuredAdmins.length===0?<div className="warn-box">⚠ Nenhum Gerente configurado com WhatsApp/Teams.</div>:
<div><p style={{color:"#94A3B8",fontSize:14,marginBottom:16}}>Notifique o Gerente:</p>{configuredAdmins.map((a,i)=>(<div key={i} className="notify-card"><div style={{color:"#F8FAFC",fontSize:14,fontWeight:600,marginBottom:10}}>{a.name||`Gerente ${i+1}`}</div><div className="notify-btns">{a.whatsapp&&<button className="channel-btn whatsapp" onClick={()=>notifyAdm(a,"whatsapp")}>📱 WhatsApp</button>}{a.teams&&<button className="channel-btn teams" onClick={()=>notifyAdm(a,"teams")}>💬 Teams</button>}</div></div>))}</div>}
<button className="link-btn" style={{marginTop:20,display:"block",textAlign:"center",width:"100%"}} onClick={()=>{setShowNotify(false);setCurrentCompany(null)}}>Fechar</button>
</div></div>}

{/* ═══ GERENTE DA CONTA ═══ */}
{showGerente&&<div className="overlay" onClick={()=>setShowGerente(false)}><div className="modal slide-down" style={{maxWidth:640}} onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h2 className="modal-title">Gerente da Conta</h2><button className="close-btn" onClick={()=>setShowGerente(false)}>✕</button></div>
{!gerenteOk?<div>
<p style={{color:"#94A3B8",fontSize:14,marginBottom:12}}>Selecione a empresa e digite o PIN.</p>
<label className="label" style={{marginTop:0}}>Empresa</label>
<div className="input-wrap"><span className="input-icon">🏢</span>
<select className="input-field" style={{paddingLeft:40,cursor:"pointer",appearance:"auto"}} value={gerenteCompanyId} onChange={e=>setGerenteCompanyId(e.target.value)}>
<option value="">— Selecione —</option>
{companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
</select></div>
<label className="label">PIN do Gerente</label>
<div className="input-wrap"><input className="input-field input-plain" type="password" placeholder="PIN (padrão: 1234)" value={gerentePin} onChange={e=>setGerentePin(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")document.getElementById("gerente-access-btn")?.click()}}/></div>
<button id="gerente-access-btn" className="btn-primary" onClick={async()=>{
  if(!gerenteCompanyId){notify("Selecione uma empresa.","error");return}
  const comp=companies.find(c=>c.id===gerenteCompanyId);
  if(!comp){notify("Empresa não encontrada.","error");return}
  setCurrentCompany(comp);
  const c2=await api.get(`companies/${comp.id}/config`);
  if(c2)setCfg(p=>({...p,...c2}));
  if(gerentePin===(c2?.pin||"1234")){setGerenteOk(true);setGerentePin("")}
  else notify("PIN incorreto.","error");
}}>Acessar</button>
</div>:<div>
<div style={{color:"#F59E0B",fontSize:14,fontWeight:700,marginBottom:16}}>🏢 {currentCompany?.name}</div>
<div className="tabs">{[["requests",`📋 Solic.${pending?` (${pending})`:""}`],["users","👥 Usuários"],["qrcode","📱 QR"],["config","⚙ Config"]].map(([k,l])=>(<button key={k} className={`tab-btn ${gerenteTab===k?"active":""}`} onClick={()=>setGerenteTab(k)}>{l}</button>))}</div>

{gerenteTab==="requests"&&<div>{reqs.length===0?<div className="empty"><div className="icon">📭</div>Nenhuma.</div>:<div>
<div className="export-bar"><div className="stats"><strong>{reqs.length}</strong> total · <strong style={{color:"#F59E0B"}}>{pending}</strong> pendentes</div><button className="export-btn" onClick={exportXls}>📊 Excel</button></div>
<div className="filter-bar">{[["all","Todas"],["pending","⏳"],["approved","✅"],["rejected","❌"]].map(([k,l])=>(<button key={k} className={`filter-chip ${reqFilter===k?"active":""}`} onClick={()=>setReqFilter(k)}>{l}</button>))}</div>
{filteredReqs.map(r=><div key={r.id} className={`req-card ${r.status==="pending"?"pending":"resolved"}`}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:6}}><span className="req-badge" style={{background:r.type==="register"?"rgba(59,130,246,.15)":"rgba(245,158,11,.15)",color:r.type==="register"?"#60A5FA":"#F59E0B"}}>{r.type==="register"?"📋 Cadastro":"🔑 Recuperação"}</span><span className="req-badge" style={{background:r.status==="pending"?"rgba(245,158,11,.2)":r.status==="approved"?"rgba(34,197,94,.2)":"rgba(220,38,38,.2)",color:r.status==="pending"?"#F59E0B":r.status==="approved"?"#22C55E":"#EF4444"}}>{r.status==="pending"?"⏳ Pendente":r.status==="approved"?"✅ Aprovado":"❌ Rejeitado"}</span></div><div className="req-body">{r.name&&<div><strong>Nome:</strong> {r.name}</div>}<div><strong>Mat:</strong> {r.matricula}</div><div><strong>E-mail:</strong> {r.email}</div>{r.area&&r.area!=="—"&&<div><strong>Área:</strong> {r.area}</div>}<div style={{color:"#64748B",fontSize:12}}>📅 {r.date}{r.resolvedAt?` → ${r.resolvedAt}`:""}</div></div>{r.status==="pending"&&<div style={{display:"flex",gap:8,marginTop:12}}><button className="action-btn approve" onClick={()=>openApprove(r)}>✅ Aprovar</button><button className="action-btn reject" onClick={()=>handleReject(r)}>❌ Rejeitar</button></div>}</div>)}
</div>}</div>}

{gerenteTab==="users"&&<div>{users.length===0?<div className="empty"><div className="icon">👥</div>Nenhum.</div>:users.map(u=><div key={u.matricula} className="user-card"><div className="user-info"><div className="name">{u.name}{u.mustChangePassword&&<span style={{fontSize:10,color:"#F59E0B",background:"rgba(245,158,11,.15)",padding:"1px 6px",borderRadius:4,marginLeft:6}}>1º acesso</span>}</div><div>🔖 {u.matricula} · 📧 {u.email}</div><div className="meta">{u.area!=="—"?`🏭 ${u.area} · `:""}{u.createdAt}</div></div><div style={{display:"flex",gap:6}}><button style={{background:"none",border:"none",color:"#60A5FA",cursor:"pointer",fontSize:14,padding:4}} onClick={async()=>{const np=genPw();saveUsers(users.map(x=>x.matricula===u.matricula?{...x,password:np,mustChangePassword:true}:x));await logUser("Senha Resetada",`${u.name} (${u.matricula})`);notify(`🔑 Reset: ${np}`,"success")}}>🔑</button><button style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:18,padding:4}} onClick={async()=>{saveUsers(users.filter(x=>x.matricula!==u.matricula));await logUser("Usuário Removido",`${u.name} (${u.matricula}) de ${currentCompany?.name}`);notify("Removido.","info")}}>🗑</button></div></div>)}</div>}

{gerenteTab==="qrcode"&&<div>{!cfg.appUrl?<div><div className="warn-box">⚠ Cadastre a URL na aba Config.</div></div>:<div>
<div className="qr-size-row" style={{marginBottom:16}}><label>Tamanho:</label><select value={qrSize} onChange={e=>setQrSize(Number(e.target.value))}><option value={4}>P</option><option value={5}>M</option><option value={7}>G</option></select></div>
<div id="qr-print-area" className="qr-card qr-print-area">{logo&&<img src={logo} className="qr-logo-print" alt=""/>}<div className="qr-title">{currentCompany?.name||"PM Manager"}</div><div className="qr-subtitle">Gestão de Manutenção</div><div className="qr-container" dangerouslySetInnerHTML={{__html:genQR(cfg.appUrl,qrSize)||""}}/><div className="qr-url">{cfg.appUrl}</div><div className="qr-footer">Escaneie com a câmera</div></div>
<div className="qr-actions"><button className="qr-action-btn print" onClick={printQR}>🖨 Imprimir</button></div>
</div>}</div>}

{gerenteTab==="config"&&<div>
<div style={{marginBottom:20,padding:16,background:"rgba(59,130,246,.06)",borderRadius:12,border:"1px solid rgba(59,130,246,.15)"}}><div style={{color:"#60A5FA",fontSize:13,fontWeight:700,marginBottom:10}}>📱 URL do App</div><div className="input-wrap"><input className="input-field input-plain" placeholder="https://pm-manager.vercel.app" value={cfg.appUrl||""} onChange={e=>setCfg(p=>({...p,appUrl:e.target.value}))}/></div></div>
<div style={{marginBottom:16}}><label className="label" style={{marginTop:0}}>Logo da Empresa</label><input type="file" accept="image/*" onChange={handleLogo} style={{color:"#64748B",fontSize:13}}/></div>
<label className="label" style={{marginTop:0}}>PIN do Gerente</label><div className="input-wrap"><input className="input-field input-plain" value={cfg.pin} onChange={e=>setCfg(p=>({...p,pin:e.target.value}))}/></div>
<div style={{marginTop:20,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}><label className="label" style={{margin:0}}>Contatos do Gerente</label>{cfg.admins.length<5&&<button style={{background:"none",border:"1px solid #1E3A5F",color:"#60A5FA",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer"}} onClick={addAdmin}>+</button>}</div>
{cfg.admins.map((a,i)=><div key={i} className="admin-card">{cfg.admins.length>1&&<button className="remove" onClick={()=>removeAdmin(i)}>✕</button>}<div style={{color:"#60A5FA",fontSize:12,fontWeight:700,marginBottom:8}}>Gerente {i+1}</div><input className="cfg-input" placeholder="Nome" value={a.name} onChange={e=>updateAdmin(i,"name",e.target.value)}/><div className="cfg-row"><input className="cfg-input" placeholder="📱 WhatsApp" value={a.whatsapp} onChange={e=>updateAdmin(i,"whatsapp",e.target.value)}/><input className="cfg-input" placeholder="💬 Teams" value={a.teams} onChange={e=>updateAdmin(i,"teams",e.target.value)}/></div></div>)}
<button className="btn-primary" onClick={()=>{saveCfg(cfg);notify("✅ Salvo!","success")}}>Salvar</button>
</div>}
</div>}
</div></div>}

{/* APPROVE MODAL */}
{showApprove&&appReq&&<div className="overlay" onClick={()=>setShowApprove(false)}><div className="modal slide-down" style={{maxWidth:460}} onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h2 className="modal-title">{appReq.type==="register"?"✅ Aprovar":"🔑 Resetar"}</h2><button className="close-btn" onClick={()=>setShowApprove(false)}>✕</button></div>
<div style={{marginBottom:16,padding:12,background:"rgba(59,130,246,.08)",borderRadius:8,border:"1px solid rgba(59,130,246,.15)",color:"#CBD5E1",fontSize:13,lineHeight:1.8}}>{appReq.name&&<div><strong style={{color:"#F8FAFC"}}>👤</strong> {appReq.name}</div>}<div><strong style={{color:"#F8FAFC"}}>🔖</strong> {appReq.matricula}</div><div><strong style={{color:"#F8FAFC"}}>📧</strong> {appReq.email}</div></div>
{appReq.type==="register"?<div><div style={{padding:12,background:"rgba(34,197,94,.08)",borderRadius:8,border:"1px solid rgba(34,197,94,.15)",color:"#22C55E",fontSize:13}}>✅ Senha definida pelo solicitante.</div><div style={{marginTop:8,padding:10,background:"rgba(245,158,11,.08)",borderRadius:8,border:"1px solid rgba(245,158,11,.15)",color:"#F59E0B",fontSize:12}}>⚠ Trocará no 1º login.</div></div>:<div><label className="label" style={{marginTop:0}}>Senha Temporária</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type={appShowPw?"text":"password"} value={appPw} onChange={e=>setAppPw(e.target.value)}/><button className="eye-btn" onClick={()=>setAppShowPw(!appShowPw)}>{appShowPw?"🙈":"👁"}</button></div><div style={{display:"flex",gap:8,marginTop:8}}><button style={{flex:1,padding:8,borderRadius:8,border:"1px solid #1E3A5F",background:"rgba(15,23,42,.6)",color:"#60A5FA",fontSize:12,cursor:"pointer"}} onClick={()=>setAppPw(genPw())}>🎲 Gerar</button><button style={{flex:1,padding:8,borderRadius:8,border:"1px solid #1E3A5F",background:"rgba(15,23,42,.6)",color:"#94A3B8",fontSize:12,cursor:"pointer"}} onClick={()=>{navigator.clipboard?.writeText(appPw);notify("Copiada!","success")}}>📋 Copiar</button></div></div>}
<button className="btn-primary" onClick={confirmApprove}>Confirmar</button>
</div></div>}

{/* SA PIN */}
{showSaPinModal&&<div className="overlay" onClick={()=>setShowSaPinModal(false)}><div className="modal slide-down" style={{maxWidth:400}} onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h2 className="modal-title">🔐 Administrador</h2><button className="close-btn" onClick={()=>setShowSaPinModal(false)}>✕</button></div>
<p style={{color:"#94A3B8",fontSize:14,marginBottom:16}}>Acesso restrito ao dono do sistema.</p>
<div className="input-wrap"><input className="input-field input-plain" type="password" placeholder="PIN do Administrador" value={saPin} onChange={e=>setSaPin(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){if(saPin===saCfg.pin){setShowSaPinModal(false);setPhase("superAdmin")}else notify("Incorreto.","error")}}}/></div>
<button className="btn-primary" onClick={()=>{if(saPin===saCfg.pin){setShowSaPinModal(false);setPhase("superAdmin")}else notify("Incorreto.","error")}}>Acessar</button>
</div></div>}
</div>);

// ═══ ADMINISTRADOR (Super Admin) ═══
if(phase==="superAdmin")return(
<div className="app"><div className="bg-texture"/><div className="bg-grad"/>
{toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
<div className="super-admin-bar"><span>🔐 Administrador — Controle Total</span><button onClick={()=>setPhase("main")}>Sair</button></div>
<div style={{position:"relative",zIndex:1,maxWidth:700,margin:"0 auto",padding:"60px 20px 40px"}}>
<div className="tabs" style={{marginTop:20}}>{[["companies","🏭 Empresas"],["settings","🔐 Segurança"]].map(([k,l])=>(<button key={k} className={`tab-btn ${saTab===k?"active":""}`} onClick={()=>setSaTab(k)}>{l}</button>))}</div>

{saTab==="companies"&&<div className="fade-in">
<div style={{background:"rgba(59,130,246,.06)",borderRadius:12,border:"1px solid rgba(59,130,246,.15)",padding:16,marginBottom:20}}>
<div style={{color:"#60A5FA",fontSize:13,fontWeight:700,marginBottom:10}}>➕ Nova Empresa</div>
<input className="cfg-input" placeholder="Nome da empresa (será o código de acesso)" value={saNewName} onChange={e=>setSaNewName(e.target.value)} style={{marginBottom:8}}/>
<p style={{color:"#64748B",fontSize:11,marginBottom:8}}>⚠ O nome da empresa será usado como código de acesso para cadastro de usuários.</p>
<button className="btn-primary" style={{marginTop:0}} onClick={saCreateCompany}>Criar Empresa</button>
</div>
<h3 style={{color:"#CBD5E1",fontSize:15,marginBottom:12}}>Empresas ({companies.length})</h3>
{companies.map(c=>(<div key={c.id} className="sa-company-card">
<div className="info"><div className="name">{c.name}</div><div className="detail">Código de acesso = <strong style={{color:"#F59E0B"}}>{c.name}</strong></div><div className="detail">{c.createdAt}</div></div>
<div className="actions">
<button title="Acessar como Gerente" onClick={async()=>{setCurrentCompany(c);const cc=await api.get(`companies/${c.id}/config`);if(cc)setCfg(p=>({...p,...cc}));setGerenteCompanyId(c.id);setGerenteOk(true);setShowGerente(true);setPhase("main")}} style={{color:"#60A5FA"}}>🔧</button>
<button title="Excluir" onClick={()=>saDeleteCompany(c)} style={{color:"#EF4444"}}>🗑</button>
</div>
</div>))}
</div>}

{saTab==="settings"&&<div className="fade-in form-block">
<h2 className="form-title">🔐 PIN do Administrador</h2><p className="form-desc">Altere o PIN de controle total</p>
<label className="label">PIN Atual: <code style={{color:"#F59E0B"}}>{saCfg.pin}</code></label>
<label className="label">Novo PIN</label><div className="input-wrap"><input className="input-field input-plain" placeholder="Mín. 4 caracteres" id="sa-new-pin"/></div>
<button className="btn-primary" onClick={async()=>{const v=document.getElementById("sa-new-pin").value;if(!v||v.length<4){notify("Mín. 4.","error");return}const u={...saCfg,pin:v};setSaCfg(u);await api.set("superadmin",u);notify("✅ Atualizado!","success")}}>Alterar PIN</button>
</div>}
</div></div>);

return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

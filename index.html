<script type="text/babel">
const{useState,useEffect,useRef}=React;
const FB="https://pm-manager-3c06f-default-rtdb.firebaseio.com";
const api={
  async get(p){try{const r=await fetch(`${FB}/${p}.json`);return await r.json()}catch{return null}},
  async set(p,d){try{await fetch(`${FB}/${p}.json`,{method:"PUT",body:JSON.stringify(d),headers:{"Content-Type":"application/json"}});return true}catch{return false}},
  async del(p){try{await fetch(`${FB}/${p}.json`,{method:"DELETE"});return true}catch{return false}},
};
function sendWhatsApp(p,t){window.open(`https://wa.me/${p.replace(/\D/g,"") }?text=${encodeURIComponent(t)}`,"_blank")}
function sendTeams(e,t){window.open(`https://teams.microsoft.com/l/chat/0/0?users=${encodeURIComponent(e)}&message=${encodeURIComponent(t)}`,"_blank")}
function genPw(){const c="ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789";let p="";for(let i=0;i<8;i++)p+=c[Math.floor(Math.random()*c.length)];return p}
function pwStr(p){if(!p)return null;if(p.length<4)return{label:"Fraca",cls:"weak"};let s=0;if(p.length>=6)s++;if(p.length>=8)s++;if(/[A-Z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;if(s<=2)return{label:"Fraca",cls:"weak"};if(s<=3)return{label:"Média",cls:"medium"};return{label:"Forte",cls:"strong"}}
function genCompanyCode(){const c="ABCDEFGHJKMNPQRSTUVWXYZ23456789";let r="";for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r}

function Illust(){return(<svg viewBox="0 0 520 400" fill="none" xmlns="http://www.w3.org/2000/svg" style={{width:"100%",maxWidth:480,height:"auto"}}><g opacity=".08"><circle cx="260" cy="200" r="160" stroke="#F59E0B" strokeWidth="30"/>{[0,45,90,135,180,225,270,315].map((a,i)=>{const r=a*Math.PI/180;return<line key={i} x1={260+140*Math.cos(r)} y1={200+140*Math.sin(r)} x2={260+185*Math.cos(r)} y2={200+185*Math.sin(r)} stroke="#F59E0B" strokeWidth="28" strokeLinecap="round"/>})}</g><g opacity=".12" transform="translate(400,80)"><circle r="35" stroke="#3B82F6" strokeWidth="10"/>{[0,60,120,180,240,300].map((a,i)=>{const r=a*Math.PI/180;return<line key={i} x1={30*Math.cos(r)} y1={30*Math.sin(r)} x2={48*Math.cos(r)} y2={48*Math.sin(r)} stroke="#3B82F6" strokeWidth="12" strokeLinecap="round"/>})}</g><g transform="translate(100,100) rotate(-30)"><rect y="22" width="140" height="12" rx="6" fill="#64748B" opacity=".6"/><circle cx="155" cy="28" r="28" stroke="#64748B" strokeWidth="8" fill="none" opacity=".6"/></g><g transform="translate(180,120)"><rect width="100" height="130" rx="8" fill="#1E3A5F" opacity=".85"/><rect x="-8" y="-6" width="116" height="20" rx="4" fill="#2D5F8A" opacity=".9"/>{[30,56,82,108].map((y,i)=>(<g key={i}><rect x="14" y={y} width="14" height="14" rx="2" stroke="#F59E0B" strokeWidth="2" fill="none"/>{i<2&&<path d={`M17 ${y+7} L22 ${y+12} L30 ${y+3}`} stroke="#22C55E" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>}<rect x="38" y={y+4} width={40+i%2*8} height="6" rx="3" fill="#94A3B8" opacity=".5"/></g>))}</g><g transform="translate(340,140)" opacity=".7"><ellipse cx="28" cy="10" rx="22" ry="10" fill="#F59E0B"/><rect x="6" y="8" width="44" height="6" rx="3" fill="#D97706"/><circle cx="28" cy="26" r="14" fill="#475569"/><rect x="14" y="40" width="28" height="50" rx="6" fill="#334155"/><rect x="62" y="34" width="22" height="30" rx="3" fill="#1E3A5F" stroke="#3B82F6" strokeWidth="1.5" transform="rotate(15 73 49)"/><rect x="14" y="88" width="12" height="40" rx="5" fill="#1E293B"/><rect x="30" y="88" width="12" height="40" rx="5" fill="#1E293B"/></g><g transform="translate(60,340)" opacity=".35"><polyline points="0,20 40,20 55,5 70,35 85,15 100,20 160,20 180,8 200,25 220,12 260,20 360,20" stroke="#3B82F6" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></g></svg>)}
function Toast({message,type,onClose}){useEffect(()=>{const t=setTimeout(onClose,4500);return()=>clearTimeout(t)},[]);return<div className={`toast ${type} slide-down`}><span>{type==="success"?"✓":type==="error"?"✕":"ℹ"}</span>{message}</div>}

function App(){
const[phase,setPhase]=useState("loading");
const[toast,setToast]=useState(null);

// Super Admin
const[saPin,setSaPin]=useState("");const[saCfg,setSaCfg]=useState({pin:"superadmin2024"});
const[saTab,setSaTab]=useState("companies");const[companies,setCompanies]=useState([]);
const[saNewName,setSaNewName]=useState("");const[showSaPinModal,setShowSaPinModal]=useState(false);

// Company context

const[screen,setScreen]=useState("login");
const[mat,setMat]=useState("");const[pw,setPw]=useState("");const[showPwV,setShowPwV]=useState(false);

const[recMat,setRecMat]=useState("");const[recEmail,setRecEmail]=useState("");
const[regName,setRegName]=useState("");const[regMat,setRegMat]=useState("");const[regEmail,setRegEmail]=useState("");
const[regArea,setRegArea]=useState("");const[regJust,setRegJust]=useState("");
const[regPw,setRegPw]=useState("");const[regPwC,setRegPwC]=useState("");const[regShowPw,setRegShowPw]=useState(false);

const[showNotify,setShowNotify]=useState(false);const[lastReq,setLastReq]=useState(null);
const[showAdmin,setShowAdmin]=useState(false);const[adminPin,setAdminPin]=useState("");const[adminOk,setAdminOk]=useState(false);const[adminTab,setAdminTab]=useState("requests");
const[showApprove,setShowApprove]=useState(false);const[appReq,setAppReq]=useState(null);const[appPw,setAppPw]=useState("");const[appShowPw,setAppShowPw]=useState(false);
const[loggedUser,setLoggedUser]=useState(null);const[cpOld,setCpOld]=useState("");const[cpNew,setCpNew]=useState("");const[cpConf,setCpConf]=useState("");
const[reqs,setReqs]=useState([]);const[users,setUsers]=useState([]);
const[cfg,setCfg]=useState({pin:"1234",admins:[{name:"",whatsapp:"",teams:""}],appUrl:""});
const[qrSize,setQrSize]=useState(5);const[reqFilter,setReqFilter]=useState("all");

// Init
useEffect(()=>{(async()=>{
  const[sa,comps]=await Promise.all([api.get("superadmin"),api.get("companies")]);

// Auto-refresh company data
useEffect(()=>{

// ─── LOGIN: search ALL companies for this matricula ───
const handleLogin=async()=>{
  if(!mat||!pw){notify("Preencha matrícula e senha.","error");return}
  setSearching(true);
  try{
    const comps=await api.get("companies");
    if(!comps){notify("Nenhuma empresa cadastrada.","error");setSearching(false);return}
    let found=null;let foundComp=null;
    for(const[cid,cdata]of Object.entries(comps)){
      if(cdata.users){
        const u=Object.values(cdata.users).find(x=>x.matricula===mat&&x.status==="approved");
        if(u){found=u;foundComp={id:cid,name:cdata.name};break}
      }
    }
    if(!found){notify("Matrícula não encontrada ou acesso pendente.","error");setSearching(false);return}
    if(found.password!==pw){notify("Senha incorreta.","error");setSearching(false);return}
    // Enter company
    setCurrentCompany(foundComp);
    setPhase("company");
    if(found.mustChangePassword){setLoggedUser(found);setScreen("changePw");notify("Primeiro acesso — crie nova senha.","info")}
    else{setLoggedUser(found);notify(`Bem-vindo(a), ${found.name}!`,"success");setScreen("login")}
  }catch{notify("Erro de conexão.","error")}
  setSearching(false);
};

// ─── REGISTER: find company by CODE ───
const handleRegister=async()=>{
  if(!regCode){notify("Informe o código da empresa.","error");return}
  if(!regName||!regMat||!regEmail){notify("Preencha nome, matrícula e e-mail.","error");return}
  if(!regPw||regPw.length<4){notify("Senha mín. 4 caracteres.","error");return}
  if(regPw!==regPwC){notify("Senhas não coincidem.","error");return}
  setSearching(true);
  try{
    const comps=await api.get("companies");
    if(!comps){notify("Nenhuma empresa encontrada.","error");setSearching(false);return}
    let targetComp=null;
    for(const[cid,cdata]of Object.entries(comps)){
      if(cdata.code&&cdata.code.toUpperCase()===regCode.toUpperCase()){targetComp={id:cid,...cdata};break}
    }
    if(!targetComp){notify("Código de empresa inválido. Verifique com seu administrador.","error");setSearching(false);return}
    // Check existing pending
    const existingReqs=await api.get(`companies/${targetComp.id}/requests`);
    if(existingReqs){const vals=Object.values(existingReqs);if(vals.find(r=>r.matricula===regMat&&r.type==="register"&&r.status==="pending")){notify("Já existe solicitação pendente.","error");setSearching(false);return}}
    // Submit
    const req={id:Date.now().toString(),type:"register",name:regName,matricula:regMat,email:regEmail,area:regArea||"—",justification:regJust||"—",password:regPw,date:new Date().toLocaleString("pt-BR"),status:"pending"};
    const updReqs=existingReqs?{...existingReqs,[req.id]:req}:{[req.id]:req};
    await api.set(`companies/${targetComp.id}/requests`,updReqs);
    // Load admins for notify
    const tcfg=await api.get(`companies/${targetComp.id}/config`);
    setCurrentCompany(targetComp);if(tcfg)setCfg(p=>({...p,...tcfg}));
    setLastReq(req);setShowNotify(true);
    notify(`✅ Cadastro enviado para ${targetComp.name}!`,"success");
    setRegName("");setRegMat("");setRegEmail("");setRegArea("");setRegJust("");setRegPw("");setRegPwC("");setRegCode("");setScreen("login");
  }catch{notify("Erro.","error")}
  setSearching(false);
};

// ─── RECOVERY: search by matricula ───
const handleRecovery=async()=>{
  if(!recMat||!recEmail){notify("Preencha.","error");return}
  setSearching(true);
  try{
    const comps=await api.get("companies");
    let targetComp=null;
    for(const[cid,cdata]of Object.entries(comps||{})){
      if(cdata.users){const u=Object.values(cdata.users).find(x=>x.matricula===recMat);if(u){targetComp={id:cid,...cdata};break}}
    }
    if(!targetComp){notify("Matrícula não encontrada em nenhuma empresa.","error");setSearching(false);return}
    const req={id:Date.now().toString(),type:"recovery",matricula:recMat,email:recEmail,date:new Date().toLocaleString("pt-BR"),status:"pending"};
    const existingReqs=await api.get(`companies/${targetComp.id}/requests`)||{};

    setLastReq(req);setShowNotify(true);
    notify(`✅ Recuperação enviada!`,"success");setRecMat("");setRecEmail("");setScreen("login");
  }catch{notify("Erro.","error")}
  setSearching(false);
};

const downloadQR=()=>{const url=cfg.appUrl;if(!url)return;const q=qrcode(0,"M");q.addData(url);q.make();const n=q.getModuleCount();const cs=12;const cv=document.createElement("canvas");cv.width=n*cs+80;cv.height=n*cs+160;const cx=cv.getContext("2d");cx.fillStyle="#FFF";cx.fillRect(0,0,cv.width,cv.height);cx.fillStyle="#0B1929";cx.font="bold 22px Arial";cx.textAlign="center";cx.fillText(currentCompany?.name||"PM Manager",cv.width/2,36);cx.fillStyle="#64748B";cx.font="11px Arial";cx.fillText("GESTÃO DE MANUTENÇÃO",cv.width/2,54);const ox=(cv.width-n*cs)/2;const oy=74;cx.strokeStyle="#0B1929";cx.lineWidth=3;cx.strokeRect(ox-14,oy-14,n*cs+28,n*cs+28);for(let r=0;r<n;r++)for(let c=0;c<n;c++)if(q.isDark(r,c)){cx.fillStyle="#0B1929";cx.fillRect(ox+c*cs,oy+r*cs,cs,cs)}cx.fillStyle="#3B82F6";cx.font="11px Arial";cx.fillText(url,cv.width/2,oy+n*cs+30);const lk=document.createElement("a");lk.download="QRCode.png";lk.href=cv.toDataURL("image/png");lk.click();notify("📥 Baixado!","success")};

<p style={{color:"#94A3B8",fontSize:14,marginBottom:16}}>Acesso restrito ao dono do sistema.</p>
<div className="input-wrap"><input className="input-field input-plain" type="password" placeholder="PIN Super Admin" value={saPin} onChange={e=>setSaPin(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){if(saPin===saCfg.pin){setShowSaPinModal(false);setPhase("superAdmin")}else notify("Incorreto.","error")}}}/></div>
<button className="btn-primary" onClick={()=>{if(saPin===saCfg.pin){setShowSaPinModal(false);setPhase("superAdmin")}else notify("Incorreto.","error")}}>Acessar</button>
</div></div>}
</div>);

// ═══ SUPER ADMIN ═══
if(phase==="superAdmin")return(
<div className="app"><div className="bg-texture"/><div className="bg-grad"/>
{toast&&<Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)}/>}
<div className="super-admin-bar"><span>🔴 Super Admin</span><button onClick={()=>setPhase("main")}>Sair</button></div>
<div style={{position:"relative",zIndex:1,maxWidth:700,margin:"0 auto",padding:"60px 20px 40px"}}>
<div className="tabs" style={{marginTop:20}}>{[["companies","🏭 Empresas"],["settings","🔐 Segurança"]].map(([k,l])=>(<button key={k} className={`tab-btn ${saTab===k?"active":""}`} onClick={()=>setSaTab(k)}>{l}</button>))}</div>

{saTab==="companies"&&<div className="fade-in">
<div style={{background:"rgba(59,130,246,.06)",borderRadius:12,border:"1px solid rgba(59,130,246,.15)",padding:16,marginBottom:20}}>
<div style={{color:"#60A5FA",fontSize:13,fontWeight:700,marginBottom:10}}>➕ Nova Empresa</div>
<input className="cfg-input" placeholder="Nome da empresa" value={saNewName} onChange={e=>setSaNewName(e.target.value)} style={{marginBottom:8}}/>
<button className="btn-primary" style={{marginTop:0}} onClick={saCreateCompany}>Criar Empresa</button>
</div>
<h3 style={{color:"#CBD5E1",fontSize:15,marginBottom:12}}>Empresas ({companies.length})</h3>
{companies.map(c=>(<div key={c.id} className="sa-company-card">
<div className="info"><div className="name">{c.name}</div><div className="detail">Código de acesso: <span className="code-badge" style={{fontSize:14,padding:"4px 10px"}}>{c.code||"—"}</span></div><div className="detail" style={{marginTop:4}}>ID: {c.id} · {c.createdAt}</div></div>
<div className="actions">
<button title="Gerar novo código" onClick={()=>saRegenCode(c)} style={{color:"#F59E0B"}}>🔄</button>
<button title="Acessar admin" onClick={()=>enterCompany(c)} style={{color:"#60A5FA"}}>🔧</button>
<button title="Excluir" onClick={()=>saDeleteCompany(c.id)} style={{color:"#EF4444"}}>🗑</button>
</div>
</div>))}
</div>}

{saTab==="settings"&&<div className="fade-in form-block">
<h2 className="form-title">🔐 PIN Super Admin</h2><p className="form-desc">Altere o PIN de controle total</p>
<label className="label">PIN Atual: <code style={{color:"#F59E0B"}}>{saCfg.pin}</code></label>
<label className="label">Novo PIN</label><div className="input-wrap"><input className="input-field input-plain" placeholder="Mín. 4 caracteres" id="sa-new-pin"/></div>
<button className="btn-primary" onClick={async()=>{const v=document.getElementById("sa-new-pin").value;if(!v||v.length<4){notify("Mín. 4.","error");return}const u={...saCfg,pin:v};setSaCfg(u);await api.set("superadmin",u);notify("✅ Atualizado!","success")}}>Alterar PIN</button>
</div>}
</div></div>);

// ═══ COMPANY APP ═══
return(
<div className="app"><div className="bg-texture"/><div className="bg-grad"/>
{toast&&<Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)}/>}
<div className={`sync-indicator ${synced?"online":"offline"}`}>{synced?"🟢":"🔴"}</div>
<div className="container">
<div className="left"><div className="left-inner">
<h1 className="brand-title">Gestão de<br/>Manutenção</h1><p className="brand-sub">Planejamento · Controle · Execução</p><Illust/>
</div></div>
<div className="right"><div className="form-area">
<div className="logo-area" onClick={()=>logoRef.current?.click()}>{logo?<img src={logo} alt=""/>:(<div className="logo-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>Logo</div>)}<input ref={logoRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleLogo}/></div>
<div style={{textAlign:"center",marginBottom:16}}><span style={{color:"#F59E0B",fontSize:14,fontWeight:700}}>{currentCompany?.name}</span><br/><button className="link-btn" style={{fontSize:11,marginTop:4}} onClick={exitCompany}>← Sair desta empresa</button></div>

<div style={{position:"relative",display:"inline-block",width:"100%",textAlign:"center"}}><button className="admin-link" onClick={()=>{setShowAdmin(true);setAdminOk(false);setAdminPin("")}}>⚙ Painel do Administrador</button>{pending>0&&<span className="pending-badge">{pending}</span>}</div>
<p className="footer-text">PM Manager v2.0 ☁</p>
</div></div></div>

{/* ADMIN */}
{showAdmin&&<div className="overlay" onClick={()=>setShowAdmin(false)}><div className="modal slide-down" style={{maxWidth:640}} onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h2 className="modal-title">Admin — {currentCompany?.name}</h2><button className="close-btn" onClick={()=>setShowAdmin(false)}>✕</button></div>
{!adminOk?<div><p style={{color:"#94A3B8",fontSize:14,marginBottom:16}}>PIN do admin da empresa.</p><div className="input-wrap"><input className="input-field input-plain" type="password" placeholder="PIN (padrão: 1234)" value={adminPin} onChange={e=>setAdminPin(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){if(adminPin===cfg.pin){setAdminOk(true);setAdminPin("")}else notify("Incorreto.","error")}}}/></div><button className="btn-primary" onClick={()=>{if(adminPin===cfg.pin){setAdminOk(true);setAdminPin("")}else notify("Incorreto.","error")}}>Acessar</button></div>:<div>
<div className="tabs">{[["requests",`📋${pending?` (${pending})`:""}`],["users","👥"],["qrcode","📱"],["config","⚙"]].map(([k,l])=>(<button key={k} className={`tab-btn ${adminTab===k?"active":""}`} onClick={()=>setAdminTab(k)}>{l}</button>))}</div>

{adminTab==="requests"&&<div>{reqs.length===0?<div className="empty"><div className="icon">📭</div>Nenhuma.</div>:<div>
<div className="export-bar"><div className="stats"><strong>{reqs.length}</strong> total · <strong style={{color:"#F59E0B"}}>{pending}</strong> pend.</div><button className="export-btn" onClick={exportXls}>📊 Excel</button></div>
<div className="filter-bar">{[["all","Todas"],["pending","⏳"],["approved","✅"],["rejected","❌"]].map(([k,l])=>(<button key={k} className={`filter-chip ${reqFilter===k?"active":""}`} onClick={()=>setReqFilter(k)}>{l}</button>))}</div>
{filteredReqs.map(r=><div key={r.id} className={`req-card ${r.status==="pending"?"pending":"resolved"}`}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:6}}><span className="req-badge" style={{background:r.type==="register"?"rgba(59,130,246,.15)":"rgba(245,158,11,.15)",color:r.type==="register"?"#60A5FA":"#F59E0B"}}>{r.type==="register"?"📋 Cadastro":"🔑 Recup."}</span><span className="req-badge" style={{background:r.status==="pending"?"rgba(245,158,11,.2)":r.status==="approved"?"rgba(34,197,94,.2)":"rgba(220,38,38,.2)",color:r.status==="pending"?"#F59E0B":r.status==="approved"?"#22C55E":"#EF4444"}}>{r.status==="pending"?"⏳":r.status==="approved"?"✅":"❌"} {{pending:"Pendente",approved:"Aprovado",rejected:"Rejeitado"}[r.status]}</span></div><div className="req-body">{r.name&&<div><strong>Nome:</strong> {r.name}</div>}<div><strong>Mat:</strong> {r.matricula}</div><div><strong>E-mail:</strong> {r.email}</div>{r.area&&r.area!=="—"&&<div><strong>Área:</strong> {r.area}</div>}<div style={{color:"#64748B",fontSize:12}}>📅 {r.date}{r.resolvedAt?` → ${r.resolvedAt}`:""}</div></div>{r.status==="pending"&&<div style={{display:"flex",gap:8,marginTop:12}}><button className="action-btn approve" onClick={()=>openApprove(r)}>✅ Aprovar</button><button className="action-btn reject" onClick={()=>handleReject(r)}>❌ Rejeitar</button></div>}</div>)}
</div>}</div>}

{adminTab==="users"&&<div>{users.length===0?<div className="empty"><div className="icon">👥</div>Nenhum.</div>:users.map(u=><div key={u.matricula} className="user-card"><div className="user-info"><div className="name">{u.name}{u.mustChangePassword&&<span style={{fontSize:10,color:"#F59E0B",background:"rgba(245,158,11,.15)",padding:"1px 6px",borderRadius:4,marginLeft:6}}>1º acesso</span>}</div><div>🔖 {u.matricula} · 📧 {u.email}</div><div className="meta">{u.area!=="—"?`🏭 ${u.area} · `:""}{u.createdAt}</div></div><div style={{display:"flex",gap:6}}><button style={{background:"none",border:"none",color:"#60A5FA",cursor:"pointer",fontSize:14,padding:4}} onClick={()=>{const np=genPw();saveUsers(users.map(x=>x.matricula===u.matricula?{...x,password:np,mustChangePassword:true}:x));notify(`🔑 Reset: ${np}`,"success")}}>🔑</button><button style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:18,padding:4}} onClick={()=>{saveUsers(users.filter(x=>x.matricula!==u.matricula));notify("Removido.","info")}}>🗑</button></div></div>)}</div>}

{adminTab==="qrcode"&&<div>{!cfg.appUrl?<div><div className="warn-box">⚠ Cadastre a URL na aba ⚙.</div></div>:<div><div className="qr-size-row" style={{marginBottom:16}}><label>Tam:</label><select value={qrSize} onChange={e=>setQrSize(Number(e.target.value))}><option value={4}>P</option><option value={5}>M</option><option value={7}>G</option></select></div><div id="qr-print-area" className="qr-card qr-print-area">{logo&&<img src={logo} className="qr-logo-print" alt=""/>}<div className="qr-title">{currentCompany?.name}</div><div className="qr-subtitle">Gestão de Manutenção</div><div className="qr-container" dangerouslySetInnerHTML={{__html:genQR(cfg.appUrl,qrSize)||""}}/><div className="qr-url">{cfg.appUrl}</div><div className="qr-footer">Escaneie com a câmera</div></div><div className="qr-actions"><button className="qr-action-btn print" onClick={printQR}>🖨</button><button className="qr-action-btn download" onClick={downloadQR}>📥</button></div></div>}</div>}

{adminTab==="config"&&<div>
<div style={{marginBottom:16,padding:14,background:"rgba(124,58,237,.08)",borderRadius:10,border:"1px solid rgba(124,58,237,.2)"}}><div style={{color:"#A78BFA",fontSize:13,fontWeight:700,marginBottom:8}}>🏢 Código da Empresa (para novos cadastros)</div><div className="code-badge">{currentCompany?.code||"—"}</div><p style={{color:"#64748B",fontSize:11,marginTop:8}}>Compartilhe este código com os colaboradores que precisam solicitar cadastro.</p></div>
<div style={{marginBottom:16,padding:14,background:"rgba(59,130,246,.06)",borderRadius:10,border:"1px solid rgba(59,130,246,.15)"}}><div style={{color:"#60A5FA",fontSize:13,fontWeight:700,marginBottom:8}}>📱 URL do App</div><div className="input-wrap"><input className="input-field input-plain" placeholder="https://pm-manager.vercel.app" value={cfg.appUrl||""} onChange={e=>setCfg(p=>({...p,appUrl:e.target.value}))}/></div></div>
<label className="label" style={{marginTop:0}}>PIN Admin</label><div className="input-wrap"><input className="input-field input-plain" value={cfg.pin} onChange={e=>setCfg(p=>({...p,pin:e.target.value}))}/></div>
<div style={{marginTop:20,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}><label className="label" style={{margin:0}}>Admins</label>{cfg.admins.length<5&&<button className="add-admin-btn" style={{background:"none",border:"1px solid #1E3A5F",color:"#60A5FA",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer"}} onClick={addAdmin}>+</button>}</div>
{cfg.admins.map((a,i)=><div key={i} className="admin-card">{cfg.admins.length>1&&<button className="remove" onClick={()=>removeAdmin(i)}>✕</button>}<div style={{color:"#60A5FA",fontSize:12,fontWeight:700,marginBottom:8}}>Admin {i+1}</div><input className="cfg-input" placeholder="Nome" value={a.name} onChange={e=>updateAdmin(i,"name",e.target.value)}/><div className="cfg-row"><input className="cfg-input" placeholder="📱 WhatsApp" value={a.whatsapp} onChange={e=>updateAdmin(i,"whatsapp",e.target.value)}/><input className="cfg-input" placeholder="💬 Teams" value={a.teams} onChange={e=>updateAdmin(i,"teams",e.target.value)}/></div></div>)}
<button className="btn-primary" onClick={()=>{saveCfg(cfg);notify("✅ Salvo!","success")}}>Salvar</button>
</div>}
</div>}
</div></div>}

{/* APPROVE */}
{showApprove&&appReq&&<div className="overlay" onClick={()=>setShowApprove(false)}><div className="modal slide-down" style={{maxWidth:460}} onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h2 className="modal-title">{appReq.type==="register"?"✅ Aprovar":"🔑 Resetar"}</h2><button className="close-btn" onClick={()=>setShowApprove(false)}>✕</button></div>
<div style={{marginBottom:16,padding:12,background:"rgba(59,130,246,.08)",borderRadius:8,color:"#CBD5E1",fontSize:13,lineHeight:1.8}}>{appReq.name&&<div><strong style={{color:"#F8FAFC"}}>👤</strong> {appReq.name}</div>}<div><strong style={{color:"#F8FAFC"}}>🔖</strong> {appReq.matricula}</div><div><strong style={{color:"#F8FAFC"}}>📧</strong> {appReq.email}</div></div>
{appReq.type==="register"?<div><div style={{padding:12,background:"rgba(34,197,94,.08)",borderRadius:8,color:"#22C55E",fontSize:13,marginBottom:8}}>✅ Senha definida pelo solicitante.</div><div style={{padding:10,background:"rgba(245,158,11,.08)",borderRadius:8,color:"#F59E0B",fontSize:12}}>⚠ Trocará no 1º login.</div></div>:<div><label className="label" style={{marginTop:0}}>Senha Temporária</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type={appShowPw?"text":"password"} value={appPw} onChange={e=>setAppPw(e.target.value)}/><button className="eye-btn" onClick={()=>setAppShowPw(!appShowPw)}>{appShowPw?"🙈":"👁"}</button></div><div style={{display:"flex",gap:8,marginTop:8}}><button style={{flex:1,padding:8,borderRadius:8,border:"1px solid #1E3A5F",background:"rgba(15,23,42,.6)",color:"#60A5FA",fontSize:12,cursor:"pointer"}} onClick={()=>setAppPw(genPw())}>🎲 Gerar</button><button style={{flex:1,padding:8,borderRadius:8,border:"1px solid #1E3A5F",background:"rgba(15,23,42,.6)",color:"#94A3B8",fontSize:12,cursor:"pointer"}} onClick={()=>{navigator.clipboard?.writeText(appPw);notify("Copiada!","success")}}>📋 Copiar</button></div></div>}
<button className="btn-primary" onClick={confirmApprove}>Confirmar</button>
</div></div>}
</div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

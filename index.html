<label className="label">E-mail</label><div className="input-wrap"><span className="input-icon">📧</span><input className="input-field" type="email" placeholder="seu@email.com" value={recEmail} onChange={e=>setRecEmail(e.target.value)}/></div>
<button className="btn-primary" onClick={handleRecovery} disabled={searching}>{searching?"Buscando...":"Enviar"}</button>
<button className="link-btn" style={{marginTop:16,display:"block",textAlign:"center",width:"100%"}} onClick={()=>setScreen("login")}>← Voltar</button></div>}

{screen==="register"&&<div className="form-block fade-in"><h2 className="form-title">Solicitar Cadastro</h2><p className="form-desc">Informe o nome da empresa (peça ao Gerente)</p>
<label className="label">Nome da Empresa *</label><div className="input-wrap"><span className="input-icon">🏢</span><input className="input-field" placeholder="Nome exato da empresa" value={regCode} onChange={e=>setRegCode(e.target.value)}/></div>
<label className="label">Nome Completo *</label><div className="input-wrap"><span className="input-icon">👤</span><input className="input-field" placeholder="Seu nome" value={regName} onChange={e=>setRegName(e.target.value)}/></div>
<label className="label">CS (Matrícula) *</label><div className="input-wrap"><span className="input-icon">🔖</span><input className="input-field" placeholder="Matrícula" value={regMat} onChange={e=>setRegMat(e.target.value)}/></div>
<label className="label">E-mail *</label><div className="input-wrap"><span className="input-icon">📧</span><input className="input-field" type="email" placeholder="seu@empresa.com" value={regEmail} onChange={e=>setRegEmail(e.target.value)}/></div>
<label className="label">Área</label><div className="input-wrap"><span className="input-icon">🏭</span><input className="input-field" placeholder="Ex: Manutenção" value={regArea} onChange={e=>setRegArea(e.target.value)}/></div>
<label className="label">Justificativa</label><textarea className="input-field" placeholder="Por que precisa de acesso..." value={regJust} onChange={e=>setRegJust(e.target.value)} rows={2}/>
<div style={{marginTop:16,padding:12,background:"rgba(59,130,246,.06)",borderRadius:10,border:"1px solid rgba(59,130,246,.15)"}}>
<div style={{color:"#60A5FA",fontSize:12,fontWeight:700,marginBottom:10}}>🔐 Crie sua senha</div>
<label className="label" style={{marginTop:0}}>Senha *</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type={regShowPw?"text":"password"} placeholder="Mín. 4" value={regPw} onChange={e=>setRegPw(e.target.value)}/><button className="eye-btn" onClick={()=>setRegShowPw(!regShowPw)}>{regShowPw?"🙈":"👁"}</button></div>
{regPw&&(()=>{const s=pwStr(regPw);return s?<div className={`pw-strength ${s.cls}`}>{s.label}</div>:null})()}
<label className="label">Confirmar *</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type="password" placeholder="Repita" value={regPwC} onChange={e=>setRegPwC(e.target.value)}/></div>
{regPwC&&regPw!==regPwC&&<div style={{color:"#EF4444",fontSize:12,marginTop:6}}>❌ Não coincidem</div>}
{regPwC&&regPw===regPwC&&regPw.length>=4&&<div style={{color:"#22C55E",fontSize:12,marginTop:6}}>✅</div>}
</div>
<button className="btn-primary" onClick={handleRegister} disabled={searching}>{searching?"Enviando...":"Enviar"}</button>
<button className="link-btn" style={{marginTop:16,display:"block",textAlign:"center",width:"100%"}} onClick={()=>setScreen("login")}>← Voltar</button></div>}

{screen==="changePw"&&loggedUser&&<div className="form-block fade-in"><h2 className="form-title">🔐 Nova Senha</h2><p className="form-desc"><strong style={{color:"#F8FAFC"}}>{loggedUser.name}</strong> — primeiro acesso</p>
<label className="label">Nova Senha</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type="password" placeholder="Mín. 4" value={cpNew} onChange={e=>setCpNew(e.target.value)}/></div>
{cpNew&&(()=>{const s=pwStr(cpNew);return s?<div className={`pw-strength ${s.cls}`}>{s.label}</div>:null})()}
<label className="label">Confirmar</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type="password" placeholder="Repita" value={cpConf} onChange={e=>setCpConf(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleChangePw()}/></div>
<button className="btn-primary" onClick={handleChangePw}>Salvar</button></div>}

<p className="footer-text">PM Manager v2.0 — Multi-empresa ☁</p>
</div></div></div>

{/* NOTIFY */}
{showNotify&&<div className="overlay" onClick={()=>setShowNotify(false)}><div className="modal slide-down" style={{maxWidth:480}} onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h2 className="modal-title">✅ Registrada!</h2><button className="close-btn" onClick={()=>setShowNotify(false)}>✕</button></div>
{configuredAdmins.length===0?<div className="warn-box">⚠ Nenhum Gerente configurado com WhatsApp/Teams.</div>:
<div><p style={{color:"#94A3B8",fontSize:14,marginBottom:16}}>Notifique o Gerente:</p>{configuredAdmins.map((a,i)=>(<div key={i} className="notify-card"><div style={{color:"#F8FAFC",fontSize:14,fontWeight:600,marginBottom:10}}>{a.name||`Gerente ${i+1}`}</div><div className="notify-btns">{a.whatsapp&&<button className="channel-btn whatsapp" onClick={()=>notifyAdm(a,"whatsapp")}>📱 WhatsApp</button>}{a.teams&&<button className="channel-btn teams" onClick={()=>notifyAdm(a,"teams")}>💬 Teams</button>}</div></div>))}</div>}
<button className="link-btn" style={{marginTop:20,display:"block",textAlign:"center",width:"100%"}} onClick={()=>{setShowNotify(false);setCurrentCompany(null)}}>Fechar</button>
</div></div>}

{/* ═══ GERENTE DA CONTA ═══ */}
{showGerente&&<div className="overlay" onClick={()=>setShowGerente(false)}><div className="modal slide-down" style={{maxWidth:640}} onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h2 className="modal-title">Gerente da Conta</h2><button className="close-btn" onClick={()=>setShowGerente(false)}>✕</button></div>
{!gerenteOk?<div>
<p style={{color:"#94A3B8",fontSize:14,marginBottom:12}}>Selecione a empresa e digite o PIN.</p>
<label className="label" style={{marginTop:0}}>Empresa</label>
<div className="input-wrap"><span className="input-icon">🏢</span>
<select className="input-field" style={{paddingLeft:40,cursor:"pointer",appearance:"auto"}} value={gerenteCompanyId} onChange={e=>setGerenteCompanyId(e.target.value)}>
<option value="">— Selecione —</option>
{companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
</select></div>
<label className="label">PIN do Gerente</label>
<div className="input-wrap"><input className="input-field input-plain" type="password" placeholder="PIN (padrão: 1234)" value={gerentePin} onChange={e=>setGerentePin(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")document.getElementById("gerente-access-btn")?.click()}}/></div>
<button id="gerente-access-btn" className="btn-primary" onClick={async()=>{
  if(!gerenteCompanyId){notify("Selecione uma empresa.","error");return}
  const comp=companies.find(c=>c.id===gerenteCompanyId);
  if(!comp){notify("Empresa não encontrada.","error");return}
  setCurrentCompany(comp);
  const c2=await api.get(`companies/${comp.id}/config`);
  if(c2)setCfg(p=>({...p,...c2}));
  if(gerentePin===(c2?.pin||"1234")){setGerenteOk(true);setGerentePin("")}
  else notify("PIN incorreto.","error");
}}>Acessar</button>
</div>:<div>
<div style={{color:"#F59E0B",fontSize:14,fontWeight:700,marginBottom:16}}>🏢 {currentCompany?.name}</div>
<div className="tabs">{[["requests",`📋 Solic.${pending?` (${pending})`:""}`],["access",`🔐 Acessos${pendingAccessReqs.length?` (${pendingAccessReqs.length})`:""}`],["users","👥 Usuários"],["qrcode","📱 QR"],["config","⚙ Config"]].map(([k,l])=>(<button key={k} className={`tab-btn ${gerenteTab===k?"active":""}`} onClick={()=>setGerenteTab(k)}>{l}</button>))}</div>

{gerenteTab==="requests"&&<div>{reqs.length===0?<div className="empty"><div className="icon">📭</div>Nenhuma.</div>:<div>
<div className="export-bar"><div className="stats"><strong>{reqs.length}</strong> total · <strong style={{color:"#F59E0B"}}>{pending}</strong> pendentes</div><button className="export-btn" onClick={exportXls}>📊 Excel</button></div>
<div className="filter-bar">{[["all","Todas"],["pending","⏳"],["approved","✅"],["rejected","❌"]].map(([k,l])=>(<button key={k} className={`filter-chip ${reqFilter===k?"active":""}`} onClick={()=>setReqFilter(k)}>{l}</button>))}</div>
{filteredReqs.map(r=><div key={r.id} className={`req-card ${r.status==="pending"?"pending":"resolved"}`}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:6}}><span className="req-badge" style={{background:r.type==="register"?"rgba(59,130,246,.15)":"rgba(245,158,11,.15)",color:r.type==="register"?"#60A5FA":"#F59E0B"}}>{r.type==="register"?"📋 Cadastro":"🔑 Recuperação"}</span><span className="req-badge" style={{background:r.status==="pending"?"rgba(245,158,11,.2)":r.status==="approved"?"rgba(34,197,94,.2)":"rgba(220,38,38,.2)",color:r.status==="pending"?"#F59E0B":r.status==="approved"?"#22C55E":"#EF4444"}}>{r.status==="pending"?"⏳ Pendente":r.status==="approved"?"✅ Aprovado":"❌ Rejeitado"}</span></div><div className="req-body">{r.name&&<div><strong>Nome:</strong> {r.name}</div>}<div><strong>Mat:</strong> {r.matricula}</div><div><strong>E-mail:</strong> {r.email}</div>{r.area&&r.area!=="—"&&<div><strong>Área:</strong> {r.area}</div>}<div style={{color:"#64748B",fontSize:12}}>📅 {r.date}{r.resolvedAt?` → ${r.resolvedAt}`:""}</div></div>{r.status==="pending"&&<div style={{display:"flex",gap:8,marginTop:12}}><button className="action-btn approve" onClick={()=>openApprove(r)}>✅ Aprovar</button><button className="action-btn reject" onClick={()=>handleReject(r)}>❌ Rejeitar</button></div>}</div>)}
</div>}</div>}

{gerenteTab==="access"&&<div>{accessReqs.length===0?<div className="empty"><div className="icon">🔐</div>Nenhuma solicitação de acesso.</div>:<div>
<div className="export-bar"><div className="stats"><strong>{accessReqs.length}</strong> total · <strong style={{color:"#F59E0B"}}>{pendingAccessReqs.length}</strong> pendentes</div></div>
<p style={{color:"#64748B",fontSize:12,marginBottom:14}}>Solicitações de acesso aos módulos restritos (Head Count, Banco de Dados, Relatórios)</p>
{accessReqs.map(r=><div key={r.id} className={`req-card ${r.status==="pending"?"pending":"resolved"}`}>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:6}}>
<span className="req-badge" style={{background:"rgba(168,85,247,.15)",color:"#A855F7"}}>🔐 {r.moduleLabel}</span>
<span className="req-badge" style={{background:r.level==="edicao"?"rgba(34,197,94,.15)":"rgba(59,130,246,.15)",color:r.level==="edicao"?"#22C55E":"#60A5FA"}}>{r.level==="edicao"?"✏ Edição":"🔍 Consulta"}</span>
<span className="req-badge" style={{background:r.status==="pending"?"rgba(245,158,11,.2)":r.status==="approved"?"rgba(34,197,94,.2)":"rgba(220,38,38,.2)",color:r.status==="pending"?"#F59E0B":r.status==="approved"?"#22C55E":"#EF4444"}}>{r.status==="pending"?"⏳ Pendente":r.status==="approved"?"✅ Aprovado":"❌ Rejeitado"}</span>
</div>
<div className="req-body">
<div><strong>Nome:</strong> {r.name}</div>
<div><strong>Matrícula:</strong> {r.matricula}</div>
<div><strong>E-mail:</strong> {r.email}</div>
<div style={{color:"#64748B",fontSize:12}}>📅 {r.date}{r.resolvedAt?` → ${r.resolvedAt} por ${r.resolvedBy}`:""}</div>
</div>
{r.status==="pending"&&<div style={{display:"flex",gap:8,marginTop:12}}>
<button className="action-btn approve" onClick={()=>approveAccess(r)}>✅ Aprovar Acesso</button>
<button className="action-btn reject" onClick={()=>rejectAccess(r)}>❌ Rejeitar</button>
</div>}
{r.status==="approved"&&<div style={{marginTop:10}}><button style={{padding:"6px 12px",borderRadius:6,border:"1px solid rgba(220,38,38,.3)",background:"rgba(220,38,38,.1)",color:"#EF4444",fontSize:11,fontWeight:600,cursor:"pointer"}} onClick={async()=>{if(confirm(`Revogar acesso de ${r.name} ao módulo ${r.moduleLabel}?`)){await revokeAccess(r.matricula,r.module);}}}>🚫 Revogar Acesso</button></div>}
</div>)}
</div>}</div>}

{gerenteTab==="users"&&<div>{users.length===0?<div className="empty"><div className="icon">👥</div>Nenhum.</div>:users.map(u=><div key={u.matricula} className="user-card"><div className="user-info"><div className="name">{u.name}{u.mustChangePassword&&<span style={{fontSize:10,color:"#F59E0B",background:"rgba(245,158,11,.15)",padding:"1px 6px",borderRadius:4,marginLeft:6}}>1º acesso</span>}{u.role==="gerente"&&<span style={{fontSize:10,color:"#A855F7",background:"rgba(168,85,247,.15)",padding:"1px 6px",borderRadius:4,marginLeft:6,fontWeight:700}}>👔 GERENTE</span>}{u.permissions&&Object.entries(u.permissions).filter(([k,v])=>v).map(([k])=><span key={k} style={{fontSize:10,color:"#22C55E",background:"rgba(34,197,94,.15)",padding:"1px 6px",borderRadius:4,marginLeft:6}}>✓ {RESTRICTED_MODULES[k]||k}</span>)}</div><div>🔖 {u.matricula} · 📧 {u.email}</div><div className="meta">{u.area!=="—"?`🏭 ${u.area} · `:""}{u.createdAt}</div></div><div style={{display:"flex",gap:6,alignItems:"center"}}><button style={{background:u.role==="gerente"?"rgba(168,85,247,.15)":"none",border:`1px solid ${u.role==="gerente"?"rgba(168,85,247,.3)":"#1E3A5F"}`,color:u.role==="gerente"?"#A855F7":"#94A3B8",cursor:"pointer",fontSize:11,padding:"4px 8px",borderRadius:6,fontWeight:600}} title={u.role==="gerente"?"Remover como Gerente":"Promover a Gerente"} onClick={async()=>{const newRole=u.role==="gerente"?"colaborador":"gerente";saveUsers(users.map(x=>x.matricula===u.matricula?{...x,role:newRole}:x));await logUser(newRole==="gerente"?"Promovido a Gerente":"Removido como Gerente",`${u.name} (${u.matricula})`);notify(newRole==="gerente"?"✅ Promovido a Gerente!":"Removido como Gerente.","success")}}>{u.role==="gerente"?"👔 Gerente":"👤 Colaborador"}</button><button style={{background:"none",border:"none",color:"#60A5FA",cursor:"pointer",fontSize:14,padding:4}} onClick={async()=>{const np=genPw();saveUsers(users.map(x=>x.matricula===u.matricula?{...x,password:np,mustChangePassword:true}:x));await logUser("Senha Resetada",`${u.name} (${u.matricula})`);notify(`🔑 Reset: ${np}`,"success")}}>🔑</button><button style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:18,padding:4}} onClick={async()=>{saveUsers(users.filter(x=>x.matricula!==u.matricula));await logUser("Usuário Removido",`${u.name} (${u.matricula}) de ${currentCompany?.name}`);notify("Removido.","info")}}>🗑</button></div></div>)}</div>}

{gerenteTab==="qrcode"&&<div>{!cfg.appUrl?<div><div className="warn-box">⚠ Cadastre a URL na aba Config.</div></div>:<div>
<div className="qr-size-row" style={{marginBottom:16}}><label>Tamanho:</label><select value={qrSize} onChange={e=>setQrSize(Number(e.target.value))}><option value={4}>P</option><option value={5}>M</option><option value={7}>G</option></select></div>
<div id="qr-print-area" className="qr-card qr-print-area">{logo&&<img src={logo} className="qr-logo-print" alt=""/>}<div className="qr-title">{currentCompany?.name||"PM Manager"}</div><div className="qr-subtitle">Gestão de Manutenção</div><div className="qr-container" dangerouslySetInnerHTML={{__html:genQR(cfg.appUrl,qrSize)||""}}/><div className="qr-url">{cfg.appUrl}</div><div className="qr-footer">Escaneie com a câmera</div></div>
<div className="qr-actions"><button className="qr-action-btn print" onClick={printQR}>🖨 Imprimir</button></div>
</div>}</div>}

{gerenteTab==="config"&&<div>
<div style={{marginBottom:20,padding:16,background:"rgba(59,130,246,.06)",borderRadius:12,border:"1px solid rgba(59,130,246,.15)"}}><div style={{color:"#60A5FA",fontSize:13,fontWeight:700,marginBottom:10}}>📱 URL do App</div><div className="input-wrap"><input className="input-field input-plain" placeholder="https://pm-manager.vercel.app" value={cfg.appUrl||""} onChange={e=>setCfg(p=>({...p,appUrl:e.target.value}))}/></div></div>
<div style={{marginBottom:16}}><label className="label" style={{marginTop:0}}>Logo da Empresa</label><input type="file" accept="image/*" onChange={handleLogo} style={{color:"#64748B",fontSize:13}}/></div>
<label className="label" style={{marginTop:0}}>PIN do Gerente</label><div className="input-wrap"><input className="input-field input-plain" value={cfg.pin} onChange={e=>setCfg(p=>({...p,pin:e.target.value}))}/></div>
{cfg.admins&&cfg.admins.filter(a=>a.name).length>0&&<div style={{marginTop:20}}>
<label className="label" style={{margin:0,color:"#64748B"}}>Contatos do Gerente (cadastrado pelo Administrador)</label>
{cfg.admins.filter(a=>a.name).map((a,i)=><div key={i} style={{background:"rgba(15,23,42,.3)",borderRadius:8,padding:10,marginTop:8,border:"1px solid #1E3A5F",color:"#94A3B8",fontSize:13}}>
<strong style={{color:"#CBD5E1"}}>{a.name}</strong>{a.whatsapp&&<span> · 📱 {a.whatsapp}</span>}{a.teams&&<span> · 💬 {a.teams}</span>}
</div>)}
</div>}
<button className="btn-primary" onClick={()=>{saveCfg(cfg);notify("✅ Salvo!","success")}}>Salvar</button>
</div>}
</div>}
</div></div>}

{/* APPROVE MODAL */}
{showApprove&&appReq&&<div className="overlay" onClick={()=>setShowApprove(false)}><div className="modal slide-down" style={{maxWidth:460}} onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h2 className="modal-title">{appReq.type==="register"?"✅ Aprovar":"🔑 Resetar"}</h2><button className="close-btn" onClick={()=>setShowApprove(false)}>✕</button></div>
<div style={{marginBottom:16,padding:12,background:"rgba(59,130,246,.08)",borderRadius:8,border:"1px solid rgba(59,130,246,.15)",color:"#CBD5E1",fontSize:13,lineHeight:1.8}}>{appReq.name&&<div><strong style={{color:"#F8FAFC"}}>👤</strong> {appReq.name}</div>}<div><strong style={{color:"#F8FAFC"}}>🔖</strong> {appReq.matricula}</div><div><strong style={{color:"#F8FAFC"}}>📧</strong> {appReq.email}</div></div>
{appReq.type==="register"?<div><div style={{padding:12,background:"rgba(34,197,94,.08)",borderRadius:8,border:"1px solid rgba(34,197,94,.15)",color:"#22C55E",fontSize:13}}>✅ Senha definida pelo solicitante.</div><div style={{marginTop:8,padding:10,background:"rgba(245,158,11,.08)",borderRadius:8,border:"1px solid rgba(245,158,11,.15)",color:"#F59E0B",fontSize:12}}>⚠ Trocará no 1º login.</div></div>:<div><label className="label" style={{marginTop:0}}>Senha Temporária</label><div className="input-wrap"><span className="input-icon">🔑</span><input className="input-field" type={appShowPw?"text":"password"} value={appPw} onChange={e=>setAppPw(e.target.value)}/><button className="eye-btn" onClick={()=>setAppShowPw(!appShowPw)}>{appShowPw?"🙈":"👁"}</button></div><div style={{display:"flex",gap:8,marginTop:8}}><button style={{flex:1,padding:8,borderRadius:8,border:"1px solid #1E3A5F",background:"rgba(15,23,42,.6)",color:"#60A5FA",fontSize:12,cursor:"pointer"}} onClick={()=>setAppPw(genPw())}>🎲 Gerar</button><button style={{flex:1,padding:8,borderRadius:8,border:"1px solid #1E3A5F",background:"rgba(15,23,42,.6)",color:"#94A3B8",fontSize:12,cursor:"pointer"}} onClick={()=>{navigator.clipboard?.writeText(appPw);notify("Copiada!","success")}}>📋 Copiar</button></div></div>}
<button className="btn-primary" onClick={confirmApprove}>Confirmar</button>
</div></div>}

{/* SA PIN */}
{showSaPinModal&&<div className="overlay" onClick={()=>setShowSaPinModal(false)}><div className="modal slide-down" style={{maxWidth:400}} onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h2 className="modal-title">🔐 Administrador</h2><button className="close-btn" onClick={()=>setShowSaPinModal(false)}>✕</button></div>
<p style={{color:"#94A3B8",fontSize:14,marginBottom:16}}>Acesso restrito ao dono do sistema.</p>
<div className="input-wrap"><input className="input-field input-plain" type="password" placeholder="PIN do Administrador" value={saPin} onChange={e=>setSaPin(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){if(saPin===saCfg.pin){setShowSaPinModal(false);setPhase("superAdmin")}else notify("Incorreto.","error")}}}/></div>
<button className="btn-primary" onClick={()=>{if(saPin===saCfg.pin){setShowSaPinModal(false);setPhase("superAdmin")}else notify("Incorreto.","error")}}>Acessar</button>
</div></div>}
</div>);

// ═══ ADMINISTRADOR (Super Admin) ═══
if(phase==="superAdmin")return(
<div className="app"><div className="bg-texture"/><div className="bg-grad"/>
{toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
<div className="super-admin-bar"><span>🔐 Administrador — Controle Total</span><button onClick={()=>setPhase("main")}>Sair</button></div>
<div style={{position:"relative",zIndex:1,maxWidth:700,margin:"0 auto",padding:"60px 20px 40px"}}>
<div className="tabs" style={{marginTop:20}}>{[["companies","🏭 Empresas"],["settings","🔐 Segurança"]].map(([k,l])=>(<button key={k} className={`tab-btn ${saTab===k?"active":""}`} onClick={()=>setSaTab(k)}>{l}</button>))}</div>

{saTab==="companies"&&<div className="fade-in">
<div style={{background:"rgba(59,130,246,.06)",borderRadius:12,border:"1px solid rgba(59,130,246,.15)",padding:16,marginBottom:20}}>
<div style={{color:"#60A5FA",fontSize:13,fontWeight:700,marginBottom:10}}>➕ Nova Empresa</div>
<input className="cfg-input" placeholder="Nome da empresa (será o código de acesso)" value={saNewName} onChange={e=>setSaNewName(e.target.value)} style={{marginBottom:8}}/>
<div style={{marginBottom:8}}>
<label className="label" style={{marginTop:0,marginBottom:6}}>Logo da Empresa</label>
<div style={{display:"flex",alignItems:"center",gap:12}}>
{saNewLogo?<img src={saNewLogo} alt="" style={{width:50,height:50,borderRadius:8,objectFit:"contain",background:"rgba(255,255,255,.05)",padding:4,border:"1px solid #1E3A5F"}}/>:<div style={{width:50,height:50,borderRadius:8,background:"rgba(15,23,42,.6)",border:"1px dashed #334155",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🏭</div>}
<div><input type="file" accept="image/*" onChange={e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>setSaNewLogo(ev.target.result);rd.readAsDataURL(f)}} style={{color:"#64748B",fontSize:12,maxWidth:200}}/></div>
</div></div>
<div style={{marginBottom:8}}>
<label className="label" style={{marginTop:0,marginBottom:6}}>Plano de Fundo do App (opcional)</label>
<div style={{display:"flex",alignItems:"center",gap:12}}>
{saNewBg?<img src={saNewBg} alt="" style={{width:80,height:50,borderRadius:8,objectFit:"cover",border:"1px solid #1E3A5F"}}/>:<div style={{width:80,height:50,borderRadius:8,background:"rgba(15,23,42,.6)",border:"1px dashed #334155",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🖼</div>}
<div style={{display:"flex",flexDirection:"column",gap:4}}><input type="file" accept="image/*" onChange={e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>setSaNewBg(ev.target.result);rd.readAsDataURL(f)}} style={{color:"#64748B",fontSize:12,maxWidth:200}}/>{saNewBg&&<button onClick={()=>setSaNewBg(null)} style={{background:"none",border:"none",color:"#EF4444",fontSize:11,cursor:"pointer",textAlign:"left"}}>✕ Remover fundo</button>}</div>
</div></div>
<p style={{color:"#64748B",fontSize:11,marginBottom:8}}>⚠ O nome da empresa será usado como código de acesso para cadastro de usuários.</p>
<button className="btn-primary" style={{marginTop:0}} onClick={saCreateCompany}>Criar Empresa</button>
</div>
<h3 style={{color:"#CBD5E1",fontSize:15,marginBottom:12}}>Empresas ({companies.length})</h3>
{companies.map(c=>(<div key={c.id} className="sa-company-card">
<div className="info" style={{display:"flex",alignItems:"center",gap:12}}><CompanyLogo companyId={c.id}/><div><div className="name">{c.name}</div><div className="detail">Código de acesso = <strong style={{color:"#F59E0B"}}>{c.name}</strong></div><div className="detail">{c.createdAt}</div></div></div>
<div className="actions">
<button title="Configurar Gerentes" onClick={async()=>{const cc=await api.get(`companies/${c.id}/config`);const cl=await api.get(`companies/${c.id}/logo`);const cbg=await api.get(`companies/${c.id}/background`);setSaEditComp(c);setSaEditCfg(cc||{pin:"1234",admins:[{name:"",whatsapp:"",teams:""}],appUrl:""});setSaEditLogo(cl||null);setSaEditBg(cbg||null)}} style={{color:"#F59E0B"}}>⚙</button>
<button title="Acessar como Gerente" onClick={async()=>{setCurrentCompany(c);const cc=await api.get(`companies/${c.id}/config`);if(cc)setCfg(p=>({...p,...cc}));setGerenteCompanyId(c.id);setGerenteOk(true);setShowGerente(true);setPhase("main")}} style={{color:"#60A5FA"}}>🔧</button>
<button title="Excluir" onClick={()=>saDeleteCompany(c)} style={{color:"#EF4444"}}>🗑</button>
</div>
</div>))}
</div>}

{/* EDIT COMPANY CONFIG MODAL */}
{saEditComp&&saEditCfg&&<div className="overlay" onClick={()=>setSaEditComp(null)}><div className="modal slide-down" style={{maxWidth:540}} onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h2 className="modal-title">⚙ {saEditComp.name} — Configurações</h2><button className="close-btn" onClick={()=>setSaEditComp(null)}>✕</button></div>

<div style={{marginBottom:16}}>
<label className="label" style={{marginTop:0}}>Logo da Empresa</label>
<div style={{display:"flex",alignItems:"center",gap:12}}>
{saEditLogo?<img src={saEditLogo} alt="" style={{width:56,height:56,borderRadius:10,objectFit:"contain",background:"rgba(255,255,255,.05)",padding:4,border:"1px solid #1E3A5F"}}/>:<div style={{width:56,height:56,borderRadius:10,background:"rgba(15,23,42,.6)",border:"1px dashed #334155",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>🏭</div>}
<input type="file" accept="image/*" onChange={e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>setSaEditLogo(ev.target.result);rd.readAsDataURL(f)}} style={{color:"#64748B",fontSize:12,maxWidth:200}}/>
</div></div>

<label className="label" style={{marginTop:14}}>Plano de Fundo do App (opcional)</label>
<div style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}>
{saEditBg?<img src={saEditBg} alt="" style={{width:90,height:56,borderRadius:10,objectFit:"cover",border:"1px solid #1E3A5F"}}/>:<div style={{width:90,height:56,borderRadius:10,background:"rgba(15,23,42,.6)",border:"1px dashed #334155",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🖼</div>}
<div style={{display:"flex",flexDirection:"column",gap:4}}><input type="file" accept="image/*" onChange={e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>setSaEditBg(ev.target.result);rd.readAsDataURL(f)}} style={{color:"#64748B",fontSize:12,maxWidth:200}}/>{saEditBg&&<button onClick={()=>setSaEditBg("__REMOVE__")} style={{background:"none",border:"none",color:"#EF4444",fontSize:11,cursor:"pointer",textAlign:"left"}}>✕ Remover fundo</button>}</div>
</div>
<div className="input-wrap"><input className="input-field input-plain" value={saEditCfg.pin||""} onChange={e=>setSaEditCfg(p=>({...p,pin:e.target.value}))}/></div>

<div style={{marginTop:20,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<label className="label" style={{margin:0}}>Contatos do Gerente da Conta</label>
{(saEditCfg.admins||[]).length<5&&<button style={{background:"none",border:"1px solid #1E3A5F",color:"#60A5FA",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer"}} onClick={()=>setSaEditCfg(p=>({...p,admins:[...(p.admins||[]),{name:"",whatsapp:"",teams:""}]}))}>+</button>}
</div>

{(saEditCfg.admins||[]).map((a,i)=><div key={i} className="admin-card">
{(saEditCfg.admins||[]).length>1&&<button className="remove" onClick={()=>setSaEditCfg(p=>({...p,admins:p.admins.filter((_,x)=>x!==i)}))}>✕</button>}
<div style={{color:"#60A5FA",fontSize:12,fontWeight:700,marginBottom:8}}>Gerente {i+1}</div>
<input className="cfg-input" placeholder="Nome do Gerente" value={a.name} onChange={e=>{const admins=[...(saEditCfg.admins||[])];admins[i]={...admins[i],name:e.target.value};setSaEditCfg(p=>({...p,admins}))}}/>
<div className="cfg-row">
<input className="cfg-input" placeholder="📱 WhatsApp (5566...)" value={a.whatsapp} onChange={e=>{const admins=[...(saEditCfg.admins||[])];admins[i]={...admins[i],whatsapp:e.target.value};setSaEditCfg(p=>({...p,admins}))}}/>
<input className="cfg-input" placeholder="💬 Teams (e-mail)" value={a.teams} onChange={e=>{const admins=[...(saEditCfg.admins||[])];admins[i]={...admins[i],teams:e.target.value};setSaEditCfg(p=>({...p,admins}))}}/>
</div>
</div>)}

<button className="btn-primary" onClick={async()=>{
  await api.set(`companies/${saEditComp.id}/config`,saEditCfg);
  if(saEditLogo)await api.set(`companies/${saEditComp.id}/logo`,saEditLogo);
  if(saEditBg==="__REMOVE__"){await api.del(`companies/${saEditComp.id}/background`);if(currentCompany&&currentCompany.id===saEditComp.id)setBgImage(null)}
  else if(saEditBg){await api.set(`companies/${saEditComp.id}/background`,saEditBg);if(currentCompany&&currentCompany.id===saEditComp.id)setBgImage(saEditBg)}
  notify(`✅ "${saEditComp.name}" atualizada!`,"success");
  setSaEditComp(null);
}}>Salvar Configuração</button>
</div></div>}

{saTab==="settings"&&<div className="fade-in form-block">
<h2 className="form-title">🔐 PIN do Administrador</h2><p className="form-desc">Altere o PIN de controle total</p>
<label className="label">PIN Atual: <code style={{color:"#F59E0B"}}>{saCfg.pin}</code></label>
<label className="label">Novo PIN</label><div className="input-wrap"><input className="input-field input-plain" placeholder="Mín. 4 caracteres" id="sa-new-pin"/></div>
<button className="btn-primary" onClick={async()=>{const v=document.getElementById("sa-new-pin").value;if(!v||v.length<4){notify("Mín. 4.","error");return}const u={...saCfg,pin:v};setSaCfg(u);await api.set("superadmin",u);notify("✅ Atualizado!","success")}}>Alterar PIN</button>
</div>}
</div></div>);

return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
/* ═══ PWA: Service Worker para uso offline (etapa 1 — consulta) ═══ */
(function(){
  if(!("serviceWorker" in navigator))return;
  // SW gerado em runtime (mantém o deploy de arquivo único). Cacheia o app e respostas do Firebase (GET).
  var swCode = [
    "var CACHE='pm-manager-v1';",
    "var APP_URL=self.registration.scope;",
    "self.addEventListener('install',function(e){self.skipWaiting();});",
    "self.addEventListener('activate',function(e){e.waitUntil((async function(){var ks=await caches.keys();await Promise.all(ks.filter(function(k){return k!=='pm-manager-v1'&&k!=='pm-manager-data'}).map(function(k){return caches.delete(k)}));await self.clients.claim();})());});",
    "self.addEventListener('fetch',function(e){",
    "  var req=e.request;var url=new URL(req.url);",
    "  if(req.method!=='GET'){return;}",
    // App shell + CDNs (React/Babel/XLSX/qrcode): cache-first, atualiza em segundo plano (stale-while-revalidate)
    "  var isShell = req.mode==='navigate' || /cloudflare|cdnjs|jsdelivr|unpkg/.test(url.host) || url.origin===location.origin;",
    "  var isFirebase = /firebaseio\\.com$/.test(url.host);",
    "  if(isFirebase){",
    // Dados: network-first (sempre tenta online), cai no cache se offline
    "    e.respondWith((async function(){try{var fresh=await fetch(req);var c=await caches.open('pm-manager-data');c.put(req,fresh.clone());return fresh;}catch(err){var cached=await caches.match(req);if(cached)return cached;return new Response('null',{headers:{'Content-Type':'application/json'}});}})());",
    "    return;",
    "  }",
    "  if(isShell){",
    "    e.respondWith((async function(){var cache=await caches.open('pm-manager-v1');var cached=await cache.match(req);var net=fetch(req).then(function(r){if(r&&r.status===200)cache.put(req,r.clone());return r;}).catch(function(){return cached;});return cached||net;})());",
    "    return;",
    "  }",
    "});"
  ].join("\n");
  try{
    var blob=new Blob([swCode],{type:"text/javascript"});
    var swUrl=URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).then(function(reg){
      // pré-cacheia a própria página + bibliotecas (garantia de abrir offline)
      if(window.caches){caches.open("pm-manager-v1").then(function(c){
        var assets=[location.href,
          "https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.bundle.js"];
        assets.forEach(function(u){c.add(u).catch(function(){});});
      });}
    }).catch(function(){});
  }catch(e){}
})();

/* ═══ Indicador de status online/offline ═══ */
(function(){
  var bar=document.createElement("div");
  bar.id="net-status";
  bar.style.cssText="position:fixed;bottom:0;left:0;right:0;z-index:99999;text-align:center;font-size:12px;font-weight:600;padding:6px 10px;font-family:'Segoe UI',Arial,sans-serif;transition:transform .3s,opacity .3s;transform:translateY(100%);opacity:0;pointer-events:none";
  document.body.appendChild(bar);
  var hideTimer=null;
  function show(online){
    if(hideTimer){clearTimeout(hideTimer);hideTimer=null;}
    if(online){
      bar.textContent="🟢 Conectado — dados sincronizados com a nuvem";
      bar.style.background="rgba(34,197,94,.95)";bar.style.color="#04240f";
      bar.style.transform="translateY(0)";bar.style.opacity="1";
      hideTimer=setTimeout(function(){bar.style.transform="translateY(100%)";bar.style.opacity="0";},2600);
    }else{
      bar.textContent="🟡 Sem internet — modo consulta (exibindo últimos dados carregados; edições não serão salvas)";
      bar.style.background="rgba(245,158,11,.97)";bar.style.color="#3a2503";
      bar.style.transform="translateY(0)";bar.style.opacity="1";
    }
  }
  window.addEventListener("online",function(){show(true);});
  window.addEventListener("offline",function(){show(false);});
  // estado inicial: só avisa se já estiver offline
  if(!navigator.onLine)setTimeout(function(){show(false);},800);
})();
</script>
</body>
